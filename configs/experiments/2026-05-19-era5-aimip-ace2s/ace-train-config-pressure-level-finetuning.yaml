# arg: --dataset andrep/2026-03-19-era5-1deg-8layer-stats-1990-2019:/statsdata
# arg: --dataset 01KSNWV164T1GTF7GDFRA539QV:training_checkpoints/best_inference_ckpt.tar:/ckpt.tar
experiment_dir: /results
save_checkpoint: true
validate_using_ema: true
max_epochs: 50
seed: 0
ema:
  decay: 0.999
inference:
  n_forward_steps: 7300
  forward_steps_in_memory: 40
  loader:
    start_indices:
      times:
        - '2009-01-01T00:00:00'
        - '2009-02-15T00:00:00'
        - '2009-04-01T00:00:00'
        - '2009-05-15T00:00:00'
        - '2009-07-01T00:00:00'
        - '2009-08-15T00:00:00'
        - '2009-10-01T00:00:00'
        - '2009-11-15T00:00:00'
    dataset:
      data_path: /climate-default/
      file_pattern: 2026-03-19-era5-1deg-8layer-1940-2025.zarr
      engine: zarr
    num_data_workers: 8
  aggregator:
    histogram:
      enabled: true
    time_mean_reference_data: /statsdata/time-mean.nc
logging:
  log_to_screen: true
  log_to_wandb: true
  log_to_file: true
  project: ace
  entity: ai2cm
train_loader:
  batch_size: 16
  num_data_workers: 8
  prefetch_factor: 2
  dataset:
    data_path: /climate-default/
    file_pattern: 2026-03-19-era5-1deg-8layer-1940-2025.zarr
    engine: zarr
    subset:
      start_time: '1979-01-01'
      stop_time: '2008-12-31'
validation:
  loader:
    batch_size: 128
    num_data_workers: 8
    prefetch_factor: 2
    dataset:
      data_path: /climate-default/
      file_pattern: 2026-03-19-era5-1deg-8layer-1940-2025.zarr
      engine: zarr
      subset:
        start_time: '2009-01-01'
        step: 3
        stop_time: '2014-12-31'
optimization:
  use_gradient_accumulation: true
  enable_automatic_mixed_precision: false
  lr: 0.0001
  optimizer_type: AdamW
  kwargs:
    fused: true
    weight_decay: 0.01
stepper_training:
  n_forward_steps: 1
  loss:
    type: MSE
  parameter_init:
    weights_path: /base_weights/ckpt.tar
    parameters:
      - frozen:
          include:
            - "*"
stepper:
  step:
    type: single_module
    config:
      builder:
        type: NoiseConditionedSFNO
        config:
          embed_dim: 384
          noise_embed_dim: 0
          filter_type: linear
          use_mlp: true
          num_layers: 8
          operator_type: dhconv
          separable: false
          spectral_layers: 3
          spectral_transform: sht
      normalization:
        network:
          global_means_path: /statsdata/centering.nc
          global_stds_path: /statsdata/scaling-full-field.nc
        residual:
          global_means_path: /statsdata/centering.nc
          global_stds_path: /statsdata/scaling-residual.nc
      secondary_decoder:
        secondary_diagnostic_names:
        - h50
        - h100
        - h150
        - h200
        - h250
        - h300
        - h400
        - h500
        - h600
