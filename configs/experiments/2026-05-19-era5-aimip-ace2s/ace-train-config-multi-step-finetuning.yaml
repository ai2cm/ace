# arg: --dataset andrep/2026-03-19-era5-1deg-8layer-stats-1990-2019:/statsdata
# arg: --dataset 01KSM6K6KEV7K7JXB6XQ3W656C:training_checkpoints/best_inference_ckpt.tar:/ckpt.tar
seed: 0
experiment_dir: /results
save_checkpoint: true
validate_using_ema: true
max_epochs: 120
ema:
  decay: 0.999
inference:
  - n_forward_steps: 7300
    forward_steps_in_memory: 40
    loader:
      start_indices:
        times:
          - '2009-01-01T00:00:00'
          - '2009-02-15T00:00:00'
          - '2009-04-01T00:00:00'
          - '2009-05-15T00:00:00'
          - '2009-07-01T00:00:00'
          - '2009-08-15T00:00:00'
          - '2009-10-01T00:00:00'
          - '2009-11-15T00:00:00'
      dataset:
        data_path: /climate-default/
        file_pattern: 2026-03-19-era5-1deg-8layer-1940-2025.zarr
        engine: zarr
      num_data_workers: 8
    aggregator:
      histogram:
        enabled: true
      time_mean_reference_data: /statsdata/time-mean.nc
    name: inference
    weight: 1.0
  - n_forward_steps: 52960
    forward_steps_in_memory: 100
    loader:
      start_indices:
        times:
          - '1978-10-01T00:00:00'
          - '1978-11-15T00:00:00'
          - '1979-01-01T00:00:00'
          - '1979-02-15T00:00:00'
          - '1979-04-01T00:00:00'
          - '1979-05-15T00:00:00'
          - '1979-07-01T00:00:00'
          - '1979-08-15T00:00:00'
      dataset:
        data_path: /climate-default/
        file_pattern: 2026-03-19-era5-1deg-8layer-1940-2025.zarr
        engine: zarr
      num_data_workers: 8
    aggregator:
      histogram:
        enabled: true
      time_mean_reference_data: /statsdata/time-mean.nc
    name: in_sample_inference
    weight: 0.0
logging:
  log_to_screen: true
  log_to_wandb: true
  log_to_file: true
  project: ace
  entity: ai2cm
train_loader:
  batch_size: 8
  num_data_workers: 8
  prefetch_factor: 2
  dataset:
    data_path: /climate-default/
    file_pattern: 2026-03-19-era5-1deg-8layer-1940-2025.zarr
    engine: zarr
    subset:
      start_time: '1979-01-01'
      stop_time: '2008-12-31'
validation:
  loader:
    batch_size: 64
    num_data_workers: 8
    prefetch_factor: 2
    dataset:
      data_path: /climate-default/
      file_pattern: 2026-03-19-era5-1deg-8layer-1940-2025.zarr
      engine: zarr
      subset:
        start_time: '2009-01-01'
        step: 3
        stop_time: '2014-12-31'
optimization:
  use_gradient_accumulation: true
  enable_automatic_mixed_precision: false
  lr: 0.0001
  optimizer_type: AdamW
  kwargs:
    fused: true
    weight_decay: 0.01
stepper_training:
  n_ensemble: 2
  n_forward_steps:
    outcomes:
      - steps: 1
        probability: 0.6
      - steps: 2
        probability: 0.2
      - steps: 4
        probability: 0.1
      - steps: 12
        probability: 0.05
      - steps: 20
        probability: 0.05
  optimize_last_step_only: true
  loss:
    type: EnsembleLoss
    weights:
      air_temperature_0: 0.5
      air_temperature_1: 0.5
      eastward_wind_0: 0.5
      northward_wind_0: 0.5
      specific_total_water_0: 0.5
      specific_total_water_1: 0.25
      specific_total_water_2: 0.5
      PRATEsfc: 2
      DLWRFsfc: 2
      ULWRFsfc: 5
      USWRFsfc: 2
      DSWRFsfc: 2
      USWRFtoa: 2
      tendency_of_total_water_path_due_to_advection: 0.5
    kwargs:
      crps_weight: 0.9
      energy_score_weight: 0.1
stepper:
  checkpoint_path: /ckpt.tar
