experiment_dir: /results
save_checkpoint: true
validate_using_ema: true
evaluate_before_training: true
ema:
  decay: 0.9995
  faster_decay_at_start: false
max_epochs: 25
inference:
  n_forward_steps: 1440 # just under 20 years
  forward_steps_in_memory: 40
  loader:
    start_indices:
      times:
      # 8 evenly spaced, spanning training and validation sets
      - '0251-01-03T12:00:00'
      - '0262-06-22T12:00:00'
      - '0273-12-09T12:00:00'
      - '0285-05-28T12:00:00'
      - '0296-11-14T12:00:00'
      - '0308-05-03T12:00:00'
      - '0319-10-20T12:00:00'
      - '0331-04-08T12:00:00'
    dataset:
      merge:
      - data_path: /climate-default
        file_pattern: 2025-10-21-cm4-1pctCO2-140yr-no-smoothing-coupled-ocean.zarr
        engine: zarr
      - data_path: /climate-default
        file_pattern: 2025-10-16-cm4-1pctCO2-140yr-ocean-no-smoothing.zarr
        engine: zarr
    num_data_workers: 4
  aggregator:
    log_histograms: false
logging:
  log_to_screen: true
  log_to_wandb: true
  log_to_file: true
  project: ace-samudra-cm4
  entity: ai2cm
  metrics_log_dir: /results/metrics
train_loader:
  batch_size: 16
  num_data_workers: 8
  dataset:
    merge:
    - data_path: /climate-default
      file_pattern: 2025-10-21-cm4-1pctCO2-140yr-no-smoothing-coupled-ocean.zarr
      engine: zarr
      subset:
        start_time: '0256-01-03T12:00:00'
    - data_path: /climate-default
      file_pattern: 2025-10-16-cm4-1pctCO2-140yr-ocean-no-smoothing.zarr
      engine: zarr
      subset:
        start_time: '0256-01-03T12:00:00'
validation_loader:
  batch_size: 16
  num_data_workers: 8
  dataset:
    merge:
    - data_path: /climate-default
      file_pattern: 2025-10-21-cm4-1pctCO2-140yr-no-smoothing-coupled-ocean.zarr
      engine: zarr
      subset:
        start_time: '0251-01-03T12:00:00'
        stop_time: '0255-12-29T12:00:00'
    - data_path: /climate-default
      file_pattern: 2025-10-16-cm4-1pctCO2-140yr-ocean-no-smoothing.zarr
      engine: zarr
      subset:
        start_time: '0251-01-03T12:00:00'
        stop_time: '0255-12-29T12:00:00'
optimization:
  use_gradient_accumulation: true
  enable_automatic_mixed_precision: false
  lr: 0.0001
  optimizer_type: AdamW
  kwargs:
    fused: true
    weight_decay: 0.01
  scheduler:
    schedulers:
      - type: LinearLR
        step_each_iteration: true
        kwargs:
          start_factor: 0.01
          end_factor: 1
          total_iters: 3000
      - type: ConstantLR
        step_each_iteration: true
    milestones: [3000]
stepper_training:
  n_forward_steps:
    outcomes:
      - steps: 1
        probability: 0.25
      - steps: 2
        probability: 0.25
      - steps: 3
        probability: 0.25
      - steps: 4
        probability: 0.25
  optimize_last_step_only: true
  parameter_init:
    weights_path: /ckpt.tar
  loss:
    type: MSE
  residual_loss:
    steps: [1, 2, 3, 4]
    loss:
      type: MSE
    weight: 0.1
    residual_stds_path: /ocean_stats/scaling-residual.nc
    full_state_stds_path: /ocean_stats/scaling-full-field.nc
    std_maps_path: /extra_stats/residual_std_train.nc
