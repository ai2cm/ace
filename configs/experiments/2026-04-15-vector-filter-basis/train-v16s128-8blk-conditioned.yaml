# arg: --dataset oliverwm/era5-1deg-8layer-stats-1990-2019-v2:/statsdata
seed: 0
experiment_dir: /results
save_checkpoint: true
validate_using_ema: true
max_epochs: 120
ema:
  decay: 0.999
inference:
  epochs:
    start: 0
  n_forward_steps: 7300
  forward_steps_in_memory: 40
  loader:
    start_indices:
      times:
        - '1996-01-01T00:00:00'
        - '1996-02-15T00:00:00'
        - '1996-04-01T00:00:00'
        - '1996-05-15T00:00:00'
        - '1996-07-01T00:00:00'
        - '1996-08-15T00:00:00'
        - '1996-10-01T00:00:00'
        - '1996-11-15T00:00:00'
    dataset:
      data_path: /climate-default/2024-06-20-era5-1deg-8layer-1940-2022-netcdfs
    num_data_workers: 8
  aggregator:
    log_histograms: true
    time_mean_reference_data: /statsdata/time-mean.nc
logging:
  log_to_screen: true
  log_to_wandb: true
  log_to_file: true
  project: ace
  entity: ai2cm
train_loader:
  batch_size: 8
  num_data_workers: 8
  prefetch_factor: 4
  dataset:
    strict: false
    concat:
      # Cut around dates when ERA5 parallel streams were merged.
      # See Section 3 of Hersbach 2020 (https://doi.org/10.1002/qj.3803)
      # Bad dates: 1986-04-01, 1993-08-01, 2000-01-01, 2010-01-01,
      # 2015-01-01. Each skip removes the 18Z→00Z discontinuity.
      - data_path: /climate-default/2024-06-20-era5-1deg-8layer-1940-2022-netcdfs
        subset:
          start_time: '1979-01-01T00:00:00'
          stop_time: '1986-03-31T18:00:00'
      - data_path: /climate-default/2024-06-20-era5-1deg-8layer-1940-2022-netcdfs
        subset:
          start_time: '1986-04-01T00:00:00'
          stop_time: '1993-07-31T18:00:00'
      - data_path: /climate-default/2024-06-20-era5-1deg-8layer-1940-2022-netcdfs
        subset:
          start_time: '1993-08-01T00:00:00'
          stop_time: '1995-12-31'
      - data_path: /climate-default/2024-06-20-era5-1deg-8layer-1940-2022-netcdfs
        subset:
          start_time: '2011-01-01'
          stop_time: '2014-12-31T18:00:00'
      - data_path: /climate-default/2024-06-20-era5-1deg-8layer-1940-2022-netcdfs
        subset:
          start_time: '2015-01-01T00:00:00'
          stop_time: '2019-12-31'
      - data_path: /climate-default/2024-06-20-era5-1deg-8layer-1940-2022-netcdfs
        subset:
          start_time: '2021-01-01'
  batch_size: 8
  num_data_workers: 4
  prefetch_factor: 4
validation_loader:
  batch_size: 32
  num_data_workers: 8
  prefetch_factor: 2
  dataset:
    data_path: /climate-default/2024-06-20-era5-1deg-8layer-1940-2022-netcdfs
    subset:
      start_time: '1996-01-01'
      stop_time: '1997-12-31'
optimization:
  enable_automatic_mixed_precision: false
  lr: 0.0001
  optimizer_type: FusedAdam
  max_grad_norm: 1.0
  use_gradient_accumulation: true
  kwargs:
    weight_decay: 0.01
stepper_training:
  n_ensemble: 2
  train_n_forward_steps: 1
  optimize_last_step_only: true
  loss:
    type: EnsembleLoss
    weights:
      air_temperature_0: 0.5
      air_temperature_1: 0.5
      eastward_wind_0: 0.5
      northward_wind_0: 0.5
      specific_total_water_0: 0.5
      specific_total_water_1: 0.25
      specific_total_water_2: 0.5
      PRATEsfc: 0.5
      h500: 10
      TMP850: 5
      Q2m: 0.5
      DLWRFsfc: 2
      ULWRFsfc: 5
      USWRFsfc: 2
      DSWRFsfc: 2
      USWRFtoa: 2
      tendency_of_total_water_path_due_to_advection: 0.5
      PRESsfc: 3
    kwargs:
      crps_weight: 0.9
      energy_score_weight: 0.1
stepper:
  step:
    type: vector_disco
    config:
      residual_prediction: false
      network:
        n_scalar_channels: 128
        n_vector_channels: 16
        n_blocks: 8
        kernel_shape: 3
        mlp_hidden_factor: 1
        activation: gelu
        residual_blocks: true
        scalar_encoder_layers: 0
        num_groups: 8
        embed_dim_noise: 64
        noise_type: isotropic
        embed_dim_pos: 32
      normalization:
        network:
          global_means_path: /statsdata/centering.nc
          global_stds_path: /statsdata/scaling-full-field.nc
        residual:
          global_means_path: /statsdata/centering.nc
          global_stds_path: /statsdata/scaling-residual.nc
      ocean:
        surface_temperature_name: surface_temperature
        ocean_fraction_name: ocean_fraction
      corrector:
        conserve_dry_air: true
        moisture_budget_correction: advection_and_precipitation
        force_positive_names:
        - specific_total_water_0
        - specific_total_water_1
        - specific_total_water_2
        - specific_total_water_3
        - specific_total_water_4
        - specific_total_water_5
        - specific_total_water_6
        - specific_total_water_7
        - Q2m
        - PRATEsfc
        - ULWRFsfc
        - ULWRFtoa
        - DLWRFsfc
        - DSWRFsfc
        - USWRFsfc
        - USWRFtoa
      next_step_forcing_names:
      - DSWRFtoa
      # Wind levels are identified by prefix (eastward_wind_0..7,
      # northward_wind_0..7) and handled as vectors. All other
      # variables are scalar channels.
      in_names:
      - land_fraction
      - ocean_fraction
      - sea_ice_fraction
      - DSWRFtoa
      - HGTsfc
      - global_mean_co2
      - PRESsfc
      - surface_temperature
      - TMP2m
      - Q2m
      - UGRD10m
      - VGRD10m
      - air_temperature_0
      - air_temperature_1
      - air_temperature_2
      - air_temperature_3
      - air_temperature_4
      - air_temperature_5
      - air_temperature_6
      - air_temperature_7
      - specific_total_water_0
      - specific_total_water_1
      - specific_total_water_2
      - specific_total_water_3
      - specific_total_water_4
      - specific_total_water_5
      - specific_total_water_6
      - specific_total_water_7
      - eastward_wind_0
      - eastward_wind_1
      - eastward_wind_2
      - eastward_wind_3
      - eastward_wind_4
      - eastward_wind_5
      - eastward_wind_6
      - eastward_wind_7
      - northward_wind_0
      - northward_wind_1
      - northward_wind_2
      - northward_wind_3
      - northward_wind_4
      - northward_wind_5
      - northward_wind_6
      - northward_wind_7
      out_names:
      - PRESsfc
      - surface_temperature
      - TMP2m
      - Q2m
      - UGRD10m
      - VGRD10m
      - air_temperature_0
      - air_temperature_1
      - air_temperature_2
      - air_temperature_3
      - air_temperature_4
      - air_temperature_5
      - air_temperature_6
      - air_temperature_7
      - specific_total_water_0
      - specific_total_water_1
      - specific_total_water_2
      - specific_total_water_3
      - specific_total_water_4
      - specific_total_water_5
      - specific_total_water_6
      - specific_total_water_7
      - eastward_wind_0
      - eastward_wind_1
      - eastward_wind_2
      - eastward_wind_3
      - eastward_wind_4
      - eastward_wind_5
      - eastward_wind_6
      - eastward_wind_7
      - northward_wind_0
      - northward_wind_1
      - northward_wind_2
      - northward_wind_3
      - northward_wind_4
      - northward_wind_5
      - northward_wind_6
      - northward_wind_7
      - LHTFLsfc
      - SHTFLsfc
      - PRATEsfc
      - ULWRFsfc
      - ULWRFtoa
      - DLWRFsfc
      - DSWRFsfc
      - USWRFsfc
      - USWRFtoa
      - tendency_of_total_water_path_due_to_advection
      - TMP850
      - h500
