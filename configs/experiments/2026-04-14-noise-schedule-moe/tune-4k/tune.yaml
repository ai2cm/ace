resume_results_dir: /previous_results
resume_clear_wandb_run_id: true
log_loss_vs_noise: true
tropical_oversampling:
  lat_threshold: 30.0
  multiplier: 8
static_inputs:
  HGTsfc: /climate-default/2025-09-25-downscaling-data-X-SHiELD-AMIP-downscaling/3km.zarr
  land_fraction: /climate-default/2025-11-19-X-SHiELD-AMIP-downscaling-land-fraction/3km/land_fraction.zarr
model:
  loss_weights:
    noise_weight_exponent: 0.75
  use_amp_bf16: true
  out_names:
  - eastward_wind_at_ten_meters
  - northward_wind_at_ten_meters
  - PRMSL
  - PRATEsfc
  - air_temperature_at_two_meters
  in_names:
  - PRATEsfc
  - eastward_wind_at_ten_meters
  - northward_wind_at_ten_meters
  - PRMSL
  - air_temperature_at_two_meters
  loss:
    type: MSE
  module:
    config:
      model_channels: 128
      attn_resolutions: []
      bottleneck_attention: false
      num_blocks: 1
      channel_mult_emb: 6
      channel_mult:
      - 1
      - 2
      - 2
      - 2
      - 2
      - 2
      use_apex_gn: true
    type: unet_diffusion_song_v2
  normalization:
    coarse:
      global_means_path: /climate-default/2025-09-25-downscaling-data-X-SHiELD-AMIP-downscaling/stats/100km/centering-20260514.nc
      global_stds_path: /climate-default/2025-09-25-downscaling-data-X-SHiELD-AMIP-downscaling/stats/100km/scaling-full-field-20260514.nc
    fine:
      global_means_path: /climate-default/2025-09-25-downscaling-data-X-SHiELD-AMIP-downscaling/stats/3km/centering-20260514.nc
      global_stds_path: /climate-default/2025-09-25-downscaling-data-X-SHiELD-AMIP-downscaling/stats/3km/scaling-full-field-20260514.nc
  num_diffusion_generation_steps: 18
  churn: 0.0
  training_noise_distribution:
    p_min: 200
    p_max: 2000.0
  predict_residual: true
  sigma_max: 2000.0
  sigma_min: 200
  use_fine_topography: true
optimization:
  lr: 0.0001
  optimizer_type: Adam
ema:
  decay: 0.999
validate_using_ema: true
train_data:
  sample_with_replacement: 144
  batch_size: 48
  num_data_workers: 2
  fine:
  - data_path: /climate-default/2026-02-23-X-SHiELD-AMIP-plus-4K-downscaling
    file_pattern: 3km.zarr
    engine: zarr
    n_repeats: 10
    subset:
      interval_length: 6d
      start: 0d
      block_length: 7d
  - merge:
    - data_path: /climate-default/2025-09-25-downscaling-data-X-SHiELD-AMIP-downscaling
      file_pattern: 3km.zarr
      engine: zarr
      subset:
        start_time: '2014-01-01T00:00:00'
        stop_time: '2022-12-31T23:59:00'
    - data_path: /climate-default/2026-02-03-downscaling-data-X-SHiELD-AMIP-pressure-data
      file_pattern: instantaneous_surface_and_sea_level_pressure_3km.zarr
      engine: zarr
      subset:
        start_time: '2014-01-01T00:00:00'
        stop_time: '2022-12-31T23:59:00'
  coarse:
  - data_path: /climate-default/2026-02-23-X-SHiELD-AMIP-plus-4K-downscaling
    file_pattern: 100km.zarr
    engine: zarr
    n_repeats: 10
    subset:
      interval_length: 6d
      start: 0d
      block_length: 7d
  - merge:
    - data_path: /climate-default/2025-09-25-downscaling-data-X-SHiELD-AMIP-downscaling
      file_pattern: 100km.zarr
      engine: zarr
      subset:
        start_time: '2014-01-01T00:00:00'
        stop_time: '2022-12-31T23:59:00'
    - data_path: /climate-default/2026-02-03-downscaling-data-X-SHiELD-AMIP-pressure-data
      file_pattern: prmsl_100km.zarr
      engine: zarr
      subset:
        start_time: '2014-01-01T00:00:00'
        stop_time: '2022-12-31T23:59:00'
  lat_extent:
    start: -66.0
    stop: 70
  strict_ensemble: false
validation_data:
  batch_size: 16
  num_data_workers: 4
  fine:
  - data_path: /climate-default/2026-02-23-X-SHiELD-AMIP-plus-4K-downscaling
    engine: zarr
    file_pattern: 3km.zarr
    subset:
      interval_length: 1d
      start: 6d
      block_length: 7d
  coarse:
  - data_path: /climate-default/2026-02-23-X-SHiELD-AMIP-plus-4K-downscaling
    engine: zarr
    file_pattern: 100km.zarr
    subset:
      interval_length: 1d
      start: 6d
      block_length: 7d
  lat_extent:
    start: 0
    stop: 35
  lon_extent:
    start: 75
    stop: 195
  strict_ensemble: false
  drop_last: true
coarse_patch_extent_lat: 16
coarse_patch_extent_lon: 16
max_epochs: 100
validate_interval: 10
experiment_dir: /results
save_checkpoints: false
logging:
  project: multivariate-downscaling
  entity: ai2cm
  log_to_wandb: true
generate_n_samples: 2
