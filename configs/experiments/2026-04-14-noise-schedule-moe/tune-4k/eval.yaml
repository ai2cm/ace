experiment_dir: /results
n_samples: 2
patch:
  divide_generation: true
  composite_prediction: true
  coarse_horizontal_overlap: 1
model:
  denoising_expert_configs:
    - checkpoint_config:
        checkpoint_path: /checkpoints_low_sigma/best.ckpt
      sigma_min: 0.005
      sigma_max: 200.0
    - checkpoint_config:
        checkpoint_path: /checkpoints_high_sigma/best.ckpt
      sigma_min: 200.0
      sigma_max: 2000.0
  num_diffusion_generation_steps: 18
  churn: 0.0
data:
  #topography: /climate-default/2025-09-25-downscaling-data-X-SHiELD-AMIP-downscaling/3km.zarr
  fine:
  - data_path: /climate-default/2026-02-23-X-SHiELD-AMIP-plus-4K-downscaling
    file_pattern: 3km.zarr
    engine: zarr
    n_repeats: 10
    subset:
      interval_length: 6d
      start: 0d
      block_length: 7d
  coarse:
  - data_path: /climate-default/2026-02-23-X-SHiELD-AMIP-plus-4K-downscaling
    file_pattern: 100km.zarr
    engine: zarr
    n_repeats: 10
    subset:
      interval_length: 6d
      start: 0d
      block_length: 7d
  lat_extent:
    start: 0  #-66.0
    stop: 35 #70.0
  lon_extent:
    start: 75 #230.0
    stop:  195 #246.0
  batch_size: 6
  num_data_workers: 2
  strict_ensemble: false
logging:
  log_to_screen: true
  log_to_wandb: true
  log_to_file: true
  project: multivariate-downscaling
  entity: ai2cm
