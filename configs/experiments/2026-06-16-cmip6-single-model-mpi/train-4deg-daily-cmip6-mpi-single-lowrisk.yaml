      - USWRFsfc
      - USWRFtoa
      - UCLWRFtoa
      - UCSWRFsfc
      - UCSWRFtoa
      - DCLWRFsfc
      - DCSWRFsfc
      - wap500
      - ua10
      - ua50
      - ua100
      - ua250
      - ua500
      - ua700
      - ua850
      - ua1000
      - va10
      - va50
      - va100
      - va250
      - va500
      - va700
      - va850
      - va1000
      - hus10
      - hus50
      - hus100
      - hus250
      - hus500
      - hus700
