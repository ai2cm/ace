# Straight fine-tune onto ERA5 (4°/daily) of the REPRODUCTION-arm SHiELD+
# pre-train donor — the paper-faithful (original-style) 4°/daily ACE2S-SHiELD+
# arm's epoch-120 (end-of-1-step) checkpoint (research: investigations/
# 2026-07-13-transfer-learning-straight-finetune; donor wandb f3fhd6hn, beaker
# 01KWFVPC…). This arm carries the ERA5-v2 4°/daily data/loader/eval recipe
# with the PAPER model block swapped in (original-style: no spectral ratio, no
# filter groups, no residual, no tnorm — the paper builder + per-variable loss
# weights). Its job is to reproduce the known 1°/6h failure at 4°/daily — i.e.
# fine-tuning should WIPE the donor's +4K and future-scenario responses —
# validating 4°/daily as a faithful proxy and making the modern arm's result
# attributable to the modern recipe.
#
# Deltas from the modern-arm fine-tune config (train-…-modern.yaml):
#   - # arg mounts the reproduction (paper-arm) donor checkpoint instead.
#   - builder: the paper architecture (noise_embed_dim 64, separable: false,
#     spectral_layers 3, spectral_transform sht; NO filter_num_groups /
#     spectral_ratio / normalize_big_skip / clip_latent_global_means).
#   - residual_prediction: false (original-style, no residual).
#   - global_mean_removal (tnorm): removed (original-style, no tnorm).
#   - loss: the paper's per-variable EnsembleLoss weights.
# Data, ERA5 stats, loaders, inline eval, optimizer, 1-step, 120 epochs, and
# the donor in_names/out_names ordering are shared with the modern arm.
#
# arg: --dataset 01KX1XJ4JGZM0WEDBT3FCCE5ZF:training_checkpoints/ckpt_0120.tar:/pre-trained-checkpoint/ckpt.tar
seed: 0
experiment_dir: /results
save_checkpoint: true
checkpoint_every_n_batches: 5000
validate_using_ema: true
ema_checkpoint_save_epochs:
  start: 5
  step: 5
max_epochs: 120
ema:
  decay: 0.999
train_aggregator:
  ensemble_metrics: true
