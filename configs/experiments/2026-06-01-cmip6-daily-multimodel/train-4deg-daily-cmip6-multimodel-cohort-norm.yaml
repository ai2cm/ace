      - [EC-Earth3, ssp585, r3i1p1f1]
      - [IPSL-CM6A-LR, historical, r2i1p1f1]
      # (B) UKESM1-0-LL ssp585 — every variant (5 rows).
      - [UKESM1-0-LL, ssp585, r1i1p1f2]
      - [UKESM1-0-LL, ssp585, r2i1p1f2]
      - [UKESM1-0-LL, ssp585, r3i1p1f2]
      - [UKESM1-0-LL, ssp585, r4i1p1f2]
      - [UKESM1-0-LL, ssp585, r8i1p1f2]
      # (B) MPI-ESM1-2-LR ssp585 — every variant (5 rows).
      - [MPI-ESM1-2-LR, ssp585, r1i1p1f1]
      - [MPI-ESM1-2-LR, ssp585, r2i1p1f1]
      - [MPI-ESM1-2-LR, ssp585, r3i1p1f1]
      - [MPI-ESM1-2-LR, ssp585, r4i1p1f1]
      - [MPI-ESM1-2-LR, ssp585, r5i1p1f1]
      # (C) CanESM5 — keep only historical/r1i1p1f1, drop everything
      # else. 29 rows.
      - [CanESM5, historical, r1i1p2f1]
      - [CanESM5, historical, r2i1p1f1]
      - [CanESM5, historical, r2i1p2f1]
      - [CanESM5, historical, r3i1p1f1]
      - [CanESM5, historical, r3i1p2f1]
      - [CanESM5, historical, r4i1p1f1]
      - [CanESM5, historical, r4i1p2f1]
      - [CanESM5, historical, r5i1p1f1]
      - [CanESM5, historical, r5i1p2f1]
      - [CanESM5, ssp245, r1i1p1f1]
      - [CanESM5, ssp245, r1i1p2f1]
      - [CanESM5, ssp245, r2i1p1f1]
      - [CanESM5, ssp245, r2i1p2f1]
      - [CanESM5, ssp245, r3i1p1f1]
      - [CanESM5, ssp245, r3i1p2f1]
      - [CanESM5, ssp245, r4i1p1f1]
      - [CanESM5, ssp245, r4i1p2f1]
      - [CanESM5, ssp245, r5i1p1f1]
      - [CanESM5, ssp245, r5i1p2f1]
      - [CanESM5, ssp585, r1i1p1f1]
      - [CanESM5, ssp585, r1i1p2f1]
      - [CanESM5, ssp585, r2i1p1f1]
      - [CanESM5, ssp585, r2i1p2f1]
      - [CanESM5, ssp585, r3i1p1f1]
      - [CanESM5, ssp585, r3i1p2f1]
      - [CanESM5, ssp585, r4i1p1f1]
      - [CanESM5, ssp585, r4i1p2f1]
      - [CanESM5, ssp585, r5i1p1f1]
      - [CanESM5, ssp585, r5i1p2f1]
      # (C) GFDL-CM4 — keep only historical/r1i1p1f1, drop ssp245 + ssp585.
      - [GFDL-CM4, ssp245, r1i1p1f1]
      - [GFDL-CM4, ssp585, r1i1p1f1]
    time_masks:
      # (D) temporal-interpolation: drop 1970-1989 from INM-CM5-0 and
      # NorESM2-LM historical. Per-variant splits happen inside the
      # data loader.
      - source_ids: [INM-CM5-0, NorESM2-LM]
        experiments: [historical]
        keep_before: '1969-12-31'
        keep_after: '1990-01-01'

optimization:
  enable_automatic_mixed_precision: false
  lr: 0.0001
  optimizer_type: FusedAdam
  use_gradient_accumulation: true
  kwargs:
    weight_decay: 0.01

stepper_training:
  n_ensemble: 2
  n_forward_steps: 1
  optimize_last_step_only: true
  loss:
    type: EnsembleLoss
    # Uniform per-variable weights per training_run_1 §validation
    # ("Omit per-variable weights"). Reference's ERA5-tuned weights
    # don't transfer cleanly to v2's variable set.
    weights: {}
    kwargs:
      crps_weight: 0.9
      energy_score_weight: 0.1

# ---------------------------------------------------------------------
# Stepper: NoiseConditionedSFNO backbone, cohort normalization.
# Per-source variant lives in the sibling
# train-4deg-daily-cmip6-multimodel-per-source-norm.yaml — only the
# per_source_normalization block + builder's conditional flag differ.
# ---------------------------------------------------------------------
stepper:
  step:
    type: cmip6
    config:
      residual_prediction: false
      builder:
        type: NoiseConditionedSFNO
        # ``conditional: true`` because Cmip6DataConfig emits labels
        # unconditionally and the stepper passes them through to the
        # model. The framework rejects labels for unconditional
        # builders (``TypeError: Labels are not allowed for
        # unconditional models``) so we can't run cohort norm with
        # ``conditional: false`` without a framework change. The
        # practical difference from the per-source variant: this
        # variant uses cohort centering / scaling rather than
        # per-source, but the network still receives the label
        # embedding into its conditional layer norms. Treat it as
        # "label-aware-but-cohort-normalized" rather than truly
        # unconditional.
        conditional: true
        # Tolerate sub-universal output variables (radiation /
        # heat-flux diagnostics missing from ~half the cohort) by
        # masking them per-sample rather than dropping the dataset.
        # Cmip6StepConfig delegates allow_missing_variables to this
        # flag.
        allow_missing_variables: true
        config:
          embed_dim: 512
          noise_embed_dim: 32
          noise_type: isotropic
          filter_type: linear
          affine_norms: true
          normalize_big_skip: true
          filter_num_groups: 1
          use_mlp: true
          num_layers: 8
          operator_type: dhconv
      normalization:
        # ``fill_nans_on_normalize: true`` is required because
        # ``allow_missing_variables: true`` on the builder lets
        # datasets without a given output variable contribute
        # NaN-filled slabs. The per-sample ``data_mask`` zeroes out
        # those contributions in the loss aggregator, but ``0 * NaN``
        # is still NaN; the fill on normalize step replaces them
        # with zeros first so the loss tensors stay finite.
        network:
          global_means_path: /climate-default/2026-05-22-cmip6-multimodel-daily-4deg-8plev-1940-2100/v2/normalization_full/centering.nc
          global_stds_path: /climate-default/2026-05-22-cmip6-multimodel-daily-4deg-8plev-1940-2100/v2/normalization_full/scaling.nc
          fill_nans_on_normalize: true
        residual:
          global_means_path: /climate-default/2026-05-22-cmip6-multimodel-daily-4deg-8plev-1940-2100/v2/normalization_full/residual_centering.nc
          global_stds_path: /climate-default/2026-05-22-cmip6-multimodel-daily-4deg-8plev-1940-2100/v2/normalization_full/residual_scaling.nc
          fill_nans_on_normalize: true
      corrector:
        # Dry-air mass conservation only. Moisture-budget correction
        # (advection + precipitation) needs evap + advection-tendency
        # variables that v2 doesn't carry, and force_positive
        # constraints on hus / radiation aren't guaranteed at the
        # source by all publishers — so we skip both and let the
        # network output whatever it learns.
        conserve_dry_air: true
      # Pass per-variable mask channels to the model. With
      # ``allow_missing_variables: true`` on the builder, the loader
      # NaN-fills variables a dataset doesn't publish. The step
      # logic then zeros those entries in normalized space and
      # appends one mask channel per ``in_names`` entry (1.0
      # present, 0.0 masked). Without these channels the model
      # would see "0" indistinguishable from "missing" — see
      # ``fme.core.step.masking`` and Cmip6Step.step for the
      # mechanics.
      include_channel_mask_inputs: true
      # Input-only variables are restricted to statics + exogenous
      # forcings (training_run_1 §variables — "I'd like the only
      # input-only variables to be the static and input4mips ones").
      # Everything else is a real prognostic and lives in both
      # ``in_names`` and ``out_names``. Monthly-causal variables
      # (amon_ts, omon_*, simon_*) are dropped entirely from this
      # run because their stepped-monthly cadence would teach the
      # model an artificially smooth target.
      in_names:
        # ---- input-only: statics ----
        - HGTsfc
        - land_fraction
        # ---- input-only: exogenous forcings ----
        - log_input4mips_co2
        - input4mips_so2
        - input4mips_bc
        - luh2_forest
        # ---- prognostic-class: in + out (every variable below
        # is also in out_names — foundation-model framing, with
        # allow_missing handling per-dataset coverage gaps).
        # Monthly-causal variables (amon_ts, omon_*, simon_*) are
        # excluded because their stepped-monthly cadence would
        # teach an artificially smooth daily target.
        # CFday-augmented variables (clear-sky + TOA radiation, w500,
        # cloud-water paths, surface pressure) are included as
        # sub-universal daily variables with allow_missing handling.
        # process_esgf.py's day-cadence augmenter (commit 025c294fd)
        # pulled them from ESGF for the (source, experiment, member)
        # tuples that publish on CFday/day; v2.5 cohort coverage is
        # listed inline below per variable. ``total_water_path``
        # (derived from water_vapor_path + clwvi) is omitted — only
        # 2% of v2.5 datasets have both inputs present.
        # ---- Surface (universal) ----
        - TMP2m
        - Q2m
        - UGRD10m
        - VGRD10m
        - PRATEsfc
        - h500
        - psl
        # ---- Surface (sub-universal daily) ----
        - sfcWind                  # 85%
        - surface_temperature      # 43% — daily Eday.ts (was eday_ts pre-0.8.0)
        - water_vapor_path         # 40% — Eday.prw
        - oday_tos                 # 56% — daily SST
        - oday_sos                 # 23% — daily sea surface salinity
        - oday_tossq               # 19% — daily SST²
        - oday_omldamax            # 10% — daily max mixed-layer depth
        - siday_sitemptop          # 39% — daily sea-ice top T
        - siday_sithick            # 28% — daily sea-ice thickness
        - siday_sea_ice_fraction   # 27% — daily sea-ice fraction
        - TMP700                   # 22% — 700 hPa T
        - PRESsfc                  # 38% — surface pressure
        # ---- Radiative + heat-flux diagnostics (day + CFday) ----
        - DLWRFsfc                 # 93%
        - DSWRFsfc                 # 97%
        - ULWRFsfc                 # 93%
        - USWRFsfc                 # 74%
        - ULWRFtoa                 # 88%
        - SHTFLsfc                 # 80% (assumed; existed pre-augment)
        - LHTFLsfc                 # 89% (assumed; existed pre-augment)
        # CFday TOA / clear-sky radiation (new in v2.5 cohort).
        - DSWRFtoa                 # 27% — TOA incoming SW
        - USWRFtoa                 # 27% — TOA outgoing SW
        - UCLWRFtoa                # 22% — TOA clear-sky outgoing LW
        - UCSWRFsfc                # 28% — surface clear-sky outgoing SW
        - UCSWRFtoa                # 28% — TOA clear-sky outgoing SW
        - DCLWRFsfc                # 28% — surface clear-sky incoming LW
        - DCSWRFsfc                # 32% — surface clear-sky incoming SW
        # CFday dynamics / cloud-water tracers (new in v2.5 cohort).
        - wap500                   # 23% — pressure velocity at 500 hPa
        - clivi                    # 19% — cloud ice water path
        - clwvi                    # 16% — total cloud water path
        # ---- 3D plev prognostics (universal) ----
        - ua10
        - ua50
        - ua100
        - ua250
        - ua500
        - ua700
        - ua850
        - ua1000
        - va10
        - va50
        - va100
        - va250
        - va500
        - va700
        - va850
        - va1000
        - hus10
        - hus50
        - hus100
        - hus250
        - hus500
        - hus700
        - hus850
        - hus1000
        - zg10
        - zg50
        - zg100
        - zg250
        - zg700
        - zg850
        - zg1000
        # NB: Mask channels (``below_surface_mask*``, ``oday_*_mask``,
        # ``siday_*_mask``) intentionally excluded from this first
        # training run — we don't want to prescribe them as inputs
        # and the long-rollout-cycle case for them is shaky (model
        # has to keep predicting a sensible 0/1 field for hundreds of
        # steps). Sub-universal-ocean variables are still in
        # in_names + out_names; on datasets that lack them, the
        # ``allow_missing_variables`` + ``fill_nans_on_normalize``
        # path handles them with infilling rather than masking.
        # Plan: add masks back in a follow-up run after baseline.
      out_names:
        # Surface prognostics (universal)
        - TMP2m
        - Q2m
        - UGRD10m
        - VGRD10m
        - PRATEsfc
        - h500
        - psl
        # Surface (sub-universal daily)
        - sfcWind
        - surface_temperature
        - water_vapor_path
        - oday_tos
        - oday_sos
        - oday_tossq
        - oday_omldamax
        - siday_sitemptop
        - siday_sithick
        - siday_sea_ice_fraction
        - TMP700
        - PRESsfc
        # Radiative + heat-flux diagnostics (day + CFday)
        - DLWRFsfc
        - DSWRFsfc
        - ULWRFsfc
        - USWRFsfc
        - ULWRFtoa
        - SHTFLsfc
        - LHTFLsfc
        - DSWRFtoa
        - USWRFtoa
        - UCLWRFtoa
        - UCSWRFsfc
        - UCSWRFtoa
        - DCLWRFsfc
        - DCSWRFsfc
        # CFday dynamics / cloud-water tracers
        - wap500
        - clivi
        - clwvi
        # 3D plev prognostics
        - ua10
        - ua50
        - ua100
        - ua250
        - ua500
        - ua700
        - ua850
        - ua1000
        - va10
        - va50
