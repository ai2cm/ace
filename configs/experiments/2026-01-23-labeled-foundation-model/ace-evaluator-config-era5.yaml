experiment_dir: /results
n_forward_steps: 62820
forward_steps_in_memory: 50
checkpoint_path: /ckpt.tar
logging:
  log_to_screen: true
  log_to_wandb: true
  log_to_file: true
  project: ace
  entity: ai2cm
loader:
  start_indices:
    times:
      - '1979-01-01T00:00:00'
  dataset:
    data_path: /climate-default/2024-06-20-era5-1deg-8layer-1940-2022-netcdfs
    labels: ["era5"]
  num_data_workers: 16
aggregator:
  log_zonal_mean_images: false
data_writer:
  save_prediction_files: false
  save_monthly_files: false
validation:
  loader:
    batch_size: 32
    num_data_workers: 4
    prefetch_factor: 2
    time_buffer: 4
    dataset:
      strict: false
      concat:
        - data_path: /climate-default/2024-06-20-era5-1deg-8layer-1940-2022-netcdfs
          labels: ["era5"]
          subset:
            start_time: '2010-01-01'
            stop_time: '2012-12-31'
  loss:
    type: EnsembleLoss
    kwargs:
      crps_weight: 0.5
      energy_score_weight: 0.5
