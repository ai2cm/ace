experiment_dir: /results
n_forward_steps: 62820
forward_steps_in_memory: 50
checkpoint_path: /ckpt.tar
logging:
  log_to_screen: true
  log_to_wandb: true
  log_to_file: true
  project: ace
  entity: ai2cm
loader:
  start_indices:
    times:
      - '2020-01-01T06:00:00'
  dataset:
    data_path: /climate-default/2025-08-22-vertically-resolved-1deg-c96-shield-ramped-climSST-random-CO2-ensemble-fme-dataset
    file_pattern: ramped-sst-4xCO2-random-perturbation-ic_0003.zarr
    engine: zarr
    labels: ["c96-shield"]
  num_data_workers: 16
aggregator:
  log_zonal_mean_images: false
data_writer:
  save_prediction_files: false
  save_monthly_files: false
validation:
  loader:
    batch_size: 16
    num_data_workers: 4
    prefetch_factor: 2
    time_buffer: 4
    dataset:
      data_path: /climate-default/2025-08-22-vertically-resolved-1deg-c96-shield-ramped-climSST-random-CO2-ensemble-fme-dataset
      file_pattern: ramped-sst-3xCO2-random-perturbation-ic_0003.zarr
      engine: zarr
      labels: ["c96-shield"]
      subset:
        start_time: '2010-01-01'
        stop_time: '2012-12-31'
  loss:
    type: EnsembleLoss
    kwargs:
      crps_weight: 0.5
      energy_score_weight: 0.5
