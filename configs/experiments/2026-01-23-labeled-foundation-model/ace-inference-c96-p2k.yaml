checkpoint_path: /ckpt.tar
allow_incompatible_dataset: true
data_writer:
  save_monthly_files: false
  save_prediction_files: false
experiment_dir: /results
forward_steps_in_memory: 40
n_forward_steps: 1460
labels: ["c96-shield"]
initial_condition:
  path: /climate-default/2026-01-28-vertically-resolved-c96-1deg-shield-amip-ensemble-dataset/ic_0002.zarr
  engine: zarr
  start_indices:
    times:
      - '1979-01-01T00:00:00'
forcing_loader:
  dataset:
    data_path:  /climate-default/2026-01-28-vertically-resolved-c96-1deg-shield-amip-ensemble-dataset/
    file_pattern: ic_0002.zarr
    engine: zarr
    labels: ["c96-shield"]
  num_data_workers: 8
  perturbations:
    sst:
      - type: constant
        config:
          amplitude: 2.0
logging:
  project: ace
