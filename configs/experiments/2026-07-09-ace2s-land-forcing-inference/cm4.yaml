# ACE2S land-forcing short-lead evaluation — CM4-piControl (uncoupled atmosphere-only).
# Checkpoint-agnostic (see era5.yaml). Serves the CM4 control (rs0/rs1) and the cm4-snow /
# cm4-soil treatments. cm4-soil's input_masking is carried in the checkpoint, not set here.
experiment_dir: gs://vcm-ml-intermediate/2026-07-09-ace2s-land-forcing-inference/PLACEHOLDER
n_forward_steps: 40           # 6-hourly => ~10 days; short-lead only (land forcing leaks future)
forward_steps_in_memory: 1    # GPU mem ~ n_initial_conditions on a 178GB B200. 150 ~= 80% of the
                              # ~190 IC-step ceiling (from land-feedback inference); 300 OOMed. See README.
checkpoint_path: /ckpt.tar
n_ensemble_per_ic: 1
logging:
  log_to_screen: true
  log_to_wandb: true
  log_to_file: false
  project: ace
loader:
  dataset:
    data_path: /climate-default/
    file_pattern: 2025-03-21-CM4-piControl-atmosphere-land-1deg-8layer-200yr.zarr
    engine: zarr
  start_indices:
    # 150 ICs, every 97 days from 0311-01-01T06, spanning the 0311-0351 holdout (out-of-sample:
    # CM4 train <=0306, val 0306-0311 — identical split for the control checkpoints). noleap
    # calendar; 97-day spacing (> the 40-step window, does not divide 365 so no seasonal
    # aliasing) precesses through the seasons; last IC 0350-08-07 stays within the holdout.
