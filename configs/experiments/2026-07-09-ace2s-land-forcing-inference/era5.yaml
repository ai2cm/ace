      save_reference: true        # writes both _prediction and _target for every name below
      format:
        name: zarr
      names:
        - surface_temperature
        - air_temperature_7
        - TMP2m
        - PRATEsfc
        - total_frozen_precipitation_rate
        - surface_evaporative_fraction
        - implied_surface_albedo
