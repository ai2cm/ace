# ACE2S land-forcing short-lead evaluation — ERA5.
# Checkpoint-agnostic: `checkpoint_path` is mounted at /ckpt.tar and `experiment_dir` is set per
# run by run-inference.sh (--override). Same config serves the ERA5 control and the era5-snow /
# era5-soil treatments — the forcing variables (surface_snow_area_fraction / soil_moisture_0..3)
# are carried in each checkpoint's in_names, so the loader auto-requires them from the dataset.
experiment_dir: gs://vcm-ml-intermediate/2026-07-09-ace2s-land-forcing-inference/PLACEHOLDER
n_forward_steps: 40           # 6-hourly => ~10 days; short-lead only (land forcing leaks future)
forward_steps_in_memory: 2    # memory ~ n_initial_conditions x this; 300 x 2 = 600 in-flight IC-steps
checkpoint_path: /ckpt.tar
n_ensemble_per_ic: 1
logging:
  log_to_screen: true
  log_to_wandb: true
  log_to_file: false
  project: ace
loader:
  dataset:
    data_path: /climate-default/
    file_pattern: 2026-03-19-era5-1deg-8layer-1940-2025.zarr
    engine: zarr
  start_indices:
    # 300 ICs, every 15 days from 1998-01-01, spanning the 1998-2010 holdout (out-of-sample:
    # ERA5 train = <=1995 + 2011-2019 + >=2021, val = 1996-1997 — identical split for the
    # control checkpoint, so this window is out-of-sample for every model compared). 15-day
    # spacing (> the 40-step window) precesses through the seasons; last IC 2010-04-13 leaves
    # margin before the 2011 train block. See README for how these were generated.
    times:
      - '1998-01-01T00:00:00'
      - '1998-01-16T00:00:00'
      - '1998-01-31T00:00:00'
      - '1998-02-15T00:00:00'
