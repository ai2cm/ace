experiment_dir: /results
n_forward_steps: 2100  # ~2 years of out-of-sample (2022-2023) at 5-day resolution
forward_steps_in_memory: 40
checkpoint_path: /ckpt.tar
logging:
  log_to_screen: true
  log_to_wandb: true
  log_to_file: true
  project: ace-samudra-ufs
  entity: ai2cm
loader:
  start_indices:
    times:
    - '1994-01-01T12:00:00'
  dataset:
    data_path: /climate-default
    file_pattern: 2026-06-03-ufs-replay-ocean-1deg-19level-5day-1994-2023.zarr
    engine: zarr
  num_data_workers: 4
data_writer:
  save_prediction_files: false
  save_monthly_files: false
aggregator:
  histogram:
    enabled: true
