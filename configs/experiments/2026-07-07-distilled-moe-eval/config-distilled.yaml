# CONUS evaluation of the distilled 2-step MoE student bundle (Student-Hi +
# Student-Lo, fastgen predict-x0-renoise cascade) on the 2023 holdout year,
# against 3 km X-SHiELD AMIP ground truth. Identical data/patch/n_samples to
# config-teacher.yaml for a direct comparison; only the model section differs.
experiment_dir: /results
n_samples: 4
patch:
  divide_generation: true
  composite_prediction: true
  coarse_horizontal_overlap: 1
model:
  # Distilled student bundle assembled by run.sh's `bundle` mode and written to
  # weka (mounted via --weka climate-default:/climate-default). Carries
  # sampler_type="fastgen_cascade", so DenoisingMoEBundledConfig.build() loads it
  # as the DenoisingMoEStudentPredictor (renoise cascade), not the EDM teacher.
  mixture_of_experts_path: /climate-default/2026-07-07-distilled-moe-bundle/distilled_moe_bundle.ckpt
data:
  coarse:
  - merge:
    - data_path: /climate-default/2025-09-25-downscaling-data-X-SHiELD-AMIP-downscaling
      file_pattern: 100km.zarr
      engine: zarr
      subset:
        start_time: '2023-01-01T00:00:00'
        stop_time: '2023-12-31T23:59:59'
    - data_path: /climate-default/2026-02-03-downscaling-data-X-SHiELD-AMIP-pressure-data
      file_pattern: prmsl_100km.zarr
      engine: zarr
      subset:
        start_time: '2023-01-01T00:00:00'
        stop_time: '2023-12-31T23:59:59'
  fine:
  - merge:
    - data_path: /climate-default/2025-09-25-downscaling-data-X-SHiELD-AMIP-downscaling
      file_pattern: 3km.zarr
      engine: zarr
      subset:
        start_time: '2023-01-01T00:00:00'
        stop_time: '2023-12-31T23:59:59'
    - data_path: /climate-default/2026-02-03-downscaling-data-X-SHiELD-AMIP-pressure-data
      file_pattern: instantaneous_surface_and_sea_level_pressure_3km.zarr
      engine: zarr
      subset:
        start_time: '2023-01-01T00:00:00'
        stop_time: '2023-12-31T23:59:59'
  lat_extent:
    start: 22.0
    stop: 50.0
  lon_extent:
    start: 230.0
    stop: 295.0
  batch_size: 16
  num_data_workers: 2
  strict_ensemble: false
# Events ported from ai2cm/andrep-downscaling/j3thqivd (hirov1 CONUS eval). Each
# event subsets its own lat/lon region from the full dataset, independent of the
# CONUS `data` extent above (so the West Pacific events are fine).
events:
- name: WA_AR_20230101
  date: 2023-01-01T06:00
  lat_extent:
    start: 36
    stop: 52
  lon_extent:
    start: 228
    stop: 244
  save_generated_samples: true
  n_samples: 16
- name: WPacific_hurricane_20230425
  date: 2023-04-25T18:00
  lat_extent:
    start: 7
    stop: 23
  lon_extent:
    start: 130.0
    stop: 146.0
  save_generated_samples: true
  n_samples: 16
- name: WPacific_hurricane_landfall_china_20230510
  date: 2023-05-10T12:00
  lat_extent:
    start: 7
    stop: 23
  lon_extent:
    start: 104
    stop: 120
  save_generated_samples: true
  n_samples: 16
logging:
  log_to_screen: true
  log_to_wandb: true
  log_to_file: true
  project: andrep-downscaling
  entity: ai2cm
