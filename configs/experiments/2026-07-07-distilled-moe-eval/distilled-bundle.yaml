# DenoisingMoEStudentConfig for assembling the distilled 2-step MoE student bundle.
# Feed to scripts/downscaling/bundle_denoising_moe_checkpoint.py:
#   python scripts/downscaling/bundle_denoising_moe_checkpoint.py \
#       configs/experiments/2026-07-07-distilled-moe-eval/distilled-bundle.yaml \
#       distilled_moe_bundle.ckpt
#
# Source per-expert student checkpoints (single-net .ckpt written by the training
# callback — training does NOT emit a bundle):
#   Expert 0 (Lo, sigma[0.005,200], 2-step): beaker 01KWJAFM694MAE55M2JMZSE89M
#     (…-baseline-fixed-moe-teacher-expert0)
#   Expert 1 (Hi, sigma[200,2000], 1-step): beaker 01KWTXGAM1CCGDH29JWDSN9KPF
#     (…-hi-1step-moe-teacher-expert1)
#
# run.sh's `bundle` mode mounts each source dataset's
# fastgen/<experiment>/student_checkpoints subpath at /lo and /hi (subpath mount,
# so unrelated files are not downloaded). Both use best_student_tail.ckpt.
# Hi's checkpoint choice is essentially arbitrary-but-fine: the cascade metric
# was flat across training, so every Hi checkpoint performs ~identically
# end-to-end (see MOE_DISTILLATION_STATUS.md).
#
# The Hi checkpoint is first repaired (repair_student_checkpoint_config.py):
# it was saved with expert-0's 128-wide config over expert-1's 256-wide weights,
# so the bundle `bundle` job rewrites it with expert-1's config (from the teacher
# bundle) to the weka path below before assembling. Lo is loaded directly from
# its mount (its config was already correct).

# steps_per_range aligns with ascending-sigma order: 2-step Lo, 1-step Hi.
steps_per_range: [2, 1]
denoising_expert_configs:
  - sigma_min: 0.005
    sigma_max: 200.0
    checkpoint_config:
      checkpoint_path: /lo/best_student_tail.ckpt
  - sigma_min: 200.0
    sigma_max: 2000.0
    checkpoint_config:
      checkpoint_path: /climate-default/2026-07-07-distilled-moe-bundle/hi_best_student_tail_fixed.ckpt
