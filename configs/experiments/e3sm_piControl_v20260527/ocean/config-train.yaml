experiment_dir: FME_OUTPUT_DIR
save_checkpoint: true
validate_using_ema: true
ema:
  decay: 0.999
max_epochs: 150
inference:
  n_forward_steps: 876
  forward_steps_in_memory: 20
  loader:
    start_indices:
      times:
      - '0401-01-03T12:00:00'
      - '0413-01-03T12:00:00'
      - '0425-01-03T12:00:00'
      - '0437-01-03T12:00:00'
      - '0449-01-03T12:00:00'
      - '0461-01-03T12:00:00'
      - '0473-01-03T12:00:00'
      - '0484-01-03T12:00:00'
    dataset:
      merge:
      - data_path: /pscratch/sd/e/elynnwu/fme-dataset
        file_pattern: 2026-05-27-E3SMv3-piControl-100yr-coupled-ocean.zarr
        engine: zarr
      - data_path: /pscratch/sd/e/elynnwu/fme-dataset
        file_pattern: 2026-05-26-E3SMv3-piControl-ocean-100yr-5D-average.zarr
        engine: zarr
    num_data_workers: 4
  aggregator:
    log_histograms: false
logging:
  log_to_screen: true
  log_to_wandb: true
  log_to_file: true
  project: ocean-emulator-e3sm
  entity: ai2cm
train_loader:
  batch_size: 16
  num_data_workers: 4
  prefetch_factor: 2
  dataset:
    merge:
    - data_path: /pscratch/sd/e/elynnwu/fme-dataset
      file_pattern: 2026-05-27-E3SMv3-piControl-100yr-coupled-ocean.zarr
      engine: zarr
      subset:
        start_time: '0401-01-03'
        stop_time: '0491-01-01'
    - data_path: /pscratch/sd/e/elynnwu/fme-dataset
      file_pattern: 2026-05-26-E3SMv3-piControl-ocean-100yr-5D-average.zarr
      engine: zarr
      subset:
        start_time: '0401-01-03'
        stop_time: '0491-01-01'
validation_loader:
  batch_size: 16
  num_data_workers: 4
  prefetch_factor: 2
  dataset:
    merge:
    - data_path: /pscratch/sd/e/elynnwu/fme-dataset
      file_pattern: 2026-05-27-E3SMv3-piControl-100yr-coupled-ocean.zarr
      engine: zarr
      subset:
        start_time: '0491-01-03'
        stop_time: '0496-01-01'
    - data_path: /pscratch/sd/e/elynnwu/fme-dataset
      file_pattern: 2026-05-26-E3SMv3-piControl-ocean-100yr-5D-average.zarr
      engine: zarr
      subset:
        start_time: '0491-01-03'
        stop_time: '0496-01-01'
optimization:
  use_gradient_accumulation: true
  enable_automatic_mixed_precision: false
  lr: 0.0001
  optimizer_type: AdamW
  kwargs:
    fused: true
    weight_decay: 0.01
stepper_training:
  n_forward_steps: 4
  loss:
    type: MSE
stepper:
  input_masking:
    mask_value: 0
    fill_value: 0
    exclude_names_and_prefixes:
    - land_fraction
    - TAUX
    - TAUY
    - surface_precipitation_rate
    - frozen_precipitation_rate
    - FLUS
    - FSUS
    - FLDS
    - FSDS
    - LHFLX
    - SHFLX    
  step:
    type: single_module
    config:
      builder:
        type: Samudra
        config:
          ch_width:
          - 280
          - 380
          - 480
          - 520
          dilation:
          - 1
          - 2
          - 4
          - 8
          n_layers:
          - 1
          - 1
          - 1
          - 1
          norm: instance
          upscale_factor: 2
          checkpoint_strategy: all
      normalization:
        network:
          global_means_path: FME_STATS_DIR/centering.nc
          global_stds_path: FME_STATS_DIR/scaling-full-field.nc
      corrector:
        type: ocean_corrector
        config:
          force_positive_names:
          - salinityCoarsened_0
          - salinityCoarsened_1
          - salinityCoarsened_2
          - salinityCoarsened_3
          - salinityCoarsened_4
          - salinityCoarsened_5
          - salinityCoarsened_6
          - salinityCoarsened_7
          - salinityCoarsened_8
          - salinityCoarsened_9
          - salinityCoarsened_10
          - salinityCoarsened_11
          - salinityCoarsened_12
          - salinityCoarsened_13
          - salinityCoarsened_14
          - salinityCoarsened_15
          - salinityCoarsened_16
          - salinityCoarsened_17
          - salinityCoarsened_18
          - iceVolumeTotal
          sea_ice_fraction_correction:
            sea_ice_fraction_name: ocean_sea_ice_fraction
            land_fraction_name: LANDFRAC
            remove_negative_ocean_fraction: false
            sea_ice_thickness_name: iceVolumeTotal
            zero_where_ice_free_names:
              - iceVolumeTotal
      next_step_forcing_names:
      - TAUX
      - TAUY
      - surface_precipitation_rate
      - frozen_precipitation_rate
      - FLUS
      - FSUS
      - FLDS
      - FSDS
      - LHFLX
      - SHFLX
      in_names:
      # time-invariant
      - LANDFRAC
      - sea_surface_fraction    
      # atmosphere forcing  
      - TAUX
      - TAUY
      - surface_precipitation_rate
      - frozen_precipitation_rate
      - FLUS
      - FSUS
      - FLDS
      - FSDS
      - LHFLX
      - SHFLX
      # ocean prognostic
