experiment_dir: /results
save_checkpoint: true
validate_using_ema: true
max_epochs: 120
n_forward_steps: 2
seed: 0
ema:
  decay: 0.999
inference:
  n_forward_steps: 7300
  forward_steps_in_memory: 40
  loader:
    start_indices:
      times:
        - '2009-01-01T00:00:00'
        - '2009-02-15T00:00:00'
        - '2009-04-01T00:00:00'
        - '2009-05-15T00:00:00'
        - '2009-07-01T00:00:00'
        - '2009-08-15T00:00:00'
        - '2009-10-01T00:00:00'
        - '2009-11-15T00:00:00'
    dataset:
      data_path: /climate-default
      file_pattern: 2026-02-18-era5-1deg-combined-aimip-forcing-1978-2022.zarr
      engine: zarr
      fill_nans:
        method: constant
        value: 0.0
        zonal_interp_variables:
          - sea_surface_temperature
    num_data_workers: 16
  aggregator:
    log_histograms: true
    time_mean_reference_data: /statsdata/time-mean.nc
logging:
  log_to_screen: true
  log_to_wandb: true
  log_to_file: true
  project: ace
  entity: ai2cm
train_loader:
  batch_size: 16
  num_data_workers: 16
  prefetch_factor: 4
  dataset:
    data_path: /climate-default
    file_pattern: 2026-02-18-era5-1deg-combined-aimip-forcing-1978-2022.zarr
    engine: zarr
    subset:
      start_time: '1979-01-01'
      stop_time: '2008-12-31'
    fill_nans:
      method: constant
      value: 0.0
      zonal_interp_variables:
        - sea_surface_temperature
validation_loader:
  batch_size: 64
  num_data_workers: 16
  prefetch_factor: 4
  dataset:
    data_path: /climate-default
    file_pattern: 2026-02-18-era5-1deg-combined-aimip-forcing-1978-2022.zarr
    engine: zarr
    subset:
      start_time: '2009-01-01'
      stop_time: '2014-12-31'
      step: 3
    fill_nans:
      method: constant
      value: 0.0
      zonal_interp_variables:
        - sea_surface_temperature
optimization:
  use_gradient_accumulation: true
  enable_automatic_mixed_precision: false
  lr: 0.00001
  optimizer_type: AdamW
  scheduler:
      type: CosineAnnealingLR
      kwargs:
        T_max: 120
  kwargs:
    fused: true
    weight_decay: 0.0
stepper_training:
  loss:
    type: MSE
    weights:
      air_temperature_1: 0.5
      specific_total_water_1: 0.25
      specific_total_water_2: 0.5
      PRATEsfc: 0.5
      DLWRFsfc: 2
      ULWRFsfc: 5
      USWRFsfc: 2
      DSWRFsfc: 2
      USWRFtoa: 2
      tendency_of_total_water_path_due_to_advection: 0.5
stepper:
  input_masking:
    mask_value: 0
    fill_value: 0.0
    exclude_names_and_prefixes:
      - sea_surface_temperature
  step:
    type: CrossFormer
    config:
      builder:
        type: CrossFormer
        config:
          frames: 1
          dim: [256, 512, 1024, 2048]
          depth: [2, 2, 18, 2]
          global_window_size: [4, 4, 2, 1]
          local_window_size: 3
          cross_embed_kernel_sizes: [[4, 8, 16, 32], [2, 4], [2, 4], [2, 4]]
          cross_embed_strides: [2, 2, 2, 2]
          attn_dropout: 0.0
          ff_dropout: 0.0
          padding_conf:
            activate: true
            mode: earth
            pad_lat: [6,6]
            pad_lon: [12,12]
      normalization:
        network:
          global_means_path: /statsdata/centering.nc
          global_stds_path: /statsdata/scaling-full-field.nc
        residual:
          global_means_path: /statsdata/centering.nc
          global_stds_path: /statsdata/scaling-residual.nc
      corrector:
        conserve_dry_air: true
        moisture_budget_correction: advection_and_precipitation
        force_positive_names:
        - specific_total_water_1
        - specific_total_water_2
        - specific_total_water_3
        - specific_total_water_4
        - specific_total_water_5
        - specific_total_water_6
        - specific_total_water_7
        - PRATEsfc
        - ULWRFsfc
        - ULWRFtoa
        - DLWRFsfc
        - DSWRFsfc
        - USWRFsfc
        - USWRFtoa
      next_step_forcing_names:
      - DSWRFtoa
      forcing_names:
      - land_fraction
      - ocean_fraction
      - sea_ice_fraction
      - DSWRFtoa
      - HGTsfc
      - sea_surface_temperature
      atmosphere_prognostic_names:
      - air_temperature
      - specific_total_water
      - eastward_wind
      - northward_wind
      atmosphere_levels: 7
      atmosphere_level_start: 1
      surface_prognostic_names:
      - PRESsfc
      - skin_temperature
      atmosphere_diagnostic_names: []
      surface_diagnostic_names:
      - LHTFLsfc
      - SHTFLsfc
      - PRATEsfc
      - ULWRFsfc
      - ULWRFtoa
      - DLWRFsfc
      - DSWRFsfc
      - USWRFsfc
      - USWRFtoa
      - tendency_of_total_water_path_due_to_advection
