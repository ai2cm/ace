logging:
  log_to_screen: true
  log_to_wandb: true
  log_to_file: true
  project: ace
  entity: ai2cm
train_loader:
  batch_size: 16
  num_data_workers: 4
  prefetch_factor: 4
  time_buffer: 8
  time_buffer_pool_size: 32
  dataset:
    strict: false
    concat:
    - data_path: /climate-default
      file_pattern: 2026-04-17-era5-4deg-8layer-daily-1940-2025.zarr
      engine: zarr
      subset:
        start_time: '1979-01-01'
        stop_time: '1993-12-31'
    - data_path: /climate-default
      file_pattern: 2026-04-17-era5-4deg-8layer-daily-1940-2025.zarr
      engine: zarr
      subset:
        start_time: '1995-01-01'
        stop_time: '2013-12-31'
validation:
  loader:
    batch_size: 32
    num_data_workers: 8
    prefetch_factor: 2
    time_buffer: 16
    dataset:
      strict: false
      concat:
      - data_path: /climate-default
        file_pattern: 2026-04-17-era5-4deg-8layer-daily-1940-2025.zarr
        engine: zarr
        subset:
          start_time: '1994-01-01'
          stop_time: '1994-12-31'
      - data_path: /climate-default
        file_pattern: 2026-04-17-era5-4deg-8layer-daily-1940-2025.zarr
        engine: zarr
        subset:
          start_time: '2014-01-01'
          stop_time: '2014-12-31'
# swin_diff.md item 2: differential weight decay (no_weight_decay_bias_and_norm),
# updated lr/betas to match ArchesWeather
# swin_diff.md item 3: cosine-with-warmup schedule stepped per-iteration
optimization:
  enable_automatic_mixed_precision: false
  lr: 3.0e-4
  optimizer_type: FusedAdam
  use_gradient_accumulation: true
  no_weight_decay_bias_and_norm: true
  kwargs:
    weight_decay: 0.05
    betas:
    - 0.9
    - 0.98
  scheduler:
    schedulers:
    - type: LinearLR
      kwargs:
        start_factor: 0.0001
        end_factor: 1.0
        total_iters: 2       # epochs (~1.67% of 120, matching ArchesWeather 5k/300k proportion)
    - type: CosineAnnealingLR
      kwargs:
        T_max: 118           # 120 total - 2 warmup epochs
        eta_min: 0.0
    milestones:
    - 2
stepper_training:
  n_ensemble: 1
  n_forward_steps: 1
  loss:
    type: MSE
    weights:
      # Surface: non-T2m variables get 0.1 (TMP2m and surface_temperature default to 1.0)
      UGRD10m: 0.1
      VGRD10m: 0.1
      PRESsfc: 0.1
      Q2m: 0.1
      LHTFLsfc: 0.1
      SHTFLsfc: 0.1
      PRATEsfc: 0.1
      ULWRFsfc: 0.1
      ULWRFtoa: 0.1
      DLWRFsfc: 0.1
      DSWRFsfc: 0.1
      USWRFsfc: 0.1
      USWRFtoa: 0.1
      tendency_of_total_water_path_due_to_advection: 0.1
      # Level variables (pressure-proportional weights)
      air_temperature_0: 3.24
      air_temperature_1: 2.75
      air_temperature_2: 2.27
      air_temperature_3: 1.62
      air_temperature_4: 0.81
      air_temperature_5: 0.65
      air_temperature_6: 0.32
      air_temperature_7: 0.16
      specific_total_water_0: 3.24
      specific_total_water_1: 2.75
      specific_total_water_2: 2.27
      specific_total_water_3: 1.62
      specific_total_water_4: 0.81
      specific_total_water_5: 0.65
      specific_total_water_6: 0.32
      specific_total_water_7: 0.16
      eastward_wind_0: 3.24
      eastward_wind_1: 2.75
      eastward_wind_2: 2.27
      eastward_wind_3: 1.62
      eastward_wind_4: 0.81
      eastward_wind_5: 0.65
      eastward_wind_6: 0.32
      eastward_wind_7: 0.16
      northward_wind_0: 3.24
      northward_wind_1: 2.75
      northward_wind_2: 2.27
      northward_wind_3: 1.62
      northward_wind_4: 0.81
      northward_wind_5: 0.65
      northward_wind_6: 0.32
      northward_wind_7: 0.16
      # Diagnostics at specific pressure levels
      TMP850: 2.75
      h500: 1.62
stepper:
  step:
    type: single_module
    config:
      residual_prediction: false
      # swin_diff.md item 6: 2-step input (previous state concatenation)
      n_ic_timesteps: 2
      builder:
        # swin_diff.md item 9: axis_attn (2D axial self-attention replacing ColumnMixer)
        type: NoiseConditionedSwinTransformer
        config:
          embed_dim: 256
          depth_multiplier: 4
          num_heads:
          - 4
          - 8
          - 8
          - 4
          window_size:
          - 4
          - 8
          mlp_ratio: 2.6667  # swin_diff.md item 10: SwiGLU matches param count of mlp+4.0
          drop_path_rate: 0.2
          use_skip: true
          mlp_layer: swiglu
          axis_attn: true
          noise_embed_dim: 256
          padding_conf:
            activate: true
            mode: earth
            pad_lat:
            - 2
            - 1
            pad_lon:
            - 3
            - 3
      normalization:
        network:
          global_means_path: /climate-default/2026-04-17-era5-4deg-8layer-daily-stats-1990-2019/2026-03-19-era5-4deg-8layer-1940-2025/centering.nc
          global_stds_path: /climate-default/2026-04-17-era5-4deg-8layer-daily-stats-1990-2019/2026-03-19-era5-4deg-8layer-1940-2025/scaling-full-field.nc
        residual:
          global_means_path: /climate-default/2026-04-17-era5-4deg-8layer-daily-stats-1990-2019/2026-03-19-era5-4deg-8layer-1940-2025/centering.nc
          global_stds_path: /climate-default/2026-04-17-era5-4deg-8layer-daily-stats-1990-2019/2026-03-19-era5-4deg-8layer-1940-2025/scaling-residual.nc
      ocean:
        surface_temperature_name: surface_temperature
        ocean_fraction_name: ocean_fraction
      corrector:
        conserve_dry_air: true
        moisture_budget_correction: advection_and_precipitation
