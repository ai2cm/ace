      - eastward_wind_3
      - eastward_wind_7
      - northward_wind_0
      - northward_wind_1
      - northward_wind_3
      - northward_wind_7
    - step: 5
      target: norm
      name: day_5_norm
      variables: *id001
    ensembles: []
    mean_denorm:
