logging:
  log_to_screen: true
  log_to_wandb: true
  log_to_file: true
  project: Backbones2
  entity: ai2cm
train_loader:
  batch_size: 8
  num_data_workers: 4
  prefetch_factor: 4
  time_buffer: 8
  time_buffer_pool_size: 32
  dataset:
    strict: false
    concat:
    - data_path: /climate-default
      file_pattern: 2026-04-17-era5-4deg-8layer-daily-1940-2025.zarr
      engine: zarr
      subset:
        start_time: '1979-01-01'
        stop_time: '1993-12-31'
    - data_path: /climate-default
      file_pattern: 2026-04-17-era5-4deg-8layer-daily-1940-2025.zarr
      engine: zarr
      subset:
        start_time: '1995-01-01'
        stop_time: '2013-12-31'
validation:
  loader:
    batch_size: 32
    num_data_workers: 8
    prefetch_factor: 2
    time_buffer: 16
    dataset:
      strict: false
      concat:
      - data_path: /climate-default
        file_pattern: 2026-04-17-era5-4deg-8layer-daily-1940-2025.zarr
        engine: zarr
        subset:
          start_time: '1994-01-01'
          stop_time: '1994-12-31'
      - data_path: /climate-default
        file_pattern: 2026-04-17-era5-4deg-8layer-daily-1940-2025.zarr
        engine: zarr
        subset:
          start_time: '2014-01-01'
          stop_time: '2014-12-31'
# swin_diff.md item 2: differential weight decay (no_weight_decay_bias_and_norm),
# updated lr/betas to match ArchesWeather
# swin_diff.md item 3: cosine-with-warmup schedule stepped per-iteration
optimization:
  enable_automatic_mixed_precision: false
  lr: 0.0001
  max_grad_norm: 1.0
  optimizer_type: FusedAdam
  use_gradient_accumulation: true
  no_weight_decay_bias_and_norm: true
  kwargs:
    weight_decay: 0.05
    betas:
    - 0.9
    - 0.98
  scheduler:
    schedulers:
    - type: LinearLR
      kwargs:
        start_factor: 0.0001
        end_factor: 1.0
        total_iters: 2       # epochs (~1.67% of 120, matching ArchesWeather 5k/300k proportion)
    - type: CosineAnnealingLR
      kwargs:
        T_max: 118           # 120 total - 2 warmup epochs
        eta_min: 0.0
    milestones:
    - 2
stepper_training:
  n_ensemble: 1
  n_forward_steps: 1
  loss:
    type: MSE
    weights:
      # ACE multiplies weights into the normalized fields before the MSE, so each
      # coefficient enters the squared error as w^2. Values below are square roots
      # of the intended ArchesWeather/GraphCast linear coefficients (mythos_review.md
      # item 1): surface non-T2m 0.1, levels pressure-proportional 0.16..3.24.
      # Surface: non-T2m variables get sqrt(0.1) (TMP2m and surface_temperature default to 1.0)
      UGRD10m: 0.3162
      VGRD10m: 0.3162
      PRESsfc: 0.3162
      Q2m: 0.3162
      LHTFLsfc: 0.3162
      SHTFLsfc: 0.3162
      PRATEsfc: 0.3162
      ULWRFsfc: 0.3162
      ULWRFtoa: 0.3162
      DLWRFsfc: 0.3162
      DSWRFsfc: 0.3162
      USWRFsfc: 0.3162
      USWRFtoa: 0.3162
      tendency_of_total_water_path_due_to_advection: 0.3162
      # Level variables: sqrt of pressure-proportional weights (level 0=top ~50hPa, level 7=bottom ~1000hPa)
      air_temperature_0: 0.4
      air_temperature_1: 0.5657
      air_temperature_2: 0.8062
      air_temperature_3: 0.9
      air_temperature_4: 1.2728
      air_temperature_5: 1.5067
      air_temperature_6: 1.6583
      air_temperature_7: 1.8
      specific_total_water_0: 0.4
      specific_total_water_1: 0.5657
      specific_total_water_2: 0.8062
      specific_total_water_3: 0.9
      specific_total_water_4: 1.2728
      specific_total_water_5: 1.5067
      specific_total_water_6: 1.6583
      specific_total_water_7: 1.8
      eastward_wind_0: 0.4
      eastward_wind_1: 0.5657
      eastward_wind_2: 0.8062
      eastward_wind_3: 0.9
      eastward_wind_4: 1.2728
      eastward_wind_5: 1.5067
      eastward_wind_6: 1.6583
      eastward_wind_7: 1.8
      northward_wind_0: 0.4
      northward_wind_1: 0.5657
      northward_wind_2: 0.8062
      northward_wind_3: 0.9
      northward_wind_4: 1.2728
      northward_wind_5: 1.5067
      northward_wind_6: 1.6583
      northward_wind_7: 1.8
      # Diagnostics at specific pressure levels
      TMP850: 1.6583
      h500: 1.2728
stepper:
  step:
    type: single_module
    config:
      residual_prediction: false
      # swin_diff.md item 6: 2-step input (previous state concatenation)
      n_ic_timesteps: 2
      builder:
        # axis_attn disabled: AxialAttentionMixer is global spatial axial attention,
        # not ArchesWeather's cross-level attention; in the 2D layout the default
        # ColumnMixer is the closer analog (mythos_review.md item 5)
        type: SwinTransformer
        config:
          embed_dim: 256
          depth_multiplier: 4
          num_heads:
          - 4
          - 8
          - 8
          - 4
          window_size:
          - 4
          - 8
          mlp_ratio: 2.6667  # swin_diff.md item 10: SwiGLU matches param count of mlp+4.0
          drop_path_rate: 0.2
          use_skip: true
          mlp_layer: swiglu
          axis_attn: false
          padding_conf:
            activate: true
            mode: earth
            pad_lat:
            - 2
            - 1
            pad_lon:
            - 3
            - 3
      normalization:
        network:
          global_means_path: /climate-default/2026-04-17-era5-4deg-8layer-daily-stats-1990-2019/2026-03-19-era5-4deg-8layer-1940-2025/centering.nc
          global_stds_path: /climate-default/2026-04-17-era5-4deg-8layer-daily-stats-1990-2019/2026-03-19-era5-4deg-8layer-1940-2025/scaling-full-field.nc
        residual:
          global_means_path: /climate-default/2026-04-17-era5-4deg-8layer-daily-stats-1990-2019/2026-03-19-era5-4deg-8layer-1940-2025/centering.nc
          global_stds_path: /climate-default/2026-04-17-era5-4deg-8layer-daily-stats-1990-2019/2026-03-19-era5-4deg-8layer-1940-2025/scaling-residual.nc
      ocean:
        surface_temperature_name: surface_temperature
        ocean_fraction_name: ocean_fraction
      corrector:
        conserve_dry_air: true
        moisture_budget_correction: advection_and_precipitation
        force_positive_names:
        - specific_total_water_0
        - specific_total_water_1
        - specific_total_water_2
        - specific_total_water_3
        - specific_total_water_4
        - specific_total_water_5
        - specific_total_water_6
        - specific_total_water_7
        - Q2m
        - PRATEsfc
