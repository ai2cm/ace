# Ocean-only Samudra trained from scratch on CM4 1pctCO2, with an MLP
# vector-readout head that predicts the next-12-month Nino3.4 index
# (nino34_lead_01..12) alongside the usual ocean fields.
#
# Mounts required at runtime:
#   /climate-default : CM4 1pctCO2 ocean zarrs + the nino-leads zarr
#   /ocean_stats     : the stats dataset that INCLUDES nino34_lead_* in
#                      ocean/centering.nc and ocean/scaling-full-field.nc
#                      (e.g. the coupled-stats-with-nino-leads dataset).
#
# Notes:
# - The 12 nino34_lead_* are OUTPUT-ONLY diagnostics (not in in_names) and are
#   listed LAST in out_names; Samudra's n_vector_outputs=12 makes the final
#   conv produce the physical fields and the MLP head produce the 12 scalars,
#   broadcast to constant channels appended last (channel order = out_names).
# - Nino labels are NaN in the record tail (future targets don't exist).
#   train stop_time is set ~1.5 yr before the record end (0350-12-29) so no
#   training window sees a NaN nino target; validation (0251-0255) is NaN-free.
# - Watch val .../mean_norm/weighted_rmse/nino34_lead_XX: < 1.0 beats climatology.
experiment_dir: /results
save_checkpoint: true
validate_using_ema: true
ema:
  decay: 0.999
max_epochs: 150
inference:
  - n_forward_steps: 1440  # ~20 years at 5-day steps
    forward_steps_in_memory: 40
    loader:
      start_indices:
        times:
        - '0251-01-03T12:00:00'
        - '0262-06-22T12:00:00'
        - '0273-12-09T12:00:00'
        - '0285-05-28T12:00:00'
        - '0296-11-14T12:00:00'
        - '0308-05-03T12:00:00'
        - '0319-10-20T12:00:00'
        - '0331-04-08T12:00:00'
      dataset:
        merge:
        - data_path: /climate-default
          file_pattern: 2025-10-21-cm4-1pctCO2-140yr-no-smoothing-coupled-ocean.zarr
          engine: zarr
        - data_path: /climate-default
          file_pattern: 2025-10-16-cm4-1pctCO2-140yr-ocean-no-smoothing.zarr
          engine: zarr
        - data_path: /climate-default
          file_pattern: 2026-07-14-cm4-1pctCO2-140yr-ocean-no-smoothing-nino-leads.zarr
          engine: zarr
      num_data_workers: 8
    aggregator:
      log_histograms: false
logging:
  log_to_screen: true
  log_to_wandb: true
  log_to_file: true
  project: ace-samudra-cm4
  entity: ai2cm
train_loader:
  batch_size: 16
  num_data_workers: 8
  dataset:
    merge:
    - data_path: /climate-default
      file_pattern: 2025-10-21-cm4-1pctCO2-140yr-no-smoothing-coupled-ocean.zarr
      engine: zarr
      subset:
        start_time: '0256-01-03T12:00:00'
        stop_time: '0349-01-01T12:00:00'
    - data_path: /climate-default
      file_pattern: 2025-10-16-cm4-1pctCO2-140yr-ocean-no-smoothing.zarr
      engine: zarr
      subset:
        start_time: '0256-01-03T12:00:00'
        stop_time: '0349-01-01T12:00:00'
    - data_path: /climate-default
      file_pattern: 2026-07-14-cm4-1pctCO2-140yr-ocean-no-smoothing-nino-leads.zarr
      engine: zarr
      subset:
        start_time: '0256-01-03T12:00:00'
        stop_time: '0349-01-01T12:00:00'
validation:
  loader:
    batch_size: 16
    num_data_workers: 8
    dataset:
      merge:
      - data_path: /climate-default
        file_pattern: 2025-10-21-cm4-1pctCO2-140yr-no-smoothing-coupled-ocean.zarr
        engine: zarr
        subset:
          start_time: '0251-01-03T12:00:00'
          stop_time: '0255-12-29T12:00:00'
      - data_path: /climate-default
        file_pattern: 2025-10-16-cm4-1pctCO2-140yr-ocean-no-smoothing.zarr
        engine: zarr
        subset:
          start_time: '0251-01-03T12:00:00'
          stop_time: '0255-12-29T12:00:00'
      - data_path: /climate-default
        file_pattern: 2026-07-14-cm4-1pctCO2-140yr-ocean-no-smoothing-nino-leads.zarr
        engine: zarr
        subset:
          start_time: '0251-01-03T12:00:00'
          stop_time: '0255-12-29T12:00:00'
optimization:
  use_gradient_accumulation: true
  enable_automatic_mixed_precision: false
  lr: 0.0001
  optimizer_type: AdamW
  kwargs:
    fused: true
    weight_decay: 0.01
stepper_training:
  n_forward_steps: 4
  loss:
    type: MSE
stepper:
  input_masking:
    mask_value: 0
    fill_value: 0.0
    exclude_names_and_prefixes:
      - land_fraction
      - DLWRFsfc
      - DSWRFsfc
      - ULWRFsfc
      - USWRFsfc
      - LHTFLsfc
      - SHTFLsfc
      - PRATEsfc
      - eastward_surface_wind_stress
      - northward_surface_wind_stress
      - total_frozen_precipitation_rate
  step:
    type: single_module
    config:
      builder:
        type: Samudra
        config:
          ch_width:
          - 200
          - 250
          - 300
          - 400
          dilation:
          - 1
          - 2
          - 4
          - 8
          n_layers:
          - 1
          - 1
          - 1
          - 1
          norm: instance
          # 12 outputs come from the MLP readout head (the nino34_lead_* below),
          # not the final convolution.
          n_vector_outputs: 12
      normalization:
        network:
          global_means_path: /ocean_stats/ocean/centering.nc
          global_stds_path: /ocean_stats/ocean/scaling-full-field.nc
      corrector:
        type: ocean_corrector
        config:
          force_positive_names:
          - so_0
          - so_1
          - so_2
          - so_3
          - so_4
          - so_5
          - so_6
          - so_7
          - so_8
          - so_9
          - so_10
          - so_11
          - so_12
          - so_13
          - so_14
          - so_15
          - so_16
          - so_17
          - so_18
          - sea_ice_volume
          sea_ice_fraction_correction:
            sea_ice_fraction_name: ocean_sea_ice_fraction
            land_fraction_name: land_fraction
            remove_negative_ocean_fraction: false
            zero_where_ice_free_names:
            - sea_ice_volume
          surface_energy_flux_correction:
            method: prescribed
          ocean_heat_content_correction:
            method: scaled_temperature
      next_step_forcing_names:
      - DLWRFsfc
      - DSWRFsfc
      - ULWRFsfc
      - USWRFsfc
      - LHTFLsfc
      - SHTFLsfc
      - PRATEsfc
      - eastward_surface_wind_stress
      - northward_surface_wind_stress
      - total_frozen_precipitation_rate
      in_names:
      # time-invariant
      - land_fraction
      - sea_surface_fraction
      - deptho
      # atmosphere forcing
      - DLWRFsfc
      - DSWRFsfc
      - ULWRFsfc
      - USWRFsfc
      - LHTFLsfc
      - SHTFLsfc
      - PRATEsfc
      - eastward_surface_wind_stress
      - northward_surface_wind_stress
      - total_frozen_precipitation_rate
