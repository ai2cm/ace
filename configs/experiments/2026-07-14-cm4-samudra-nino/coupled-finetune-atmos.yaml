      - nino34_lead_07
      - nino34_lead_08
      - nino34_lead_09
      - nino34_lead_10
      - nino34_lead_11
      - nino34_lead_12
      step:
        type: single_module
        config:
          builder:
            type: Samudra
            config:
              ch_width:
              - 200
              - 250
              - 300
              - 400
              dilation:
              - 1
              - 2
              - 4
              - 8
              n_layers:
              - 1
              - 1
              - 1
              - 1
              norm: instance
              n_vector_outputs: 12
          normalization:
            network:
              global_means_path: /ocean_stats/ocean/centering.nc
              global_stds_path: /ocean_stats/ocean/scaling-full-field.nc
          corrector:
