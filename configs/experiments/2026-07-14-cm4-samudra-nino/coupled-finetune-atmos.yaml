# Coupled (SamudrACE) joint fine-tuning of atmosphere + ocean on CM4 1pctCO2.
# Recipe follows the UFS/ERA5 coupled fine-tuning config (both components
# trained with EnsembleLoss, stochastic per-component n_steps schedules,
# optimize_last_step_only, low LR with warmup).
#
# - Atmosphere: NoiseConditionedSFNO initialized from jamesd's uncoupled FT run
#   (beaker experiment 01KHZG19J8SFKZ3PDYCCEZNH1X, result dataset
#   01KJ70WK2NH4T2T4AVAAPYFSHA).
# - Ocean: Samudra with Nino3.4 readout head (n_vector_outputs=12),
#   initialized from our nino-head training run (beaker dataset
#   01KXKZ85HTDSGGXWD2DPW2QRFW).
#
# Mounts expected (see coupled-finetune-atmos.sh):
#   /atmos_ckpt.tar  atmosphere checkpoint (best_inference_ckpt.tar)
#   /ocean_ckpt.tar  ocean checkpoint (best_inference_ckpt.tar)
#   /atmos_stats     atmosphere normalization stats (coupled_atmosphere subdir)
#   /ocean_stats     ocean stats INCLUDING nino34_lead_* (ocean/ subdir)
#   /climate-default weka datasets (ocean, atmosphere, nino-leads zarrs)
seed: 0
experiment_dir: /results
save_checkpoint: true
save_best_inference_epoch_checkpoints: false
checkpoint_every_n_batches: 100
checkpoint_save_epochs: null
log_train_every_n_batches: 10
train_evaluation_samples: 32
validate_using_ema: true
evaluate_before_training: true
ema:
  decay: 0.999
max_epochs: 25
inference:
  # 1440 ocean (5-day) steps (~20 years). Must satisfy
  # max_IC_index + n_coupled_steps <= dataset length (10219); the last IC
  # 0331-04-08 is at index 8779, so 1460 overshoots and 1440 fits exactly.
  # Number of ICs must be divisible by n GPUs.
  n_coupled_steps: 1440
  coupled_steps_in_memory: 2
  loader:
    num_data_workers: 4
    dataset:
      ocean:
        merge:
        - data_path: /climate-default
          file_pattern: 2025-10-21-cm4-1pctCO2-140yr-no-smoothing-coupled-ocean.zarr
          engine: zarr
        - data_path: /climate-default
          file_pattern: 2025-10-16-cm4-1pctCO2-140yr-ocean-no-smoothing.zarr
          engine: zarr
        - data_path: /climate-default
          file_pattern: 2026-07-14-cm4-1pctCO2-140yr-ocean-no-smoothing-nino-leads.zarr
          engine: zarr
      atmosphere:
        merge:
        - data_path: /climate-default
          file_pattern: 2025-10-21-cm4-1pctCO2-140yr-no-smoothing-coupled-sea_ice.zarr
          engine: zarr
        - data_path: /climate-default
          file_pattern: 2025-06-18-CM4-1pctCO2-atmosphere-land-1deg-8layer-140yr.zarr
          engine: zarr
    start_indices:
      times:
      - '0251-01-03T12:00:00'
      - '0262-06-22T12:00:00'
      - '0273-12-09T12:00:00'
      - '0285-05-28T12:00:00'
      - '0296-11-14T12:00:00'
      - '0308-05-03T12:00:00'
      - '0319-10-20T12:00:00'
      - '0331-04-08T12:00:00'
  aggregator:
    log_zonal_mean_images: false
    log_histograms: false
logging:
  log_to_screen: true
  log_to_wandb: true
  log_to_file: true
  project: ace-samudra-coupled-cm4
  entity: ai2cm
  metrics_log_dir: /results/metrics
train_loader:
  batch_size: 8
  num_data_workers: 4
  prefetch_factor: 2
  dataset:
    ocean:
      merge:
      # train stop_time trimmed to 0349 to avoid the nino-leads NaN tail
      - data_path: /climate-default
        file_pattern: 2025-10-21-cm4-1pctCO2-140yr-no-smoothing-coupled-ocean.zarr
        engine: zarr
        subset:
          start_time: '0256-01-03T12:00:00'
          stop_time: '0349-01-01T12:00:00'
      - data_path: /climate-default
        file_pattern: 2025-10-16-cm4-1pctCO2-140yr-ocean-no-smoothing.zarr
        engine: zarr
        subset:
          start_time: '0256-01-03T12:00:00'
          stop_time: '0349-01-01T12:00:00'
      - data_path: /climate-default
        file_pattern: 2026-07-14-cm4-1pctCO2-140yr-ocean-no-smoothing-nino-leads.zarr
        engine: zarr
        subset:
          start_time: '0256-01-03T12:00:00'
          stop_time: '0349-01-01T12:00:00'
    atmosphere:
      merge:
      - data_path: /climate-default
        file_pattern: 2025-10-21-cm4-1pctCO2-140yr-no-smoothing-coupled-sea_ice.zarr
        engine: zarr
        subset:
          start_time: '0256-01-03T12:00:00'
          stop_time: '0349-01-01T12:00:00'
      - data_path: /climate-default
        file_pattern: 2025-06-18-CM4-1pctCO2-atmosphere-land-1deg-8layer-140yr.zarr
        engine: zarr
        subset:
          start_time: '0256-01-03T12:00:00'
          stop_time: '0349-01-01T12:00:00'
validation:
  loader:
    batch_size: 16
    num_data_workers: 2
    prefetch_factor: 2
    dataset:
      ocean:
        merge:
        - data_path: /climate-default
          file_pattern: 2025-10-21-cm4-1pctCO2-140yr-no-smoothing-coupled-ocean.zarr
          engine: zarr
          subset:
            start_time: '0251-01-03T12:00:00'
            stop_time: '0255-12-29T12:00:00'
        - data_path: /climate-default
          file_pattern: 2025-10-16-cm4-1pctCO2-140yr-ocean-no-smoothing.zarr
          engine: zarr
          subset:
            start_time: '0251-01-03T12:00:00'
            stop_time: '0255-12-29T12:00:00'
        - data_path: /climate-default
          file_pattern: 2026-07-14-cm4-1pctCO2-140yr-ocean-no-smoothing-nino-leads.zarr
          engine: zarr
          subset:
            start_time: '0251-01-03T12:00:00'
            stop_time: '0255-12-29T12:00:00'
      atmosphere:
        merge:
        - data_path: /climate-default
          file_pattern: 2025-10-21-cm4-1pctCO2-140yr-no-smoothing-coupled-sea_ice.zarr
          engine: zarr
          subset:
            start_time: '0251-01-03T12:00:00'
            stop_time: '0255-12-29T12:00:00'
        - data_path: /climate-default
          file_pattern: 2025-06-18-CM4-1pctCO2-atmosphere-land-1deg-8layer-140yr.zarr
          engine: zarr
          subset:
            start_time: '0251-01-03T12:00:00'
            stop_time: '0255-12-29T12:00:00'
optimization:
  use_gradient_accumulation: true
  enable_automatic_mixed_precision: false
  lr: 1.0e-05
  optimizer_type: AdamW
  kwargs:
    fused: true
    weight_decay: 0.01
  scheduler:
    schedulers:
    - type: LinearLR
      step_each_iteration: true
      kwargs:
        start_factor: 0.01
        end_factor: 1
        total_iters: 3000
    - type: ConstantLR
      step_each_iteration: true
    milestones:
    - 3000
stepper_training:
  # 4 coupled steps = 4 ocean (5-day) steps = 80 atmosphere (6h) steps. Both
  # components are trained jointly with stochastic rollout schedules (UFS/ERA5
  # coupled fine-tuning recipe); the 21/41-step atmosphere outcomes cross ocean
  # coupling boundaries so the atmosphere sees ocean-generated SST.
  n_coupled_steps: 4
  n_ensemble: 2
  ocean:
    parameter_init:
      weights_path: /ocean_ckpt.tar
    loss_weight: 1.0
    n_steps:
      outcomes:
      - steps: 0
        probability: 0.1
      - steps: 1
        probability: 0.3
      - steps: 2
        probability: 0.3
      - steps: 4
        probability: 0.3
    optimize_last_step_only: true
    loss:
      type: EnsembleLoss
      kwargs:
        crps_weight: 0.9
        energy_score_weight: 0.1
  atmosphere:
    parameter_init:
      weights_path: /atmos_ckpt.tar
    loss_weight: 1.0
    n_steps:
      outcomes:
      - steps: 0
        probability: 0.025
      - steps: 1
        probability: 0.29
      - steps: 2
        probability: 0.29
      - steps: 4
        probability: 0.29
      - steps: 21
        probability: 0.1
      - steps: 41
        probability: 0.05
    optimize_last_step_only: true
    loss:
      type: EnsembleLoss
      weights:
        air_temperature_0: 0.5
        air_temperature_1: 0.5
        eastward_wind_0: 0.5
        northward_wind_0: 0.5
        specific_total_water_0: 0.5
        specific_total_water_1: 0.25
        specific_total_water_2: 0.5
        PRATEsfc: 0.5
        h500: 10
        TMP850: 5
        Q2m: 0.5
        TMP2m: 10
        UGRD10m: 2.5
        VGRD10m: 2.5
        DLWRFsfc: 2
        ULWRFsfc: 5
        USWRFsfc: 2
        DSWRFsfc: 2
        USWRFtoa: 2
        tendency_of_total_water_path_due_to_advection: 0.5
        PRESsfc: 3
      kwargs:
        crps_weight: 0.9
        energy_score_weight: 0.1
stepper:
  ocean_fraction_prediction:
    sea_ice_fraction_name: ocean_sea_ice_fraction
    land_fraction_name: land_fraction
    sea_ice_fraction_name_in_atmosphere: sea_ice_fraction
  sst_name: sst
  ocean:
    timedelta: 5D
    # Ocean stepper copied from train-cm4-1pct-samudra-nino.yaml (must match
    # the checkpoint at /ocean_ckpt.tar exactly).
    stepper:
      input_masking:
        mask_value: 0
        fill_value: 0.0
        exclude_names_and_prefixes:
        - land_fraction
        - DLWRFsfc
        - DSWRFsfc
        - ULWRFsfc
        - USWRFsfc
        - LHTFLsfc
        - SHTFLsfc
        - PRATEsfc
        - eastward_surface_wind_stress
        - northward_surface_wind_stress
        - total_frozen_precipitation_rate
      # nino34_lead_* are broadcast scalar readouts, not spatial fields; exclude
      # them from land (output) masking.
      output_masking_exclude_names:
      - nino34_lead_01
      - nino34_lead_02
      - nino34_lead_03
      - nino34_lead_04
      - nino34_lead_05
