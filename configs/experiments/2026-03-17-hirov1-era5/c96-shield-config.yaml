experiment_dir: /results
n_samples: 4
patch:
  divide_generation: true
  composite_prediction: true
  coarse_horizontal_overlap: 1
model:
  checkpoint_path: /checkpoints/best_histogram_tail.ckpt
  rename:
    northward_wind_at_ten_meters: VGRD10m
    eastward_wind_at_ten_meters: UGRD10m
  static_inputs:
    HGTsfc: /climate-default/2025-09-25-downscaling-data-X-SHiELD-AMIP-downscaling/3km.zarr
data:
  coarse:
  - data_path: /climate-default/2026-01-28-vertically-resolved-c96-1deg-shield-amip-ensemble-dataset
    engine: zarr
    file_pattern: "ic_0002.zarr"
    subset:
      start_time: "2021-01-01T00:00"
      stop_time: "2021-12-31T23:00"
  lat_extent:
    start: 22.0
    stop: 50.0
  lon_extent:
    start: 228.0
    stop: 300.0
  batch_size: 16
  num_data_workers: 2
  strict_ensemble: false
events: []
logging:
  log_to_screen: true
  log_to_wandb: true
  log_to_file: true
  project: andrep-downscaling
  entity: ai2cm