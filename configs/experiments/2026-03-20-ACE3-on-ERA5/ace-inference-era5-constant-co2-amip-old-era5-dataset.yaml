checkpoint_path: /ckpt.tar
allow_incompatible_dataset: true
data_writer:
  save_monthly_files: false
  save_prediction_files: false
experiment_dir: /results
forward_steps_in_memory: 40
n_forward_steps: 59870 # 1979 -- 2020
initial_condition:
  path: /climate-default/2024-06-20-era5-1deg-8layer-1940-2022-netcdfs/1979010100.nc
  start_indices:
    times:
      - '1979-01-01T00:00:00'
forcing_loader:
  dataset:
    data_path: /climate-default/2024-06-20-era5-1deg-8layer-1940-2022-netcdfs
    overwrite:
      constant:
        global_mean_co2: 0.0003365
  num_data_workers: 8
logging:
  project: ace
