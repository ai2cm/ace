experiment_dir: /results
save_checkpoint: true
validate_using_ema: true
ema:
  decay: 0.999
max_epochs: 150
inference:
  - name: inference_1pct
    weight: 1.0
    n_forward_steps: 1460 # exactly 20 noleap years
    forward_steps_in_memory: 40
    epochs:
      start: -1
      step: -2
    loader:
      start_indices:
        times:
        # 8 ICs at 10-year spacing, 20-year rollouts tiling years 41-130
        # (validation + training), never entering the 131-140 holdout
        - '0041-01-01T00:00:00'
        - '0051-01-01T00:00:00'
        - '0061-01-01T00:00:00'
        - '0071-01-01T00:00:00'
        - '0081-01-01T00:00:00'
        - '0091-01-01T00:00:00'
        - '0101-01-01T00:00:00'
        - '0111-01-01T00:00:00'
      dataset:
        merge:
        - data_path: /climate-default
          file_pattern: 2026-07-22-cm4-1pctco2-4deg-coupled-ocean.zarr
          engine: zarr
        - data_path: /climate-default
          file_pattern: 2026-07-15-om4-1pctco2-4deg-ocean-5daily.zarr
          engine: zarr
      num_data_workers: 4
    aggregator:
      log_histograms: false
  - name: inference_piC
    weight: 1.0
    n_forward_steps: 1460 # exactly 20 noleap years
    forward_steps_in_memory: 40
    epochs:
      start: -1
      step: -2
    loader:
      start_indices:
        times:
        # 8 ICs at 10-year spacing, 20-year rollouts tiling relative years
        # 1-90, never entering the relative-year-91+ holdout. The first IC
        # is the store's first 5-daily snapshot.
        - '0151-01-06T00:00:00'
        - '0161-01-01T00:00:00'
        - '0171-01-01T00:00:00'
        - '0181-01-01T00:00:00'
        - '0191-01-01T00:00:00'
        - '0201-01-01T00:00:00'
        - '0211-01-01T00:00:00'
        - '0221-01-01T00:00:00'
      dataset:
        merge:
        - data_path: /climate-default
          file_pattern: 2026-07-22-cm4-picontrol-4deg-coupled-ocean.zarr
          engine: zarr
        - data_path: /climate-default
          file_pattern: 2026-07-15-om4-picontrol-4deg-ocean-5daily.zarr
          engine: zarr
      num_data_workers: 4
    aggregator:
      log_histograms: false
logging:
  log_to_screen: true
  log_to_wandb: true
  log_to_file: true
  project: ace-samudra-cm4
  entity: ai2cm
  metrics_log_dir: /results/metrics
train_loader:
  batch_size: 16
  num_data_workers: 8
  dataset:
    merge:
    - data_path: /climate-default
      file_pattern: 2026-07-22-cm4-1pctco2-4deg-coupled-ocean.zarr
      engine: zarr
      subset:
        start_time: '0046-01-06T00:00:00'
        stop_time: '0126-01-01T00:00:00'
    - data_path: /climate-default
      file_pattern: 2026-07-15-om4-1pctco2-4deg-ocean-5daily.zarr
      engine: zarr
      subset:
        start_time: '0046-01-06T00:00:00'
        stop_time: '0126-01-01T00:00:00'
validation:
  - name: val_1pct_early
    evaluate_all_steps: false
    weight: 1.0
    loader:
      batch_size: 16
      num_data_workers: 8
      dataset:
        merge:
        - data_path: /climate-default
          file_pattern: 2026-07-22-cm4-1pctco2-4deg-coupled-ocean.zarr
          engine: zarr
          subset:
            start_time: '0041-01-06T00:00:00'
            stop_time: '0046-01-01T00:00:00'
        - data_path: /climate-default
          file_pattern: 2026-07-15-om4-1pctco2-4deg-ocean-5daily.zarr
          engine: zarr
          subset:
            start_time: '0041-01-06T00:00:00'
            stop_time: '0046-01-01T00:00:00'
  - name: val_1pct_late
    evaluate_all_steps: false
    weight: 1.0
    loader:
      batch_size: 16
      num_data_workers: 8
      dataset:
        merge:
        - data_path: /climate-default
          file_pattern: 2026-07-22-cm4-1pctco2-4deg-coupled-ocean.zarr
          engine: zarr
          subset:
            start_time: '0126-01-06T00:00:00'
            stop_time: '0131-01-01T00:00:00'
        - data_path: /climate-default
          file_pattern: 2026-07-15-om4-1pctco2-4deg-ocean-5daily.zarr
          engine: zarr
          subset:
            start_time: '0126-01-06T00:00:00'
            stop_time: '0131-01-01T00:00:00'
  - name: val_piC
    evaluate_all_steps: false
    weight: 1.0
    loader:
      batch_size: 16
      num_data_workers: 8
      dataset:
        merge:
        - data_path: /climate-default
          file_pattern: 2026-07-22-cm4-picontrol-4deg-coupled-ocean.zarr
          engine: zarr
          subset:
            start_time: '0236-01-06T00:00:00'
            stop_time: '0241-01-01T00:00:00'
        - data_path: /climate-default
          file_pattern: 2026-07-15-om4-picontrol-4deg-ocean-5daily.zarr
          engine: zarr
          subset:
            start_time: '0236-01-06T00:00:00'
            stop_time: '0241-01-01T00:00:00'
optimization:
  use_gradient_accumulation: true
  enable_automatic_mixed_precision: false
  lr: 0.0001
  optimizer_type: AdamW
  kwargs:
    fused: true
    weight_decay: 0.01
stepper_training:
  n_forward_steps: 4
  loss:
    type: MSE
stepper:
  input_masking:
    mask_value: 0
    fill_value: 0.0
    exclude_names_and_prefixes:
      - land_fraction
      - DLWRFsfc
      - DSWRFsfc
      - ULWRFsfc
      - USWRFsfc
      - LHTFLsfc
      - SHTFLsfc
      - PRATEsfc
      - eastward_surface_wind_stress
      - northward_surface_wind_stress
      - total_frozen_precipitation_rate
  step:
    type: single_module
    config:
      builder:
        type: Samudra
        config:
          ch_width:
          - 200
          - 250
          - 300
          - 400
          dilation:
          - 1
          - 2
          - 4
          - 8
          n_layers:
          - 1
          - 1
          - 1
          - 1
          norm: instance
          zonally_periodic_upsample: true
      normalization:
        network:
          global_means_path: /ocean_stats/centering.nc
          global_stds_path: /ocean_stats/scaling-full-field.nc
      corrector:
        type: ocean_corrector
        config:
          force_positive_names:
          - so_0
          - so_1
          - so_2
          - so_3
          - so_4
          - so_5
          - so_6
          - so_7
          - so_8
          - so_9
          - so_10
          - so_11
          - so_12
          - so_13
          - so_14
          - so_15
          - so_16
          - so_17
          - so_18
          - sea_ice_volume
          sea_ice_fraction_correction:
            sea_ice_fraction_name: ocean_sea_ice_fraction
            land_fraction_name: land_fraction
            remove_negative_ocean_fraction: false
            zero_where_ice_free_names:
            - sea_ice_volume
            - sfdsi
            - UI
            - VI
      next_step_forcing_names:
      - DLWRFsfc
      - DSWRFsfc
      - ULWRFsfc
      - USWRFsfc
      - LHTFLsfc
      - SHTFLsfc
      - PRATEsfc
      - eastward_surface_wind_stress
      - northward_surface_wind_stress
      - total_frozen_precipitation_rate
      in_names:
      # time-invariant
      - land_fraction
      - sea_surface_fraction
      - deptho
      - hfgeou
      # atmosphere forcing
      - DLWRFsfc
      - DSWRFsfc
      - ULWRFsfc
      - USWRFsfc
      - LHTFLsfc
      - SHTFLsfc
      - PRATEsfc
      - eastward_surface_wind_stress
      - northward_surface_wind_stress
      - total_frozen_precipitation_rate
      # ocean prognostic
      - sst
      - zos
      - so_0
      - so_1
      - so_2
      - so_3
      - so_4
      - so_5
      - so_6
      - so_7
