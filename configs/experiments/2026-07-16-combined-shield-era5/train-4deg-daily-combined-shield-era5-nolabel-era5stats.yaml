# Combined-source (SHiELD+ + ERA5) 4-degree / daily training config.
#
# ARM F: no dataset labels; ERA5-only normalization statistics.
#
# One of four arms that differ ONLY in dataset labels and normalization stats:
#   A  train-...-nolabel-pooled.yaml    no labels, pooled ERA5+SHiELD stats  (THIS FILE)
#   B  train-...-label-pooled.yaml      per-source labels, pooled stats
#   F  train-...-nolabel-era5stats.yaml no labels, ERA5-only stats
#   G  train-...-nolabel-shieldstats.yaml no labels, SHiELD-only stats
#
# Recipe (merged from three existing configs):
#   - Structural base: the 4-degree daily ACE2S-SHiELD+ v2arch candidate
#     (configs/baselines/ace2s-shield-plus-like/train-4deg-daily-ace2s-shield-plus-v2arch.yaml,
#     branch baseline/ace2s-shield-plus-4deg-daily): full ACE2S-SHiELD+ epoch
#     schedule (1-step epochs 1-120, then the paper's stochastic multi-step
#     distribution to 240), the v2 NoiseConditionedSFNO builder, EnsembleLoss,
#     FusedAdam, residual_prediction false, and the SHiELD training/validation
#     concat entries.
#   - tnorm (global_mean_removal, kind shared, append_as_input) and the SHiELD
#     inline inference cases (SOM 1x/2x/4x 5yr, AMIP 10yr, AMIP 43yr,
#     constant-CO2 43yr, +2K/+4K 4yr) from the modern-pretrain 1-step config
#     (configs/baselines/ace2s-shield-plus-like/train-4deg-daily-shield-plus-modern-pretrain-1step.yaml,
#     branch experiment/2026-07-13-transfer-learning-modern-pretrain). v2arch
#     lacks tnorm; the recipe is v2+tnorm, so it is added here.
#   - ERA5 training/validation concat entries copied verbatim from the ERA5-only
#     v2 baseline (configs/baselines/aimip-like/train-4deg-daily-v2-era5-only.yaml,
#     branch baseline/v2-era5-only). The ERA5 training time-subsets split at
#     ERA5 production-stream stitch boundaries so no sample pair crosses a
#     stream-to-stream jump (see knowledge/era5-stitching-discontinuities).
#
# Variable-set reconciliation: SHiELD and ERA5 share a single in_names/out_names.
# Their in_names are identical (44 vars, global_mean_co2 included). Their
# out_names differ only in total_frozen_precipitation_rate, which SHiELD outputs
# and ERA5 does not; the common (intersection) set drops it (50 out vars). It is
# therefore also dropped from corrector.force_positive_names and from the shared
# inference-variable list (a whitelist filter). strict: false on every dataset
# tolerates the per-source data differences (e.g. ERA5 lacks the SHiELD-only
# fields; SHiELD still carries total_frozen_precipitation_rate in its data).
seed: 0
experiment_dir: /results
save_checkpoint: true
checkpoint_every_n_batches: 5000
validate_using_ema: true
# Full checkpoint (with optimizer state) at epoch 120 (end of the 1-step phase)
# and at the final epoch.
checkpoint_save_epochs:
  start: 120
  step: 120
ema_checkpoint_save_epochs:
  start: 10
  step: 10
max_epochs: 240
ema:
  decay: 0.999
train_aggregator:
  ensemble_metrics: true
