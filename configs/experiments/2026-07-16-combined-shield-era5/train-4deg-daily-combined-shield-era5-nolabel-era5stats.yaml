logging:
  log_to_screen: true
  log_to_wandb: true
  log_to_file: true
  project: ace
  entity: ai2cm
train_loader:
  batch_size: 8
  num_data_workers: 4
  prefetch_factor: 4
  time_buffer: 8
  time_buffer_pool_size: 32
  dataset:
    strict: false
    # Combined source: all SHiELD entries followed by all ERA5 entries, one
    # flat concat list.
    concat:
      # --- SHiELD+ ---
      # Ramped-climSST random-CO2 ensemble; the first member of each CO2 level
      # has no -ic_0001 suffix. Subsets start 2020-01-02 (first daily point
      # whose averaging window is entirely within the post-spinup years).
      - &random_co2_training_data
        data_path: /climate-default/2026-06-08-vertically-resolved-c96-shield-ramped-climSST-random-CO2-ensemble-fme-dataset-4deg-daily
        file_pattern: ramped-sst-1xCO2-random-perturbation.zarr
        engine: zarr
        subset:
          start_time: '2020-01-02'
      - <<: *random_co2_training_data
        file_pattern: ramped-sst-1xCO2-random-perturbation-ic_0002.zarr
      - <<: *random_co2_training_data
        file_pattern: ramped-sst-2xCO2-random-perturbation.zarr
      - <<: *random_co2_training_data
        file_pattern: ramped-sst-2xCO2-random-perturbation-ic_0002.zarr
      - <<: *random_co2_training_data
        file_pattern: ramped-sst-4xCO2-random-perturbation.zarr
      - <<: *random_co2_training_data
        file_pattern: ramped-sst-4xCO2-random-perturbation-ic_0002.zarr
      # Historical AMIP, 30 years in-sample (2009+ held out for val/inference).
      - data_path: /climate-default/2026-01-28-vertically-resolved-c96-4deg-daily-shield-amip-ensemble-dataset
        file_pattern: ic_0001.zarr
        engine: zarr
        subset:
          start_time: '1979-01-01'
          stop_time: '2008-12-31'
      # SOM equilibrium climates.
      - &equilibrium_climate_training_data
        data_path: /climate-default/2026-06-08-vertically-resolved-4deg-daily-c96-shield-som-ensemble-fme-dataset
        file_pattern: 1xCO2-ic_0001.zarr
        engine: zarr
      - <<: *equilibrium_climate_training_data
        file_pattern: 2xCO2-ic_0001.zarr
      - <<: *equilibrium_climate_training_data
        file_pattern: 4xCO2-ic_0001.zarr
      # --- ERA5 ---
      # Time-subsets split at ERA5 production-stream stitch boundaries so no
      # sample pair crosses a stream-to-stream jump (the 1994 gap is held out
      # for validation). See knowledge/era5-stitching-discontinuities.
      - data_path: /climate-default
        file_pattern: 2026-04-17-era5-4deg-8layer-daily-1940-2025.zarr
        engine: zarr
        subset:
          start_time: '1979-01-01'
          stop_time: '1986-03-31'
      - data_path: /climate-default
        file_pattern: 2026-04-17-era5-4deg-8layer-daily-1940-2025.zarr
        engine: zarr
        subset:
          start_time: '1986-04-01'
          stop_time: '1993-07-31'
      - data_path: /climate-default
        file_pattern: 2026-04-17-era5-4deg-8layer-daily-1940-2025.zarr
        engine: zarr
        subset:
          start_time: '1993-08-01'
          stop_time: '1993-12-31'
      - data_path: /climate-default
        file_pattern: 2026-04-17-era5-4deg-8layer-daily-1940-2025.zarr
        engine: zarr
        subset:
          start_time: '1995-01-01'
          stop_time: '1999-12-31'
      - data_path: /climate-default
        file_pattern: 2026-04-17-era5-4deg-8layer-daily-1940-2025.zarr
        engine: zarr
        subset:
          start_time: '2000-01-01'
          stop_time: '2009-12-31'
      - data_path: /climate-default
        file_pattern: 2026-04-17-era5-4deg-8layer-daily-1940-2025.zarr
        engine: zarr
        subset:
          start_time: '2010-01-01'
          stop_time: '2013-12-31'
validation:
  loader:
    batch_size: 32
    num_data_workers: 8
    prefetch_factor: 2
    time_buffer: 16
    dataset:
      strict: false
      # Combined-source validation: SHiELD validation entries + ERA5 validation
      # entries (mirrors the combined training loader).
      concat:
        # --- SHiELD+ ---
        - &random_co2_validation_data
          data_path: /climate-default/2026-06-08-vertically-resolved-c96-shield-ramped-climSST-random-CO2-ensemble-fme-dataset-4deg-daily
          file_pattern: ramped-sst-1xCO2-random-perturbation-ic_0003.zarr
          engine: zarr
          subset:
            start_time: '2022-01-01'
            stop_time: '2022-12-31'
        - <<: *random_co2_validation_data
          file_pattern: ramped-sst-2xCO2-random-perturbation-ic_0003.zarr
        - <<: *random_co2_validation_data
          file_pattern: ramped-sst-4xCO2-random-perturbation-ic_0003.zarr
        - data_path: /climate-default/2026-01-28-vertically-resolved-c96-4deg-daily-shield-amip-ensemble-dataset
          file_pattern: ic_0001.zarr
          engine: zarr
          subset:
            start_time: '2009-01-01'
            stop_time: '2011-12-31'
        - &equilibrium_climate_validation_data
          data_path: /climate-default/2026-06-08-vertically-resolved-4deg-daily-c96-shield-som-ensemble-fme-dataset
          file_pattern: 1xCO2-ic_0002.zarr
          engine: zarr
          subset:
            start_time: '2038-01-01'
            stop_time: '2038-12-31'
        - <<: *equilibrium_climate_validation_data
          file_pattern: 2xCO2-ic_0002.zarr
        - <<: *equilibrium_climate_validation_data
          file_pattern: 4xCO2-ic_0002.zarr
        # --- ERA5 ---
        - data_path: /climate-default
          file_pattern: 2026-04-17-era5-4deg-8layer-daily-1940-2025.zarr
          engine: zarr
          subset:
            start_time: '1994-01-01'
            stop_time: '1994-12-31'
        - data_path: /climate-default
          file_pattern: 2026-04-17-era5-4deg-8layer-daily-1940-2025.zarr
          engine: zarr
          subset:
            start_time: '2014-01-01'
            stop_time: '2014-12-31'
optimization:
  enable_automatic_mixed_precision: false
  lr: 0.0001
  optimizer_type: FusedAdam
  use_gradient_accumulation: true
  kwargs:
    weight_decay: 0.01
stepper_training:
  n_ensemble: 2
  # Single-stage schedule: 1-step training for epochs 1-120, then the paper's
  # stochastic multi-step distribution for epochs 121-240.
  n_forward_steps:
    start_value: 1
    milestones:
      - epoch: 121
        value:
          outcomes:
            - steps: 1
              probability: 0.6
            - steps: 2
              probability: 0.2
            - steps: 4
              probability: 0.1
            - steps: 12
              probability: 0.05
            - steps: 20
              probability: 0.05
  optimize_last_step_only: true
  loss:
    type: EnsembleLoss
    kwargs:
      crps_weight: 0.9
      energy_score_weight: 0.1
stepper:
  step:
    type: single_module
    config:
      residual_prediction: false
      # Global mean removal (tnorm): remove the per-sample cellwise
      # surface_temperature offset before normalization and append it
      # (normalized) as an input channel. Defaults apply (reference_field
      # surface_temperature over the default temperature fields).
      global_mean_removal:
        kind: shared
        append_as_input: true
      builder:
        type: NoiseConditionedSFNO
        config:
          embed_dim: 512
          noise_embed_dim: 32
          noise_type: isotropic
          filter_type: linear
          affine_norms: true
          normalize_big_skip: true
          filter_num_groups: 16
          spectral_ratio: 0.125
          use_mlp: true
          num_layers: 8
          operator_type: dhconv
          clip_latent_global_means: true
      normalization:
        # ERA5-only statistics (the paths used by the ERA5-only v2 baseline,
        # train-4deg-daily-v2-era5-only.yaml).
        network:
          global_means_path: /climate-default/2026-04-17-era5-4deg-8layer-daily-stats-1990-2019/2026-03-19-era5-4deg-8layer-1940-2025/centering.nc
