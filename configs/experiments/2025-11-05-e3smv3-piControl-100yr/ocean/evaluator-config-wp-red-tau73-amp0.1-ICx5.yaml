experiment_dir: /results
n_forward_steps: 2920
forward_steps_in_memory: 40
checkpoint_path: /ckpt.tar
logging:
  log_to_screen: true
  log_to_wandb: true
  log_to_file: true
  project: ocean-emulator-e3sm
  entity: ai2cm
loader:
  start_indices:
    times:
      - '0401-01-03T12:00:00'
      - '0402-01-03T12:00:00'
      - '0403-01-03T12:00:00'
      - '0404-01-03T12:00:00'
      - '0405-01-03T12:00:00'
  dataset:
    merge:
      - data_path: /climate-default
        file_pattern: 2025-11-24-E3SMv3-piControl-100yr-coupled-ocean.zarr
        engine: zarr
      - data_path: /climate-default
        file_pattern: 2025-11-24-E3SM-piControl-ocean-ice-19-levs-no-smoothing.zarr
        engine: zarr
  num_data_workers: 4
  perturbations:
    variables:
      TAUX:
        - type: red_noise
          config:
            amplitude: 0.1
            decorrelation_steps: 73
            ocean_mask: false
      TAUY:
        - type: red_noise
          config:
            amplitude: 0.1
            decorrelation_steps: 73
            ocean_mask: false
data_writer:
  save_prediction_files: false
  save_monthly_files: false
