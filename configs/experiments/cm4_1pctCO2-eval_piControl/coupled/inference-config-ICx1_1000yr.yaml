experiment_dir: /results
n_coupled_steps: 73000
coupled_steps_in_memory: 20
checkpoint_path: /ckpt.tar
data_writer:
  ocean:
    save_prediction_files: false
    save_monthly_files: false
  atmosphere:
    save_prediction_files: false
    save_monthly_files: false
forcing_loader:
  atmosphere:
    dataset:
      data_path: /climate-default
      file_pattern: 2025-03-21-CM4-piControl-atmosphere-land-1deg-8layer-200yr.zarr
      engine: zarr
      n_repeats: 6
  ocean:
    dataset:
      data_path: /climate-default
      file_pattern: 2025-10-20-cm4-piControl-200yr-no-smoothing-coupled-ocean.zarr
      engine: zarr
      n_repeats: 6
  num_data_workers: 1
initial_condition:
  ocean:
    path: /climate-default/home/elynn/ace/scratch/0151-01-03_ocean_ic.nc
  atmosphere:
    path: /climate-default/home/elynn/ace/scratch/0151-01-03_atmosphere_ic.nc
  start_indices:
    first: 0
    n_initial_conditions: 1
logging:
  log_to_screen: true
  log_to_wandb: true
  log_to_file: true
  project: ace-samudra-coupled-cm4
  entity: ai2cm