# Diagnostic: run the pretrained checkpoint on the new (sharp, higher-effective-
# resolution) xSHIELD data, but overwrite the input HGTsfc with the OLD
# (pretraining, smoother) dataset's topography. Both datasets share the 1deg
# grid, so this is a static field swap (no regrid). If the PRESsfc grid-scale
# ringing in time_mean/bias_map disappears here, the sharp input topography is
# the excitation. This is a no-training run, so it reflects the "step 0" state.
experiment_dir: /results
n_forward_steps: 7300
forward_steps_in_memory: 73
checkpoint_path: /ckpt.tar
logging:
  log_to_screen: true
  log_to_wandb: true
  log_to_file: true
  project: ace2som-xshield-tuning
  entity: ai2cm
loader:
  start_indices:
    times:
      - '2014-01-01T00:00:00'
  dataset:
    data_path: /climate-default/
    file_pattern: 2025-09-11-X-SHiELD-AMIP-1deg-8layer-11yr.zarr
    engine: zarr
    overwrite:
      from_file:
        HGTsfc:
          # TODO: set to the pretraining (shieldplus) dataset on the cluster.
          # Must share the same 1deg grid as the xSHIELD data above.
          path: /climate-default/REPLACE-WITH-OLD-PRETRAINING-DATASET.zarr
          name: HGTsfc
          engine: zarr
  num_data_workers: 16
aggregator:
  log_zonal_mean_images: false
  log_histograms: true
data_writer:
  save_prediction_files: false
  save_monthly_files: false
