experiment_dir: /results
n_samples: 2
patch:
  divide_generation: true
  composite_prediction: true
  coarse_horizontal_overlap: 1
model:
  checkpoint_path: /checkpoints/best.ckpt
  fine_coordinates_path: /climate-default/2025-11-19-X-SHiELD-AMIP-downscaling-land-fraction/3km/land_fraction.zarr
  rename:
    eastward_wind_at_ten_meters: UGRD10m
    northward_wind_at_ten_meters: VGRD10m
data:
  coarse:
    - data_path: /climate-default/home/annak/2026-05-13-ace2som-4ktuned-outputs
      file_pattern: output_6hourly_predictions_ic0000.zarr
      engine: zarr
      subset:
        start_time: '2020-01-01T00:00:00'
        stop_time: '2021-01-01T00:00:00'
  batch_size: 6
  num_data_workers: 2
  strict_ensemble: false
  lat_extent:
    start: 22.0
    stop: 50.0
  lon_extent:
    start: 230.0
    stop: 295.0
logging:
  log_to_screen: true
  log_to_wandb: true
  log_to_file: true
  project: andrep-downscaling
  entity: ai2cm