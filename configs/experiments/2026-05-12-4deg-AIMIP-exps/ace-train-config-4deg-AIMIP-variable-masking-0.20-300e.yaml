# arg: --dataset andrep/2026-03-19-era5-4deg-8layer-stats-1990-2019:/statsdata
experiment_dir: /results
save_checkpoint: true
validate_using_ema: true
max_epochs: 300
seed: 0
ema:
  decay: 0.999
inference:
  n_forward_steps: 1825
  forward_steps_in_memory: 40
  loader:
    start_indices:
      times:
        - '2009-01-01T06:00:00'
        - '2009-02-15T06:00:00'
        - '2009-04-01T06:00:00'
        - '2009-05-15T06:00:00'
        - '2009-07-01T06:00:00'
        - '2009-08-15T06:00:00'
        - '2009-10-01T06:00:00'
        - '2009-11-15T06:00:00'
    dataset:
      data_path: /climate-default
      file_pattern: 2026-03-19-era5-4deg-8layer-daily-1940-2025.zarr
      engine: zarr
    num_data_workers: 4
  aggregator:
    log_histograms: true
    time_mean_reference_data: /statsdata/time-mean.nc
    log_step_means:
      - step: 5
logging:
  log_to_screen: true
  log_to_wandb: true
  log_to_file: true
  project: ace
  entity: ai2cm
train_loader:
  batch_size: 16
  num_data_workers: 8
  prefetch_factor: 4
  augmentation:
    variable_masking:
      # Mask rate per variable (trailing _ matches all level suffixes, e.g. air_temperature_0..7)
      # All variables not listed here use default_rate (including statics/forcings)
      default_rate: 0.2
  dataset:
    data_path: /climate-default
    file_pattern: 2026-03-19-era5-4deg-8layer-daily-1940-2025.zarr
    engine: zarr
    subset:
      start_time: '1979-01-01'
      stop_time: '2008-12-31'
validation_loader:
  batch_size: 32
  num_data_workers: 8
  prefetch_factor: 4
  dataset:
    data_path: /climate-default
    file_pattern: 2026-03-19-era5-4deg-8layer-daily-1940-2025.zarr
    engine: zarr
    subset:
      start_time: '2009-01-01'
      stop_time: '2014-12-31'
      step: 3
optimization:
  use_gradient_accumulation: true
  enable_automatic_mixed_precision: false
  lr: 0.0001
  optimizer_type: AdamW
  kwargs:
    fused: true
    weight_decay: 0.01
  scheduler:
    schedulers:
      - type: LinearLR
        kwargs: {start_factor: 0.00001, end_factor: 1.0, total_iters: 15}
        step_each_iteration: false
      - type: ConstantLR
        kwargs: {factor: 1.0, total_iters: 270}
        step_each_iteration: false
      - type: PolynomialLR
        kwargs: {power: 0.5, total_iters: 15}
        step_each_iteration: false
    milestones: [15, 285]
stepper_training:
  n_forward_steps: 1
  loss:
    type: MSE
    weights:
      air_temperature_0: 0.5
      air_temperature_1: 0.5
      eastward_wind_0: 0.5
      northward_wind_0: 0.5
      specific_total_water_0: 0.5
      specific_total_water_1: 0.25
      specific_total_water_2: 0.5
      PRATEsfc: 0.5
      DLWRFsfc: 2
      ULWRFsfc: 5
      USWRFsfc: 2
      DSWRFsfc: 2
      USWRFtoa: 2
      tendency_of_total_water_path_due_to_advection: 0.5
stepper:
  step:
    type: single_module
    config:
      builder:
        type: NoiseConditionedSFNO
        config:
          embed_dim: 384
          noise_embed_dim: 0
          filter_type: linear
          use_mlp: true
          num_layers: 8
          operator_type: dhconv
          separable: false
          spectral_layers: 3
          spectral_transform: sht
      normalization:
        network:
          global_means_path: /statsdata/centering.nc
          global_stds_path: /statsdata/scaling-full-field.nc
          fill_nans_on_normalize: true
        residual:
          global_means_path: /statsdata/centering.nc
          global_stds_path: /statsdata/scaling-residual.nc
      ocean:
        surface_temperature_name: surface_temperature
        ocean_fraction_name: ocean_fraction
      corrector:
        conserve_dry_air: true
        moisture_budget_correction: advection_and_precipitation
        force_positive_names:
        - specific_total_water_0
        - specific_total_water_1
        - specific_total_water_2
        - specific_total_water_3
        - specific_total_water_4
        - specific_total_water_5
        - specific_total_water_6
        - specific_total_water_7
        - PRATEsfc
        - ULWRFsfc
        - ULWRFtoa
        - DLWRFsfc
        - DSWRFsfc
        - USWRFsfc
        - USWRFtoa
      include_channel_mask_inputs: true
      next_step_forcing_names:
      - DSWRFtoa
      in_names:
      - land_fraction
      - ocean_fraction
      - sea_ice_fraction
      - DSWRFtoa
      - HGTsfc
      - PRESsfc
      - surface_temperature
      - air_temperature_0
      - air_temperature_1
      - air_temperature_2
      - air_temperature_3
      - air_temperature_4
      - air_temperature_5
      - air_temperature_6
      - air_temperature_7
      - specific_total_water_0
      - specific_total_water_1
      - specific_total_water_2
      - specific_total_water_3
      - specific_total_water_4
      - specific_total_water_5
      - specific_total_water_6
      - specific_total_water_7
      - eastward_wind_0
      - eastward_wind_1
      - eastward_wind_2
      - eastward_wind_3
      - eastward_wind_4
      - eastward_wind_5
      - eastward_wind_6
      - eastward_wind_7
      - northward_wind_0
      - northward_wind_1
      - northward_wind_2
      - northward_wind_3
      - northward_wind_4
      - northward_wind_5
      - northward_wind_6
      - northward_wind_7
      out_names:
      - PRESsfc
      - surface_temperature
      - air_temperature_0
      - air_temperature_1
      - air_temperature_2
      - air_temperature_3
      - air_temperature_4
      - air_temperature_5
      - air_temperature_6
      - air_temperature_7
      - specific_total_water_0
      - specific_total_water_1
      - specific_total_water_2
      - specific_total_water_3
      - specific_total_water_4
