experiment_dir: /results
n_coupled_steps: 146
coupled_steps_in_memory: 1
checkpoint_path: /ckpt.tar
aggregator:
  log_histograms: true
data_writer:
  ocean:
    save_prediction_files: false
    save_monthly_files: true
    names:
    - sst
    - zos
    - thetao_0
    - thetao_1
    - thetao_2
    - thetao_3
    - thetao_4
    - thetao_5
    - thetao_6
    - vo_0
    - vo_1
    - vo_2
    - vo_3
    - vo_4
    - vo_5
    - vo_6
    - uo_0
    - uo_1
    - uo_2
    - uo_3
    - uo_4
    - uo_5
    - uo_6
  atmosphere:
    save_prediction_files: false
    save_monthly_files: true
    names:
    - eastward_surface_wind_stress
    - northward_surface_wind_stress
logging:
  log_to_screen: true
  log_to_wandb: true
  log_to_file: true
  project: ace-samudra-coupled-cm4
  entity: ai2cm
loader:
  num_data_workers: 1
  dataset:
    ocean:
      merge:
      - data_path: /climate-default
        file_pattern: 2025-10-21-cm4-1pctCO2-140yr-no-smoothing-coupled-ocean.zarr
        engine: zarr
      - data_path: /climate-default
        file_pattern: 2025-10-16-cm4-1pctCO2-140yr-ocean-no-smoothing.zarr
        engine: zarr
    atmosphere:
      merge:
      - data_path: /climate-default
        file_pattern: 2025-10-21-cm4-1pctCO2-140yr-no-smoothing-coupled-interpolate_sst-atmosphere.zarr
        engine: zarr
      - data_path: /climate-default
        file_pattern: 2025-06-18-CM4-1pctCO2-atmosphere-land-1deg-8layer-140yr.zarr
        engine: zarr
  start_indices:
    times:
    - '0305-12-29T12:00:00'
    - '0306-02-02T12:00:00'
    - '0306-02-27T12:00:00'
    - '0306-03-29T12:00:00'
    - '0306-04-28T12:00:00'
    - '0306-06-02T12:00:00'
    - '0306-07-02T12:00:00'
    - '0306-08-01T12:00:00'
    - '0306-08-31T12:00:00'
    - '0306-09-30T12:00:00'
    - '0306-10-30T12:00:00'
    - '0306-11-29T12:00:00'
