experiment_dir: /climate-default/home/annak/2026-03-25-sequential-downscale-ace2s-tropics
patch:
  divide_generation: true
  composite_prediction: true
  coarse_horizontal_overlap: 1
model:
  first_model:
    checkpoint_path: /winds_prmsl/best.ckpt
    rename:
      eastward_wind_at_ten_meters: UGRD10m
      northward_wind_at_ten_meters: VGRD10m
      PRESsfc: PRMSL
  second_model:
    checkpoint_path: /prate/best.ckpt
    rename:
      eastward_wind_at_ten_meters: UGRD10m
      northward_wind_at_ten_meters: VGRD10m
      PRESsfc: PRMSL
data:
  coarse:
  - merge:
    - data_path: /climate-default/2026-03-25-ace2s-multivar-outputs
      file_pattern: output_6hourly_predictions_ic0000.zarr
      engine: zarr
  batch_size: 6
  num_data_workers: 2
  strict_ensemble: false
outputs:
  - name: "tropics_wpac_2023"
    save_vars:
      - PRATEsfc
      - eastward_wind_at_ten_meters
      - northward_wind_at_ten_meters
      - PRMSL
    n_ens: 2
    max_samples_per_gpu: 32
    time_range:
      start_time: "2023-01-01T00:00:00"
      stop_time: "2023-12-31T18:00:00"
    lat_extent:
      start: 0  #-66.0
      stop: 35 #70.0
    lon_extent:
      start: 75 #230.0
      stop:  195 #246.0
logging:
  log_to_screen: true
  log_to_wandb: true
  log_to_file: true
  project: multivariate-downscaling
  entity: ai2cm
