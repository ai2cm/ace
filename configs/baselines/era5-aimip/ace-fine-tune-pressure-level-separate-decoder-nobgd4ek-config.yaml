# ACE2.1-ERA5 AIMIP pressure-level-decoder fine-tune, adapted to the nobgd4ek
# checkpoint (1deg v2, no-residual, NO-CO2 model).
#
# Base checkpoint: beaker 01KXKBKW2DCAYX6Q3FRJ60K3Q6 (best_inference_ckpt.tar),
# trained on branch experiment/2026-07-15-1deg-daily-v2-era5-only-no-residual-no-co2
# @ f9f91c9. The stepper.step.config block below is that run's EXACT training block
# (the frozen core), plus a trainable secondary MLP decoder for pressure-level
# diagnostics.
#
# NOT LAUNCH-READY. Three blockers must be resolved first (see the experiment report):
#
#   1. CODE GENERATION. This config uses the current-main ACE train schema
#      (validation:, stepper_training.n_forward_steps, parameter_init under
#      stepper_training, global_mean_removal). The AIMIP base branch
#      workflow/aimip-ace-to-merge is ~200 commits behind main and lacks
#      global_mean_removal, so on that branch's code this config will neither
#      validate nor load nobgd4ek's checkpoint. The experiment branch must be
#      rebased onto current main before launch. This file was validated with
#      `python -m fme.ace.validate_config --config_type train` against nobgd4ek's
#      training code (f9f91c9); it FAILS against the stale base-branch code.
#
#   2. NORMALIZATION STATS. /statsdata currently points at
#      brianhenn/era5-1deg-8layer-pressure-level-stats-1990-2019-v2, whose
#      core-variable stats were computed on the OLD 6-hourly 2024-06-20 dataset and
#      DIFFER from nobgd4ek's daily-06Z 2026-03-19 training stats (scaling-full-field
#      up to ~2x off for radiative fluxes; scaling-residual median ~52% off). The
#      frozen core needs the stats it trained with. A MERGED stats dataset
#      (nobgd4ek's 2026-03-19 daily core stats + the plev stats) must be built and
#      mounted at /statsdata. NOT built here, per task instructions.
#
#   3. TIME CADENCE. The plev target zarr (2025-11-10, 6-hourly 00/06/12/18Z) does
#      not share a time coordinate with nobgd4ek's daily-06Z core zarr.
#      MergedXarrayDataset requires identical sample_start_times, so this merge will
#      raise at data-load time. A daily-06Z subsample of the plev zarr (or an
#      equivalent alignment) is required.
#
# secondary_diagnostic_names = 63 pressure-level fields. h500 and TMP850 are OMITTED
# because nobgd4ek's core already outputs them (a variable cannot be both a core
# output and a secondary diagnostic; validate_config rejects the overlap). The four
# near-surface fields (TMP2m/Q2m/UGRD10m/VGRD10m) are OMITTED because they are
# prognostic in nobgd4ek's core.
#
# Design choices to review: MSE loss over a stochastic (noise-injecting) frozen core
# regresses toward the conditional mean; the LR-warmup total_iters (13695) was tuned
# for 6-hourly data and should be recomputed for the ~4x-smaller daily sample count.
experiment_dir: /results
save_checkpoint: true
validate_using_ema: true
max_epochs: 120
seed: 0
ema:
  decay: 0.999
checkpoint_every_n_batches: 5000
logging:
  log_to_screen: true
  log_to_wandb: true
  log_to_file: true
  project: ace
  entity: ai2cm
train_loader:
  batch_size: 16
  num_data_workers: 4
  prefetch_factor: 4
  dataset:
    merge:
    - data_path: /climate-default/2026-03-19-era5-1deg-8layer-daily-1940-2025.zarr
      file_pattern: 2026-03-19-era5-1deg-8layer-1940-2025.zarr
      engine: zarr
      subset:
        start_time: '1979-01-01'
        stop_time: '2008-12-31'
    - data_path: /climate-default/2025-11-10-era5-1deg-pressure-level-1940-2022
      file_pattern: 2025-11-10-era5-1deg-pressure-level-1940-2022.zarr
      engine: zarr
      subset:
        start_time: '1979-01-01'
        stop_time: '2008-12-31'
validation:
  loader:
    batch_size: 128
    num_data_workers: 4
    prefetch_factor: 4
    dataset:
      merge:
      - data_path: /climate-default/2026-03-19-era5-1deg-8layer-daily-1940-2025.zarr
        file_pattern: 2026-03-19-era5-1deg-8layer-1940-2025.zarr
        engine: zarr
        subset:
          start_time: '2009-01-01'
          stop_time: '2014-12-31'
          step: 3
      - data_path: /climate-default/2025-11-10-era5-1deg-pressure-level-1940-2022
        file_pattern: 2025-11-10-era5-1deg-pressure-level-1940-2022.zarr
        engine: zarr
        subset:
          start_time: '2009-01-01'
          stop_time: '2014-12-31'
          step: 3
inference:
  n_forward_steps: 7300
  forward_steps_in_memory: 40
  loader:
    start_indices:
      times:
      - '2009-01-01T06:00:00'
      - '2009-02-15T06:00:00'
      - '2009-04-01T06:00:00'
      - '2009-05-15T06:00:00'
      - '2009-07-01T06:00:00'
      - '2009-08-15T06:00:00'
      - '2009-10-01T06:00:00'
      - '2009-11-15T06:00:00'
    dataset:
      merge:
      - data_path: /climate-default/2026-03-19-era5-1deg-8layer-daily-1940-2025.zarr
        file_pattern: 2026-03-19-era5-1deg-8layer-1940-2025.zarr
        engine: zarr
      - data_path: /climate-default/2025-11-10-era5-1deg-pressure-level-1940-2022
        file_pattern: 2025-11-10-era5-1deg-pressure-level-1940-2022.zarr
        engine: zarr
    num_data_workers: 4
  aggregator:
    log_histograms: true
    time_mean_reference_data: /statsdata/time-mean.nc
optimization:
  use_gradient_accumulation: true
  enable_automatic_mixed_precision: false
  lr: 0.0001
  optimizer_type: AdamW
  kwargs:
    fused: true
    weight_decay: 0.01
  scheduler:
    schedulers:
    - type: LinearLR
      step_each_iteration: true
      kwargs:
        start_factor: 0.01
        end_factor: 1
        total_iters: 13695
    - type: ConstantLR
      step_each_iteration: true
    milestones:
    - 13695
stepper_training:
  n_forward_steps: 2
  loss:
    type: MSE
    weights:
      air_temperature_0: 0.5
      air_temperature_1: 0.5
      eastward_wind_0: 0.5
      northward_wind_0: 0.5
      specific_total_water_0: 0.5
      specific_total_water_1: 0.25
      specific_total_water_2: 0.5
      PRATEsfc: 0.5
      DLWRFsfc: 2
      ULWRFsfc: 5
      USWRFsfc: 2
      DSWRFsfc: 2
      USWRFtoa: 2
      tendency_of_total_water_path_due_to_advection: 0.5
  parameter_init:
    weights_path: /base_weights/ckpt.tar
    parameters:
    - frozen:
        include:
        - '*'
stepper:
  step:
    type: single_module
    config:
      residual_prediction: false
      builder:
        type: NoiseConditionedSFNO
        config:
          embed_dim: 512
          noise_embed_dim: 32
          noise_type: isotropic
          filter_type: linear
          affine_norms: true
          normalize_big_skip: true
          filter_num_groups: 16
          spectral_ratio: 0.125
          use_mlp: true
          num_layers: 8
          operator_type: dhconv
          clip_latent_global_means: true
      normalization:
        network:
          global_means_path: /statsdata/centering.nc
          global_stds_path: /statsdata/scaling-full-field.nc
        residual:
          global_means_path: /statsdata/centering.nc
          global_stds_path: /statsdata/scaling-residual.nc
      ocean:
        surface_temperature_name: surface_temperature
        ocean_fraction_name: ocean_fraction
      corrector:
        conserve_dry_air: true
        moisture_budget_correction: advection_and_precipitation
        force_positive_names:
        - specific_total_water_0
        - specific_total_water_1
        - specific_total_water_2
        - specific_total_water_3
        - specific_total_water_4
        - specific_total_water_5
        - specific_total_water_6
        - specific_total_water_7
        - Q2m
        - PRATEsfc
        - ULWRFsfc
        - ULWRFtoa
        - DLWRFsfc
        - DSWRFsfc
        - USWRFsfc
        - USWRFtoa
      next_step_forcing_names:
