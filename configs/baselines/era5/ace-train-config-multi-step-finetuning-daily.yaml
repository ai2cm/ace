# arg: --dataset troya/2026-04-17-era5-1deg-8layer-daily-stats-1990-2019:/statsdata
# arg: --dataset 01KX95EEV3XD6KVTK25M0VJCKS:/weights
seed: 0
experiment_dir: /results
save_checkpoint: true
validate_using_ema: true
max_epochs: 40
ema:
  decay: 0.999
inference:
  - n_forward_steps: 1825
    forward_steps_in_memory: 40
    loader:
      start_indices:
        times:
          - '1996-01-01T06:00:00'
          - '1996-02-15T06:00:00'
          - '1996-04-01T06:00:00'
          - '1996-05-15T06:00:00'
          - '1996-07-01T06:00:00'
          - '1996-08-15T06:00:00'
          - '1996-10-01T06:00:00'
          - '1996-11-15T06:00:00'
      dataset:
        data_path: /climate-default/2026-03-19-era5-1deg-8layer-daily-1940-2025.zarr/
        file_pattern: 2026-03-19-era5-1deg-8layer-1940-2025.zarr
        engine: zarr
      num_data_workers: 8
    aggregator:
      histogram:
        enabled: true
      time_mean_reference_data: /statsdata/time-mean.nc
logging:
  log_to_screen: true
  log_to_wandb: true
  log_to_file: true
  project: ace
  entity: ai2cm
train_loader:
  batch_size: 8
  num_data_workers: 8
  prefetch_factor: 2
  dataset:
    concat:
    - data_path: /climate-default/2026-03-19-era5-1deg-8layer-daily-1940-2025.zarr/
      file_pattern: 2026-03-19-era5-1deg-8layer-1940-2025.zarr
      engine: zarr
      subset:
        stop_time: '1995-12-31'
    - data_path: /climate-default/2026-03-19-era5-1deg-8layer-daily-1940-2025.zarr/
      file_pattern: 2026-03-19-era5-1deg-8layer-1940-2025.zarr
      engine: zarr
      subset:
        start_time: '2011-01-01'
        stop_time: '2019-12-31'
    - data_path: /climate-default/2026-03-19-era5-1deg-8layer-daily-1940-2025.zarr/
      file_pattern: 2026-03-19-era5-1deg-8layer-1940-2025.zarr
      engine: zarr
      subset:
        start_time: '2021-01-01'
validation:
  loader:
    batch_size: 32
    num_data_workers: 8
    prefetch_factor: 2
    dataset:
      data_path: /climate-default/2026-03-19-era5-1deg-8layer-daily-1940-2025.zarr/
      file_pattern: 2026-03-19-era5-1deg-8layer-1940-2025.zarr
      engine: zarr
      subset:
        start_time: '1996-01-01'
        stop_time: '1997-12-31'
optimization:
  use_gradient_accumulation: true
  enable_automatic_mixed_precision: false
  lr: 0.0001
  optimizer_type: AdamW
  kwargs:
    fused: true
    weight_decay: 0.01
stepper_training:
  n_ensemble: 2
  parameter_init:
    weights_path: /weights/training_checkpoints/best_ckpt.tar
  n_forward_steps:
    outcomes:
      - steps: 1
        probability: 0.9
      - steps: 3
        probability: 0.05
      - steps: 5
        probability: 0.05
  optimize_last_step_only: true
  loss:
    type: EnsembleLoss
    weights:
      h500: 5.0
    kwargs:
      crps_weight: 0.9
      energy_score_weight: 0.1
stepper:
  checkpoint_path: /weights/training_checkpoints/best_ckpt.tar
