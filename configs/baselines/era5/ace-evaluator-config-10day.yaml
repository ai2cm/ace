experiment_dir: /results
n_forward_steps: 40 #10 days
forward_steps_in_memory: 50
checkpoint_path: /ckpt.tar
logging:
  log_to_screen: true
  log_to_wandb: true
  log_to_file: true
  project: ace
  entity: ai2cm
loader:
  start_indices:
    times:
      - '2010-01-01T12:00:00'
  dataset:
    data_path: /climate-default/
    file_pattern: 2026-03-19-era5-1deg-8layer-1940-2025.zarr
    engine: zarr
  num_data_workers: 16
aggregator:
  zonal_mean:
    enabled: true
  histogram:
    enabled: true
data_writer:
  save_prediction_files: true
  save_monthly_files: false
  names:
    - total_frozen_precipitation_rate
    - PRATEsfc

