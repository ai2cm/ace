experiment_dir: /results
save_checkpoint: true
validate_using_ema: true
ema:
  decay: 0.999
max_epochs: 20
n_coupled_steps: 4
inference:
  n_coupled_steps: 1456
  coupled_steps_in_memory: 8
  loader:
    num_data_workers: 1
    dataset:
      ocean:
        merge:
        - data_path: /climate-default
          file_pattern: 2025-06-03-cm4-piControl-200yr-coupled-ocean.zarr
          engine: zarr
        - data_path: /climate-default
          file_pattern: 2025-04-16-cm4-piControl-ocean-200yr-dataset.zarr
          engine: zarr
      atmosphere:
        merge:
        - data_path: /climate-default
          file_pattern: 2025-06-03-cm4-piControl-200yr-coupled-interpolate_sst-atmosphere.zarr
          engine: zarr
        - data_path: /climate-default
          file_pattern: 2025-03-21-CM4-piControl-atmosphere-land-1deg-8layer-200yr.zarr
          engine: zarr
    start_indices:
      times:
        - '0151-01-06T00:00:00'
        - '0171-01-06T00:00:00'
        - '0191-01-06T00:00:00'
        - '0211-01-06T00:00:00'
        - '0231-01-06T00:00:00'
        - '0251-01-06T00:00:00'
        - '0271-01-06T00:00:00'
        - '0291-01-06T00:00:00'
  aggregator:
    log_zonal_mean_images: false
    log_histograms: false
logging:
  log_to_screen: true
  log_to_wandb: true
  log_to_file: true
  project: SamudrACE-CM4-piControl
  entity: ai2cm
train_loader:
  batch_size: 16
  num_data_workers: 4
  prefetch_factor: 1
  dataset:
    ocean:
      merge:
      - data_path: /climate-default
        file_pattern: 2025-06-03-cm4-piControl-200yr-coupled-ocean.zarr
        engine: zarr
        subset:
          start_time: '0151-01-06'
          stop_time: '0306-01-01'
      - data_path: /climate-default
        file_pattern: 2025-04-16-cm4-piControl-ocean-200yr-dataset.zarr
        engine: zarr
        subset:
          start_time: '0151-01-06'
          stop_time: '0306-01-01'
    atmosphere:
      merge:
      - data_path: /climate-default
        file_pattern: 2025-06-03-cm4-piControl-200yr-coupled-interpolate_sst-atmosphere.zarr
        engine: zarr
        subset:
          start_time: '0151-01-06'
          stop_time: '0306-01-01'
      - data_path: /climate-default
        file_pattern: 2025-03-21-CM4-piControl-atmosphere-land-1deg-8layer-200yr.zarr
        engine: zarr
        subset:
          start_time: '0151-01-06'
          stop_time: '0306-01-01'
validation_loader:
  batch_size: 16
  num_data_workers: 4
  prefetch_factor: 1
  dataset:
    ocean:
      merge:
      - data_path: /climate-default
        file_pattern: 2025-06-03-cm4-piControl-200yr-coupled-ocean.zarr
        engine: zarr
        subset:
          start_time: '0306-01-01'
          stop_time: '0311-01-01'
      - data_path: /climate-default
        file_pattern: 2025-04-16-cm4-piControl-ocean-200yr-dataset.zarr
        engine: zarr
        subset:
          start_time: '0306-01-01'
          stop_time: '0311-01-01'
    atmosphere:
      merge:
      - data_path: /climate-default
        file_pattern: 2025-06-03-cm4-piControl-200yr-coupled-interpolate_sst-atmosphere.zarr
        engine: zarr
        subset:
          start_time: '0306-01-01'
          stop_time: '0311-01-01'
      - data_path: /climate-default
        file_pattern: 2025-03-21-CM4-piControl-atmosphere-land-1deg-8layer-200yr.zarr
        engine: zarr
        subset:
          start_time: '0306-01-01'
          stop_time: '0311-01-01'
optimization:
  enable_automatic_mixed_precision: false
  lr: 0.00001
  optimizer_type: FusedAdam
  kwargs:
    weight_decay: 0.01
  use_gradient_accumulation: true
  scheduler:
    type: CosineAnnealingLR
stepper_training:
  parameter_init:
    checkpoint_path: /ckpt.tar
  ocean:
    parameter_init:
      weights_path: null # null required
    loss:
      type: MSE
    loss_contributions:
      n_steps: 4
      weight: 1.0
  atmosphere:
    parameter_init:
      weights_path: null # null required
    loss_contributions:
      n_steps: 2
      weight: 1.0
    loss:
      type: MSE
      weights:
        air_temperature_0: 0.5
        air_temperature_1: 0.5
        eastward_wind_0: 0.5
        northward_wind_0: 0.5
        specific_total_water_0: 0.5
        specific_total_water_1: 0.25
        specific_total_water_2: 0.5
        PRATEsfc: 0.5
        h500: 10
        TMP850: 5
        Q2m: 0.5
        DLWRFsfc: 2
        ULWRFsfc: 5
        USWRFsfc: 2
        DSWRFsfc: 2
        USWRFtoa: 2
        tendency_of_total_water_path_due_to_advection: 0.5
stepper:
  ocean:
    timedelta: 5D
    # stepper added by finetune.sh from uncoupled-ocean/train-config.yaml
  atmosphere:
    timedelta: 6h
    # stepper added by finetune.sh from uncoupled-atmos/train-config.yaml
