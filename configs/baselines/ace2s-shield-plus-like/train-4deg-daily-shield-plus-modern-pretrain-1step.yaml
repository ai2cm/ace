  # via the stepper.ocean interpolate config, as for amip_constant_co2, not a
  # synthetic perturbations block). Diagnostic only (weight 0.0). epochs start 1
  # step 10 fires first at epoch 2 — a deliberate early fail-fast on data
  # availability — then every 10 epochs.
  - name: amip_p4k_4year
    weight: 0.0
    epochs:
      start: 1
      step: 10
    n_forward_steps: 1460
    forward_steps_in_memory: 73
    n_ensemble_per_ic: 1
    loader:
      start_indices:
        times:
          - '1979-01-01T00:00:00'
      dataset:
        data_path: /climate-default/2026-07-09-vertically-resolved-c96-4deg-daily-shield-amip-p4k-dataset
        file_pattern: AMIP-p4K.zarr
        engine: zarr
      num_data_workers: 8
    aggregator:
      step_means: []
      ensembles: []
      mean_denorm:
        enabled: false
        target: denorm
      mean_norm:
        enabled: false
        target: norm
      zonal_mean:
        enabled: false
      time_mean_denorm:
        target: denorm
