          - '1979-01-01T00:00:00'
      dataset:
        data_path: /climate-default/2026-07-09-vertically-resolved-c96-4deg-daily-shield-amip-p2k-dataset
        file_pattern: AMIP-p2K.zarr
        engine: zarr
      num_data_workers: 8
    aggregator:
      step_means: []
      ensembles: []
      mean_denorm:
        enabled: false
        target: denorm
      mean_norm:
        enabled: false
        target: norm
      zonal_mean:
        enabled: false
      time_mean_denorm:
        target: denorm
        variables: *inference_variables
      time_mean_norm:
        target: norm
        variables: *inference_variables
      annual:
        variables: *inference_variables
