      time_mean_norm:
        target: norm
        variables: *inference_variables
      annual:
        variables: *inference_variables
      power_spectrum:
        variables: *inference_variables
      histogram:
        enabled: true
  # Perturbed-SST diagnostic cases: 4-year AMIP rollouts on the +4K and +2K
