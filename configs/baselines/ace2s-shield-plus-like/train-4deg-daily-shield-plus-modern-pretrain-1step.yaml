# MODERN-ARM 1-step-only SHiELD+ pre-train — the donor checkpoint for the
# transfer-learning ERA5 fine-tune verdict work
# (research: investigations/2026-06-30-1deg-climate-improvement-transfer).
# Forked from the 4-degree daily ACE2S-SHiELD+ v2arch candidate
# (train-4deg-daily-ace2s-shield-plus-v2arch.yaml). Differences from that
# config:
#   1. 1-step only: stepper_training.n_forward_steps is a plain scalar 1 (no
#      epoch schedule into multi-step), and max_epochs is 120 — the run stops
#      at the end of the 1-step phase. The full with-optimizer-state checkpoint
#      saved at the final epoch (checkpoint_save_epochs 120) is the fine-tune
#      donor.
#   2. Global mean removal (tnorm): stepper.step.config.global_mean_removal
#      (kind shared, append_as_input), matching the 1° v2-ERA5 configs — the
#      per-sample surface_temperature offset is removed before normalization
#      and appended as an input channel, so the pre-trained representation is
#      global-mean-robust for the downstream ERA5 fine-tunes.
#   3. Inline +2K/+4K perturbation inference: two extra diagnostic (weight 0.0)
#      AMIP rollouts on the perturbed-SST SHiELD datasets (AMIP-p2K / AMIP-p4K),
#      firing early (epoch 2) as a fail-fast on data availability then every 10
#      epochs.
# The v2arch candidate's other changes carry through: the ERA5-v2
# NoiseConditionedSFNO builder (noise_embed_dim 32, filter_num_groups 16,
# spectral_ratio 0.125, normalize_big_skip, clip_latent_global_means) and no
# per-variable loss weights.
#
# 4-degree daily-timestep analog of the ACE2S-SHiELD+ training recipe from
# github.com/ai2cm/ace2s-shield-plus-paper (ACE-experiments/training @ b271da1,
# "full" data recipe — the model the manuscript calls ACE2S-SHiELD+). This arm
# is the 1-step pre-train stage only (the paper's separate one-step pre-train),
# without the energy-conserving multi-step fine-tune. Differences from that
# 1-degree/6-hourly recipe, beyond swapping in the 4deg-daily datasets:
#   - Epochs x4 (30 -> 120): daily data has 4x fewer samples per year, so this
#     holds total optimizer steps of the 1-step stage roughly constant.
#   - NO total_energy_budget_correction (the paper's "+" fine-tune has it): the
#     energy corrector is left for a later fine-tune stage; this pre-train donor
#     is deliberately without it. It can be added later (the paper's SHiELD
#     value: 1.13 W/m**2).
#   - Inline inference uses the current list form: 5-year SOM ic_0003 rollouts
#     at 1x/2x/4xCO2 (checkpoint-selection weight, analogous to the paper's
#     inline inference), a 10-year AMIP rollout, 43-year AMIP rollouts with
#     historical and constant CO2 (the paper's SST/CO2 disentangling axis), and
#     the +2K/+4K perturbation rollouts described above.
seed: 0
experiment_dir: /results
save_checkpoint: true
checkpoint_every_n_batches: 5000
validate_using_ema: true
# Full checkpoint (with optimizer state) at epoch 120 — here the final epoch,
# the end of the 1-step-only run — a clean pre-trained init for fine-tuning on
# other datasets (the transfer-learning donor).
checkpoint_save_epochs:
  start: 120
  step: 120
ema_checkpoint_save_epochs:
  start: 10
  step: 10
max_epochs: 120
ema:
  decay: 0.999
train_aggregator:
  ensemble_metrics: true
inference:
  # Short-case cadence: every other epoch. The epochs field is a slice over
  # [1..max_epochs], so start 1 / step 2 fires on epochs 2,4,...,120 — which
  # includes every EMA-checkpoint-save epoch (10,20,...,120) and the final
  # epoch.
  - name: som_1xco2_5year
    weight: 1.0
    epochs:
      start: 1
      step: 2
    n_forward_steps: 1825
    forward_steps_in_memory: 73
    n_ensemble_per_ic: 1
    loader:
      start_indices:
        times:
          - '2032-07-01T00:00:00'
          - '2033-01-01T00:00:00'
          - '2033-07-01T00:00:00'
          - '2034-01-01T00:00:00'
          - '2034-07-01T00:00:00'
          - '2035-01-01T00:00:00'
          - '2035-07-01T00:00:00'
          - '2036-01-01T00:00:00'
      dataset:
        data_path: /climate-default/2026-06-08-vertically-resolved-4deg-daily-c96-shield-som-ensemble-fme-dataset
        file_pattern: 1xCO2-ic_0003.zarr
        engine: zarr
      num_data_workers: 8
    aggregator:
      step_means:
        - step: 5
          target: denorm
          name: day_5
          variables: &inference_variables
            - PRATEsfc
            - TMP2m
            - Q2m
            - UGRD10m
            - VGRD10m
            - h500
            - TMP850
            - PRESsfc
            - surface_temperature
            - ULWRFsfc
            - DLWRFsfc
            - USWRFsfc
            - DSWRFsfc
            - ULWRFtoa
            - USWRFtoa
            - LHTFLsfc
            - SHTFLsfc
            - tendency_of_total_water_path_due_to_advection
            - total_frozen_precipitation_rate
            - air_temperature_0
            - air_temperature_1
            - air_temperature_3
            - air_temperature_7
            - specific_total_water_0
            - specific_total_water_1
            - specific_total_water_3
            - specific_total_water_7
            - eastward_wind_0
            - eastward_wind_1
            - eastward_wind_3
            - eastward_wind_7
            - northward_wind_0
            - northward_wind_1
            - northward_wind_3
            - northward_wind_7
            - total_water_path
        - step: 5
          target: norm
          name: day_5_norm
          variables: *inference_variables
      ensembles: []
      mean_denorm:
        enabled: false
        target: denorm
      mean_norm:
        enabled: false
        target: norm
      enso_index:
        enabled: false
      enso_coefficient:
        enabled: false
      histogram:
        enabled: true
  - name: som_2xco2_5year
    weight: 1.0
    epochs:
      start: 1
      step: 2
    n_forward_steps: 1825
    forward_steps_in_memory: 73
    n_ensemble_per_ic: 1
    loader:
      start_indices:
        times:
          - '2032-07-01T00:00:00'
          - '2033-01-01T00:00:00'
          - '2033-07-01T00:00:00'
          - '2034-01-01T00:00:00'
          - '2034-07-01T00:00:00'
          - '2035-01-01T00:00:00'
          - '2035-07-01T00:00:00'
          - '2036-01-01T00:00:00'
      dataset:
        data_path: /climate-default/2026-06-08-vertically-resolved-4deg-daily-c96-shield-som-ensemble-fme-dataset
        file_pattern: 2xCO2-ic_0003.zarr
        engine: zarr
      num_data_workers: 8
    aggregator:
      step_means:
        - step: 5
          target: denorm
          name: day_5
          variables: *inference_variables
        - step: 5
          target: norm
          name: day_5_norm
          variables: *inference_variables
      ensembles: []
      mean_denorm:
        enabled: false
        target: denorm
      mean_norm:
        enabled: false
        target: norm
      enso_index:
        enabled: false
      enso_coefficient:
        enabled: false
      histogram:
        enabled: true
  - name: som_4xco2_5year
    weight: 1.0
    epochs:
      start: 1
      step: 2
    n_forward_steps: 1825
    forward_steps_in_memory: 73
    n_ensemble_per_ic: 1
    loader:
      start_indices:
        times:
          - '2032-07-01T00:00:00'
          - '2033-01-01T00:00:00'
          - '2033-07-01T00:00:00'
          - '2034-01-01T00:00:00'
          - '2034-07-01T00:00:00'
          - '2035-01-01T00:00:00'
          - '2035-07-01T00:00:00'
          - '2036-01-01T00:00:00'
      dataset:
        data_path: /climate-default/2026-06-08-vertically-resolved-4deg-daily-c96-shield-som-ensemble-fme-dataset
        file_pattern: 4xCO2-ic_0003.zarr
        engine: zarr
      num_data_workers: 8
    aggregator:
      step_means:
        - step: 5
          target: denorm
          name: day_5
          variables: *inference_variables
        - step: 5
          target: norm
          name: day_5_norm
          variables: *inference_variables
      ensembles: []
      mean_denorm:
        enabled: false
        target: denorm
      mean_norm:
        enabled: false
        target: norm
      enso_index:
        enabled: false
      enso_coefficient:
        enabled: false
      histogram:
        enabled: true
  - name: amip_10year
    weight: 0.0
    epochs:
      start: 1
      step: 2
    n_forward_steps: 3652
    forward_steps_in_memory: 73
    n_ensemble_per_ic: 1
    loader:
      start_indices:
        times:
          - '2009-01-01T00:00:00'
          - '2009-01-02T00:00:00'
          - '2009-01-03T00:00:00'
          - '2009-01-04T00:00:00'
          - '2009-01-05T00:00:00'
          - '2009-01-06T00:00:00'
          - '2009-01-07T00:00:00'
          - '2009-01-08T00:00:00'
      dataset:
        data_path: /climate-default/2026-01-28-vertically-resolved-c96-4deg-daily-shield-amip-ensemble-dataset
        file_pattern: ic_0001.zarr
        engine: zarr
      num_data_workers: 8
    aggregator:
      step_means:
        - step: 5
          target: denorm
          name: day_5
          variables: *inference_variables
        - step: 5
          target: norm
          name: day_5_norm
          variables: *inference_variables
      ensembles: []
      mean_denorm:
        enabled: false
        target: denorm
      mean_norm:
        enabled: false
        target: norm
      enso_index:
        enabled: false
      enso_coefficient:
        enabled: false
      histogram:
        enabled: true
  # Long-case cadence: every 10 epochs. start 9 is a slice index over
  # [1..max_epochs], so these fire on epochs 10,20,...,120 — exactly the
  # EMA-checkpoint-save epochs, including the final epoch.
  - name: amip_long_43year
    weight: 0.0
    epochs:
      start: 9
      step: 10
    n_forward_steps: 15622
    forward_steps_in_memory: 73
    n_ensemble_per_ic: 1
    loader:
      start_indices:
        times:
          - '1979-01-01T00:00:00'
          - '1979-01-02T00:00:00'
          - '1979-01-03T00:00:00'
          - '1979-01-04T00:00:00'
          - '1979-01-05T00:00:00'
          - '1979-01-06T00:00:00'
          - '1979-01-07T00:00:00'
          - '1979-01-08T00:00:00'
      dataset:
        data_path: /climate-default/2026-01-28-vertically-resolved-c96-4deg-daily-shield-amip-ensemble-dataset
        file_pattern: ic_0001.zarr
        engine: zarr
      num_data_workers: 8
    aggregator:
      step_means: []
      ensembles: []
      mean_denorm:
        enabled: false
        target: denorm
      mean_norm:
        enabled: false
        target: norm
      zonal_mean:
        enabled: false
      time_mean_denorm:
        target: denorm
        variables: *inference_variables
      time_mean_norm:
        target: norm
        variables: *inference_variables
      annual:
        variables: *inference_variables
      power_spectrum:
        variables: *inference_variables
      histogram:
        enabled: true
  # The SST/CO2 disentangling case: observed AMIP SSTs with CO2 held constant,
  # verified against the SHiELD AMIP-constant-CO2 simulation itself (so the
  # target is a real simulation, not a persistence-CO2 counterfactual). Same
  # cadence as amip_long_43year: epochs 10,20,...,240, coinciding with EMA
  # checkpoint saves and the final epoch.
  - name: amip_constant_co2_43year
    weight: 0.0
    epochs:
      start: 9
      step: 10
    n_forward_steps: 15622
    forward_steps_in_memory: 73
    n_ensemble_per_ic: 1
    loader:
      start_indices:
        times:
          - '1979-01-01T00:00:00'
          - '1979-01-02T00:00:00'
          - '1979-01-03T00:00:00'
          - '1979-01-04T00:00:00'
          - '1979-01-05T00:00:00'
          - '1979-01-06T00:00:00'
          - '1979-01-07T00:00:00'
          - '1979-01-08T00:00:00'
      dataset:
        data_path: /climate-default/2026-06-30-vertically-resolved-c96-4deg-daily-shield-amip-constant-co2-dataset
        file_pattern: AMIP-constant-CO2.zarr
        engine: zarr
      num_data_workers: 8
    aggregator:
      step_means: []
      ensembles: []
      mean_denorm:
        enabled: false
        target: denorm
      mean_norm:
        enabled: false
        target: norm
      zonal_mean:
        enabled: false
      time_mean_denorm:
