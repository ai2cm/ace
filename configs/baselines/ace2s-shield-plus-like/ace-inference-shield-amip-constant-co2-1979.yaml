# Prescribed-SST inference for the SHiELD-AMIP-only future-tracking evaluation —
# CONSTANT-CO2 arm, full 1979-2020 window (for the annual-evolution figures).
#
# Identical to ace-inference-shield-amip-control.yaml (same with-CO2 checkpoint,
# same 1979-01-02 start, same 15339 steps to 2020-12-31, same prescribed SST via
# the checkpoint's ocean.interpolate) EXCEPT that global_mean_co2 is overwritten
# to a constant 1979 value for every forcing step. This freezes the CO2 input at
# its initial (1979-01-02) level so the rollout sees the real prescribed SST but
# no CO2 rise — isolating the CO2 input's contribution to the 1979->2020 warming
# within a single trained model.
#
# The constant is global_mean_co2 at 1979-01-02 in ic_0001.zarr. This config is
# only meaningful for the WITH-CO2 checkpoint (the no-CO2 stepper never requests
# global_mean_co2, so the overwrite would be a no-op).
checkpoint_path: /ckpt.tar
allow_incompatible_dataset: true
data_writer:
  save_monthly_files: false
  save_prediction_files: false
experiment_dir: /results
forward_steps_in_memory: 73
n_forward_steps: 15339
initial_condition:
  path: /climate-default/2026-01-28-vertically-resolved-c96-4deg-daily-shield-amip-ensemble-dataset/ic_0001.zarr
  engine: zarr
  start_indices:
    times:
      - '1979-01-02T00:00:00'
forcing_loader:
  dataset:
    data_path: /climate-default/2026-01-28-vertically-resolved-c96-4deg-daily-shield-amip-ensemble-dataset
    file_pattern: ic_0001.zarr
    engine: zarr
    overwrite:
      constant:
        global_mean_co2: 0.00033660000190138817
  num_data_workers: 8
logging:
  project: ace
