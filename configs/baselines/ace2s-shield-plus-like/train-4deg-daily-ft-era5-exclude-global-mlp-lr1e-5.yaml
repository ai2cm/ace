# SHiELD+ -> ERA5 fine-tune, family-1 variant C: EXCLUDE the SFNO global MLP.
#
# research: tasks/2026-07-08-finetune-era5-excluding-sfno-global-mlp.md
#           goal   2026-07-08-transfer-learning-forcing-response-verdict
#
# Loads the modern-arm 1-step SHiELD+ pre-train donor (beaker
# 01KXGPGCRQZVVM26N8A9ZX7MZ5 / wandb jnlquua6, epoch 120) via
# stepper_training.parameter_init.weights_path (weights only; fresh optimizer) and
# fine-tunes it on 4-degree/daily ERA5. The single change from the modern straight
# fine-tune is filter_preserves_global_mean: true on the noise-conditioned SFNO, so
# the ERA5 fine-tune cannot relearn ERA5's global means through the l=0 per-mode
# "global MLP" (ace #1358). At spectral_ratio 0.125 the l=0 mode bypasses its
# per-mode weight but still passes through the shared pre/post channel projections,
# so the global mean is NOT held bit-exact -- the flag disables the l=0 MLP, it does
# not freeze the mean. Requires ace #1358 (merged into this experiment branch); on
# main this raises at config validation.
#
# The model architecture, in_names/out_names ORDER, corrector, global_mean_removal
# (tnorm), and residual_prediction: false are taken VERBATIM from the donor's
# pre-train config so the donor checkpoint loads into an identically-shaped model.
# Only the data, normalization stats, and inline inference are retargeted to ERA5
# (matching train-4deg-daily-v2-era5-only.yaml). All 57 donor variables (incl.
# total_frozen_precipitation_rate) are present in the ERA5 4-deg/daily dataset.
#
# RECIPE NOTE (differs from the prior 1-deg/6h transfer attempts): this is the
# modern v2 recipe -- 1-step (n_forward_steps 1), EnsembleLoss (crps 0.9 / energy
# 0.1), fixed lr, max_epochs 120 -- NOT a multi-step fine-tune. The prior negative
# results used a multi-step SHiELD->ERA5 fine-tune at 1-deg/6h; the difference in
# recipe is not expected to change whether fine-tuning forgets the extrapolant
# (+4K SST / future-scenario) responses. EMA checkpoints every 5 epochs let the
# response decay be tracked across the fine-tune.
#
# Evaluation is post-hoc, off the saved checkpoints: +4K via the ERA5
# constant-SST-perturbation harness (ace-inference-era5-p{0,2,4}k.yaml);
# future-scenario via the inline long_46year / long_46year_constant_co2 cases here.
#
# LR VARIANT: lr 1e-5 -- gentler fine-tune (10x lower), perturbs the pre-trained weights less; otherwise identical to the lr1e-4 twin.
seed: 0
experiment_dir: /results
save_checkpoint: true
checkpoint_every_n_batches: 5000
validate_using_ema: true
ema_checkpoint_save_epochs:
  start: 5
  step: 5
max_epochs: 120
ema:
  decay: 0.999
train_aggregator:
  ensemble_metrics: true
