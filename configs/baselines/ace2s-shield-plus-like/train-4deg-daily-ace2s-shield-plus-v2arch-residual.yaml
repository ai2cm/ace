logging:
  log_to_screen: true
  log_to_wandb: true
  log_to_file: true
  project: ace
  entity: ai2cm
train_loader:
  batch_size: 8
  num_data_workers: 4
  prefetch_factor: 4
  time_buffer: 8
  time_buffer_pool_size: 32
  dataset:
    strict: false
    concat:
      # Ramped-climSST random-CO2 ensemble; the first member of each CO2 level
      # has no -ic_0001 suffix in this dataset. Subsets start 2020-01-02: the
      # first daily point whose averaging window is entirely within the
      # post-spinup years (2020-2024), matching the paper's 2020-01-01T06
      # 6-hourly cut.
      - &random_co2_training_data
        data_path: /climate-default/2026-06-08-vertically-resolved-c96-shield-ramped-climSST-random-CO2-ensemble-fme-dataset-4deg-daily
        file_pattern: ramped-sst-1xCO2-random-perturbation.zarr
        engine: zarr
        subset:
          start_time: '2020-01-02'
      - <<: *random_co2_training_data
        file_pattern: ramped-sst-1xCO2-random-perturbation-ic_0002.zarr
      - <<: *random_co2_training_data
        file_pattern: ramped-sst-2xCO2-random-perturbation.zarr
      - <<: *random_co2_training_data
        file_pattern: ramped-sst-2xCO2-random-perturbation-ic_0002.zarr
      - <<: *random_co2_training_data
        file_pattern: ramped-sst-4xCO2-random-perturbation.zarr
      - <<: *random_co2_training_data
        file_pattern: ramped-sst-4xCO2-random-perturbation-ic_0002.zarr
      # Historical AMIP, 30 years in-sample (2009+ held out for validation and
      # inference).
      - data_path: /climate-default/2026-01-28-vertically-resolved-c96-4deg-daily-shield-amip-ensemble-dataset
        file_pattern: ic_0001.zarr
        engine: zarr
        subset:
          start_time: '1979-01-01'
          stop_time: '2008-12-31'
      # SOM equilibrium climates.
      - &equilibrium_climate_training_data
        data_path: /climate-default/2026-06-08-vertically-resolved-4deg-daily-c96-shield-som-ensemble-fme-dataset
        file_pattern: 1xCO2-ic_0001.zarr
        engine: zarr
      - <<: *equilibrium_climate_training_data
        file_pattern: 2xCO2-ic_0001.zarr
      - <<: *equilibrium_climate_training_data
        file_pattern: 4xCO2-ic_0001.zarr
validation:
  loader:
    batch_size: 32
    num_data_workers: 8
    prefetch_factor: 2
    time_buffer: 16
    dataset:
      strict: false
      concat:
        - &random_co2_validation_data
          data_path: /climate-default/2026-06-08-vertically-resolved-c96-shield-ramped-climSST-random-CO2-ensemble-fme-dataset-4deg-daily
          file_pattern: ramped-sst-1xCO2-random-perturbation-ic_0003.zarr
          engine: zarr
          subset:
            start_time: '2022-01-01'
            stop_time: '2022-12-31'
        - <<: *random_co2_validation_data
          file_pattern: ramped-sst-2xCO2-random-perturbation-ic_0003.zarr
        - <<: *random_co2_validation_data
          file_pattern: ramped-sst-4xCO2-random-perturbation-ic_0003.zarr
        - data_path: /climate-default/2026-01-28-vertically-resolved-c96-4deg-daily-shield-amip-ensemble-dataset
          file_pattern: ic_0001.zarr
          engine: zarr
          subset:
            start_time: '2009-01-01'
            stop_time: '2011-12-31'
        - &equilibrium_climate_validation_data
          data_path: /climate-default/2026-06-08-vertically-resolved-4deg-daily-c96-shield-som-ensemble-fme-dataset
          file_pattern: 1xCO2-ic_0002.zarr
          engine: zarr
          subset:
            start_time: '2038-01-01'
            stop_time: '2038-12-31'
        - <<: *equilibrium_climate_validation_data
          file_pattern: 2xCO2-ic_0002.zarr
        - <<: *equilibrium_climate_validation_data
          file_pattern: 4xCO2-ic_0002.zarr
optimization:
  enable_automatic_mixed_precision: false
  lr: 0.0001
  optimizer_type: FusedAdam
  use_gradient_accumulation: true
  kwargs:
    weight_decay: 0.01
stepper_training:
  n_ensemble: 2
  # Single-stage replacement for the paper's separate pre-train and fine-tune
  # runs: 1-step training for epochs 1-120, then the paper's stochastic
  # multi-step distribution (step counts unchanged) for epochs 121-240.
  n_forward_steps:
    start_value: 1
    milestones:
      - epoch: 121
        value:
          outcomes:
            - steps: 1
              probability: 0.6
            - steps: 2
              probability: 0.2
            - steps: 4
              probability: 0.1
            - steps: 12
              probability: 0.05
            - steps: 20
              probability: 0.05
  optimize_last_step_only: true
  loss:
    type: EnsembleLoss
    kwargs:
      crps_weight: 0.9
      energy_score_weight: 0.1
stepper:
  step:
    type: single_module
    config:
      residual_prediction: true
      # The ERA5 v2 baseline's builder settings (the candidate's change #1).
      builder:
        type: NoiseConditionedSFNO
        config:
          embed_dim: 512
          noise_embed_dim: 32
          noise_type: isotropic
          filter_type: linear
          affine_norms: true
          normalize_big_skip: true
          filter_num_groups: 16
          spectral_ratio: 0.125
          use_mlp: true
          num_layers: 8
          operator_type: dhconv
          clip_latent_global_means: true
      normalization:
        network:
          global_means_path: /climate-default/2026-06-08-vertically-resolved-c96-shield-ramped-climSST-random-CO2-ensemble-fme-dataset-4deg-daily-stats/combined/centering.nc
          global_stds_path: /climate-default/2026-06-08-vertically-resolved-c96-shield-ramped-climSST-random-CO2-ensemble-fme-dataset-4deg-daily-stats/combined/scaling-full-field.nc
        residual:
          global_means_path: /climate-default/2026-06-08-vertically-resolved-c96-shield-ramped-climSST-random-CO2-ensemble-fme-dataset-4deg-daily-stats/combined/centering.nc
          global_stds_path: /climate-default/2026-06-08-vertically-resolved-c96-shield-ramped-climSST-random-CO2-ensemble-fme-dataset-4deg-daily-stats/combined/scaling-residual.nc
      ocean:
        surface_temperature_name: surface_temperature
        ocean_fraction_name: ocean_fraction
        interpolate: true
      corrector:
        conserve_dry_air: true
        moisture_budget_correction: advection_and_precipitation
        # No total_energy_budget_correction, unlike the paper's "+" fine-tune:
        # a single-stage run would carry it from the start of training, which
        # complicates fine-tuning these checkpoints on other datasets. It can
        # be added in a later fine-tune (the paper's SHiELD value: 1.13 W/m**2).
        force_positive_names:
          - specific_total_water_0
          - specific_total_water_1
          - specific_total_water_2
          - specific_total_water_3
          - specific_total_water_4
          - specific_total_water_5
          - specific_total_water_6
          - specific_total_water_7
          - Q2m
          - PRATEsfc
          - ULWRFsfc
          - ULWRFtoa
          - DLWRFsfc
          - DSWRFsfc
          - USWRFsfc
          - USWRFtoa
          - total_frozen_precipitation_rate
      next_step_forcing_names:
        - DSWRFtoa
        - global_mean_co2
      in_names:
        - land_fraction
        - ocean_fraction
        - sea_ice_fraction
        - DSWRFtoa
        - HGTsfc
        - PRESsfc
        - surface_temperature
        - TMP2m
        - Q2m
        - UGRD10m
        - VGRD10m
        - air_temperature_0
        - air_temperature_1
        - air_temperature_2
        - air_temperature_3
        - air_temperature_4
        - air_temperature_5
        - air_temperature_6
        - air_temperature_7
        - specific_total_water_0
