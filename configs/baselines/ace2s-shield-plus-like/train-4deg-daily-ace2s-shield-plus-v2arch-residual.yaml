# RESIDUAL member of the CANDIDATE (v2arch) pair for the 4-degree daily
# ACE2S-SHiELD+ analog: identical to
# train-4deg-daily-ace2s-shield-plus-v2arch.yaml except
# residual_prediction: true — the matched residual/no-residual pair the ERA5
# v2 baseline's companion-control guidance calls for (the plain v2arch config
# is the no-residual member). The v2arch changes vs the paper-faithful config
# (train-4deg-daily-ace2s-shield-plus.yaml):
#   1. builder: the v2 NoiseConditionedSFNO settings (noise_embed_dim 32,
#      filter_num_groups 16, spectral_ratio 0.125, normalize_big_skip,
#      clip_latent_global_means) instead of the paper's builder.
#   2. loss: no per-variable weights (the paper's weightings are dropped, as in
#      the ERA5 v2 baseline).
# Everything below this header otherwise matches the original config, whose
# provenance notes follow. If this candidate pans out it forks a successor
# baseline.
#
# 4-degree daily-timestep analog of the ACE2S-SHiELD+ training recipe from
# github.com/ai2cm/ace2s-shield-plus-paper (ACE-experiments/training @ b271da1,
# "full" data recipe + energy-conserving fine-tune — the model the manuscript
# calls ACE2S-SHiELD+). Differences from that two-stage 1-degree/6-hourly
# recipe, beyond swapping in the 4deg-daily datasets:
#   - Single stage: stepper_training.n_forward_steps is an epoch schedule
#     (1-step for epochs 1-120, then the paper's stochastic multi-step
#     distribution for epochs 121-240) instead of separate pre-train and
#     fine-tune runs. Step counts are kept from the paper, so the multi-step
#     horizons are 1-20 days here rather than 6h-5d.
#   - Epochs x4 (30+30 -> 120+120): daily data has 4x fewer samples per year,
#     so this holds total optimizer steps roughly constant.
#   - NO total_energy_budget_correction (the paper's "+" fine-tune has it): in
#     a single-stage run it would be active from the start of training, which
#     complicates fine-tuning these checkpoints on other datasets. A full
#     with-optimizer-state checkpoint is saved at epoch 120 (end of the 1-step
#     phase) for exactly that kind of fine-tuning.
#   - Inline inference uses the current list form: 5-year SOM ic_0003 rollouts
#     at 1x/2x/4xCO2 (checkpoint-selection weight, analogous to the paper's
#     inline inference), a 10-year AMIP rollout, and 43-year AMIP rollouts with
#     historical and constant CO2 (the paper's SST/CO2 disentangling axis).
seed: 0
experiment_dir: /results
save_checkpoint: true
checkpoint_every_n_batches: 5000
validate_using_ema: true
# Full checkpoints (with optimizer state) at epoch 120 — the end of the 1-step
# phase, a clean pre-trained init for fine-tuning on other datasets — and at
# the final epoch.
checkpoint_save_epochs:
  start: 120
  step: 120
ema_checkpoint_save_epochs:
  start: 10
  step: 10
max_epochs: 240
ema:
  decay: 0.999
train_aggregator:
  ensemble_metrics: true
inference:
  # Short-case cadence: every other epoch. The epochs field is a slice over
  # [1..max_epochs], so start 1 / step 2 fires on epochs 2,4,...,240 — which
  # includes every EMA-checkpoint-save epoch (10,20,...,240) and the final
  # epoch.
  - name: som_1xco2_5year
    weight: 1.0
    epochs:
      start: 1
      step: 2
    n_forward_steps: 1825
    forward_steps_in_memory: 73
    n_ensemble_per_ic: 1
    loader:
      start_indices:
        times:
          - '2032-07-01T00:00:00'
          - '2033-01-01T00:00:00'
          - '2033-07-01T00:00:00'
          - '2034-01-01T00:00:00'
          - '2034-07-01T00:00:00'
          - '2035-01-01T00:00:00'
          - '2035-07-01T00:00:00'
          - '2036-01-01T00:00:00'
      dataset:
        data_path: /climate-default/2026-06-08-vertically-resolved-4deg-daily-c96-shield-som-ensemble-fme-dataset
        file_pattern: 1xCO2-ic_0003.zarr
        engine: zarr
      num_data_workers: 8
    aggregator:
      step_means:
        - step: 5
          target: denorm
          name: day_5
          variables: &inference_variables
            - PRATEsfc
            - TMP2m
            - Q2m
            - UGRD10m
            - VGRD10m
            - h500
            - TMP850
            - PRESsfc
            - surface_temperature
            - ULWRFsfc
            - DLWRFsfc
            - USWRFsfc
            - DSWRFsfc
            - ULWRFtoa
            - USWRFtoa
            - LHTFLsfc
            - SHTFLsfc
            - tendency_of_total_water_path_due_to_advection
            - total_frozen_precipitation_rate
            - air_temperature_0
            - air_temperature_1
            - air_temperature_3
            - air_temperature_7
            - specific_total_water_0
            - specific_total_water_1
            - specific_total_water_3
            - specific_total_water_7
            - eastward_wind_0
            - eastward_wind_1
            - eastward_wind_3
            - eastward_wind_7
            - northward_wind_0
            - northward_wind_1
            - northward_wind_3
            - northward_wind_7
            - total_water_path
        - step: 5
          target: norm
          name: day_5_norm
          variables: *inference_variables
      ensembles: []
      mean_denorm:
        enabled: false
        target: denorm
      mean_norm:
        enabled: false
        target: norm
      enso_index:
        enabled: false
      enso_coefficient:
        enabled: false
      histogram:
        enabled: true
  - name: som_2xco2_5year
    weight: 1.0
    epochs:
      start: 1
      step: 2
    n_forward_steps: 1825
    forward_steps_in_memory: 73
    n_ensemble_per_ic: 1
    loader:
      start_indices:
        times:
          - '2032-07-01T00:00:00'
          - '2033-01-01T00:00:00'
          - '2033-07-01T00:00:00'
          - '2034-01-01T00:00:00'
          - '2034-07-01T00:00:00'
          - '2035-01-01T00:00:00'
          - '2035-07-01T00:00:00'
          - '2036-01-01T00:00:00'
      dataset:
        data_path: /climate-default/2026-06-08-vertically-resolved-4deg-daily-c96-shield-som-ensemble-fme-dataset
        file_pattern: 2xCO2-ic_0003.zarr
        engine: zarr
      num_data_workers: 8
    aggregator:
      step_means:
        - step: 5
          target: denorm
          name: day_5
          variables: *inference_variables
        - step: 5
          target: norm
          name: day_5_norm
          variables: *inference_variables
      ensembles: []
      mean_denorm:
        enabled: false
        target: denorm
      mean_norm:
        enabled: false
        target: norm
      enso_index:
        enabled: false
      enso_coefficient:
        enabled: false
      histogram:
        enabled: true
  - name: som_4xco2_5year
    weight: 1.0
    epochs:
      start: 1
      step: 2
    n_forward_steps: 1825
    forward_steps_in_memory: 73
    n_ensemble_per_ic: 1
    loader:
      start_indices:
        times:
          - '2032-07-01T00:00:00'
          - '2033-01-01T00:00:00'
          - '2033-07-01T00:00:00'
          - '2034-01-01T00:00:00'
          - '2034-07-01T00:00:00'
          - '2035-01-01T00:00:00'
          - '2035-07-01T00:00:00'
          - '2036-01-01T00:00:00'
      dataset:
        data_path: /climate-default/2026-06-08-vertically-resolved-4deg-daily-c96-shield-som-ensemble-fme-dataset
        file_pattern: 4xCO2-ic_0003.zarr
        engine: zarr
      num_data_workers: 8
    aggregator:
      step_means:
        - step: 5
          target: denorm
          name: day_5
          variables: *inference_variables
        - step: 5
          target: norm
          name: day_5_norm
          variables: *inference_variables
      ensembles: []
      mean_denorm:
        enabled: false
        target: denorm
      mean_norm:
        enabled: false
        target: norm
      enso_index:
        enabled: false
      enso_coefficient:
        enabled: false
      histogram:
        enabled: true
  - name: amip_10year
    weight: 0.0
    epochs:
      start: 1
      step: 2
    n_forward_steps: 3652
    forward_steps_in_memory: 73
    n_ensemble_per_ic: 1
    loader:
      start_indices:
        times:
          - '2009-01-01T00:00:00'
          - '2009-01-02T00:00:00'
          - '2009-01-03T00:00:00'
          - '2009-01-04T00:00:00'
          - '2009-01-05T00:00:00'
          - '2009-01-06T00:00:00'
          - '2009-01-07T00:00:00'
          - '2009-01-08T00:00:00'
      dataset:
        data_path: /climate-default/2026-01-28-vertically-resolved-c96-4deg-daily-shield-amip-ensemble-dataset
        file_pattern: ic_0001.zarr
        engine: zarr
      num_data_workers: 8
    aggregator:
