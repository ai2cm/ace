# Endpoint-conditioned video interpolation on X-SHiELD AMIP 3-hourly data.
# Temporal-only: fine and coarse point at the SAME store (downscale factor 1);
# coarse is loaded but ignored by the model. Each clip is a 24h window
# (n_timesteps: 9 -> endpoints at 0h/24h + 7 interior frames at 3h spacing).
#
# Train/val/test split (chronological, whole-year, ~4019 daily clips total):
#   train: 2013-01-02 .. 2021-12-31   (~3290 clips)
#   val:   2022-01-01 .. 2022-12-31   (~365 clips)
#   test:  2023-01-01 .. 2024-01-04   (~370 clips)   <- used by evaluation, not here
# The split is encoded via each dataset's `subset` TimeSlice; the same zarr is
# reused, date-limited. Clips never cross a split boundary (a 9-frame clip must
# fit entirely within the subset), so there is no train/val/test leakage.
#
# First model uses 4 channels: u10, v10, PRMSL, PRATE (no 2m temperature).
# Normalization means/stds are per-variable statistics computed from the TRAIN
# split ONLY, over exactly the training region+period the model sees
# (2013-01-02..2021-12-31, box lat 0-30 / lon 0-60), subsampled every ~5 days.
# Recompute (toy/compute_norm_stats.py) if out_names, the box, or train range change.
# NOTE: PRATEsfc is precipitation -- non-negative and heavy-tailed, so plain
# mean/std standardization is crude; a log1p transform would help in a later pass.
experiment_dir: /will/be/overwritten
max_epochs: 20
validate_using_ema: true
validate_interval: 1
generate_n_samples: 1
log_loss_vs_noise: true
logging:
  log_to_screen: true
  log_to_wandb: true
  log_to_file: true
  project: ace-temporal-interp
  name: regional-30-60-1degree-24to3
  entity: ai2cm
optimization:
  lr: 0.0001
ema:
  decay: 0.9999
train_data:
  n_timesteps: 9
  fine:
    - data_path: gs://vcm-ml-scratch/andrep
      file_pattern: 2025-07-25-X-SHiELD-AMIP-FME-3h.zarr
      engine: zarr
      subset:
        start_time: "2013-01-02"
        stop_time: "2021-12-31"
  coarse:
    - data_path: gs://vcm-ml-scratch/andrep
      file_pattern: 2025-07-25-X-SHiELD-AMIP-FME-3h.zarr
      engine: zarr
      subset:
        start_time: "2013-01-02"
        stop_time: "2021-12-31"
  batch_size: 4
  num_data_workers: 0
  strict_ensemble: false
  lat_extent:
    start: 0
    stop: 30
  lon_extent:
    start: 0
    stop: 60
validation_data:
  n_timesteps: 9
  fine:
    - data_path: gs://vcm-ml-scratch/andrep
      file_pattern: 2025-07-25-X-SHiELD-AMIP-FME-3h.zarr
      engine: zarr
      subset:
        start_time: "2022-01-01"
        stop_time: "2022-12-31"
  coarse:
    - data_path: gs://vcm-ml-scratch/andrep
      file_pattern: 2025-07-25-X-SHiELD-AMIP-FME-3h.zarr
      engine: zarr
      subset:
        start_time: "2022-01-01"
        stop_time: "2022-12-31"
  batch_size: 4
  num_data_workers: 0
  strict_ensemble: false
  lat_extent:
    start: 0
    stop: 30
  lon_extent:
    start: 0
    stop: 60
model:
  n_timesteps: 9
  model_channels: 64
  n_heads: 4
  num_freqs: 4
  sigma_min: 0.002
  sigma_max: 150.0
  churn: 0.0
  num_diffusion_generation_steps: 18
  training_noise_distributions:
    eastward_wind_at_ten_meters:
      p_mean: -1.2
      p_std: 1.8
    northward_wind_at_ten_meters:
      p_mean: -1.2
      p_std: 1.8
    PRMSL:
      p_mean: -1.2
      p_std: 1.8
    PRATEsfc:
      p_min: 0.005
      p_max: 2000.0
  sigma_min_by_channel:
    PRATEsfc: 0.005
  sigma_max_by_channel:
    PRATEsfc: 2000.0
  out_names:
    - eastward_wind_at_ten_meters
    - northward_wind_at_ten_meters
    - PRMSL
    - PRATEsfc
  normalization:
    means:
      eastward_wind_at_ten_meters: -0.206107
      northward_wind_at_ten_meters: 0.133348
      PRMSL: 1009.104862
      PRATEsfc: 0.000014
    stds:
      eastward_wind_at_ten_meters: 2.845158
      northward_wind_at_ten_meters: 3.598240
      PRMSL: 5.558873
      PRATEsfc: 0.000098
