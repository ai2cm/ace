name: No Claude logs

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check-claude-logs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure no log outputs in scripts/claude_logs/logs
        run: |
          # Find any files in the logs directory (excluding .gitkeep)
          files=$(find scripts/claude_logs/logs -type f ! -name '.gitkeep' 2>/dev/null || true)
          if [ -n "$files" ]; then
            echo "::error::Claude log outputs found — remove before merging:"
            echo "$files"
            exit 1
          fi
          echo "No log outputs found. OK."
