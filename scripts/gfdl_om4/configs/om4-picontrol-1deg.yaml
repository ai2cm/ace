# 5-daily 1-degree ocean (Samudra) store from the piControl sample year.
target_grid: F90
weights_url: gs://vcm-ml-scratch/jamesd/gfdl-om4-regridding-weights/v1/om4-tripolar-0.25deg-to-F90
expected_level_count: 19
shift_timestamps_to_avg_interval_midpoint: false
output:
  path: gs://vcm-ml-scratch/jamesd/2026-07-06-om4-picontrol-sample-1deg.zarr
  time_chunk_size: 1
  time_shard_size: 365
wetmask:
  store: gs://vcm-ml-scratch/spencerc/2026-06-24-trial-samudra-floenet-post-processing/zarrs/piControl/ocean_1daily_snap_subset_to_5daily_snap.zarr
  variable: thetao
statics:
  store: gs://vcm-ml-scratch/spencerc/2026-06-24-trial-samudra-floenet-post-processing/zarrs/piControl/ocean_static.zarr
  variables:
    - deptho
    - hfgeou
streams:
  - name: snapshot_ocean
    store: gs://vcm-ml-scratch/spencerc/2026-06-24-trial-samudra-floenet-post-processing/zarrs/piControl/ocean_1daily_snap_subset_to_5daily_snap.zarr
    variables:
      - thetao
      - so
      - uo
      - vo
      - tos
      - zos
      - SSH
      - mlotst
      - rhoinsitu
    rotated_pairs:
      - [uo, vo]
    # These sources carry coastal staggered velocity faces that are valid
    # with value exactly 0.0 where the vertical remap unmasked land columns;
    # the artifact flags them so they are not averaged into coastal centers.
    face_mask_url: gs://vcm-ml-scratch/jamesd/gfdl-om4-face-masks/v1/om4-picontrol-2026-06-24
    postprocess:
      - kelvin_sst
  # 5-day-mean surface fluxes/forcings, whose end-of-interval time labels
  # coincide with the snapshot instants (enforced by the time-alignment
  # assertion).
  - name: flux
    store: gs://vcm-ml-scratch/spencerc/2026-06-24-trial-samudra-floenet-post-processing/zarrs/piControl/ocean_1daily_coarsened_to_5daily.zarr
    variables:
      - hfds
      - hflso
      - hfsso
      - rlntds
      - rsntds
      - hfsifrazil
      - hfevapds
      - hfrainds
      - hfrunoffds
      - wfo
      - prlq
      - prsn
      - evs
      - sfdsi
      - tauuo
      - tauvo
      - ustar
    rotated_pairs:
      - [tauuo, tauvo]
    postprocess:
      - hfds_total_area
  # Ice-model true snapshots, subsampled from 6-hourly to the 5-daily
  # snapshot instants (every 20th step). The ice SSH is the sea surface as
  # seen by the ice model, distinct from the ocean-store SSH and zos.
  - name: ice_snapshot
    store: gs://vcm-ml-scratch/spencerc/2026-06-24-trial-samudra-floenet-post-processing/zarrs/piControl/ice_6hourly_snap.zarr
    variables:
      - sea_ice_fraction
      - EXT
      - HI
      - HS
      - UI
      - VI
      - TS
      - TSN
      - SST
      - SSS
      - simass
      - sisnmass
      - SSH
    dim_renaming:
      xT: xh
      yT: yh
      xB: xq
      yB: yq
    time_subsample_stride: 20
    rotated_pairs:
      - [UI, VI]
    renaming:
      SSH: SSH_ice
      sea_ice_fraction: ocean_sea_ice_fraction
    full_cell_variables:
      - sea_ice_fraction
    postprocess:
      - sea_ice
  # Ice-model 6-hourly means at the snapshot instants (each mean covers the
  # 6 hours ending at the instant), treated as snapshot estimates.
  - name: ice_mean_as_snapshot
    store: gs://vcm-ml-scratch/spencerc/2026-06-24-trial-samudra-floenet-post-processing/zarrs/piControl/ice_6hourly.zarr
    variables:
      - T1
      - T2
      - T3
      - T4
      - T_bulkice
    dim_renaming:
      xT: xh
      yT: yh
    time_subsample_stride: 20
