version: "2026-07-15"
family_name: om4-1pctco2-1deg-coupled
output_directory: gs://vcm-ml-intermediate

coupled_datasets:
  coupled_ts:
    how: interpolate_sst
  coupled_sea_surface:
    precomputed_sea_ice_mask:
      zarr_path: gs://vcm-ml-intermediate/2026-07-15-om4-picontrol-1deg-coupled-ocean.zarr
    ocean_extra_masked_names: ["HI", "sea_ice_volume", "UI", "VI", "sfdsi"]
    ocean_extra_fill_values:
      UI: 0.0
      VI: 0.0
    surface_flux_window_avg:
      window_timedelta: 120h
      # The ocean store labels its 5-day intervals at the interval end, so the
      # flux windows are right-labeled at those same instants (no midpoint
      # shift): each window (t - 120h, t] ends at an ocean timestep t.
      first_timestamp: "0001-01-06T00:00:00"
      last_timestamp: "0141-01-01T00:00:00"
      subset_names:
        - DLWRFsfc
        - DSWRFsfc
        - ULWRFsfc
        - USWRFsfc
        - LHTFLsfc
        - SHTFLsfc
        - PRATEsfc
        - eastward_surface_wind_stress
        - northward_surface_wind_stress
        - total_frozen_precipitation_rate
  coupled_sea_ice:
    # No window_avg and no sea_ice input dataset: the sea ice fraction is
    # sourced from the ocean store's native 5-daily fields and forward-filled
    # onto the atmosphere's 6-hourly time index.
    include_ts: true
    use_atmosphere_sea_ice_fraction_fallback: false
  output_writer:
    n_dask_workers: 32

input_datasets:
  climate_data_type: "CM4"
  atmosphere:
    zarr_path: gs://vcm-ml-intermediate/2026-06-19-CM4-1pctCO2-atmosphere-land-1deg-8layer-140yr.zarr
    time_chunk_size: 360
    extra_fields:
      names_and_prefixes: ["ak_", "bk_"]
  ocean:
    zarr_path: gs://vcm-ml-intermediate/2026-07-15-om4-1pctco2-1deg-ocean-5daily.zarr
    time_chunk_size: 365
    extra_fields:
      names_and_prefixes: ["idepth_", "mask_", "deptho"]
  stats:
    atmosphere_dir: gs://vcm-ml-intermediate/2026-06-19-CM4-1pctCO2-atmosphere-land-1deg-8layer-140yr-stats/combined
    ocean_dir: gs://vcm-ml-intermediate/2026-07-15-om4-1pctco2-1deg-ocean-5daily-stats
