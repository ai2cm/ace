version: "2026-05-27"
family_name: E3SMv3-piControl-100yr-coupled
output_directory: /pscratch/sd/e/elynnwu/fme-dataset

coupled_datasets:
  coupled_ts:
    how: interpolate_sst
  coupled_sea_surface:
    sst_threshold: 291.75
    ocean_extra_masked_names: ["iceVolumeTotal", "iceThicknessMean"]
    ocean_extra_fill_values:
      uVelocityGeoCell: 0.0
      vVelocityGeoCell: 0.0    
    surface_flux_window_avg:
      window_timedelta: 120h
      first_timestamp: "0401-01-03T12:00:00"
      last_timestamp: "0501-01-03T12:00:00"
      subset_names:
        - FLUS
        - FSUS
        - FLDS
        - FSDS
        - LHFLX
        - SHFLX
        - surface_precipitation_rate
        - frozen_precipitation_rate
        - TAUX
        - TAUY
  coupled_sea_ice:
    window_avg:
      window_timedelta: 120h
      first_timestamp: "0401-01-06T00:00:00"
      shift_timestamps_to_avg_interval_midpoint: true
    include_ts: true
  output_writer:
    n_dask_workers: 32
  input_field_names:
    atmosphere:
      surface_temperature_name: TS
      sea_ice_fraction_name: ICEFRAC
      land_fraction_name: LANDFRAC
      ocean_fraction_name: OCNFRAC
    ocean:
      hfds_name: surfaceHeatFluxTotal

input_datasets:
  climate_data_type: "E3SMV2"
  atmosphere:
    zarr_path: /pscratch/sd/e/elynnwu/fme-dataset/2026-05-26-E3SMv3-piControl-atmosphere-100yr-6H.zarr
    time_chunk_size: 500
    extra_fields:
      names_and_prefixes: ["ak_", "bk_"]
  ocean:
    zarr_path: /pscratch/sd/e/elynnwu/fme-dataset/2026-05-26-E3SMv3-piControl-ocean-100yr-5D-average.zarr
    time_chunk_size: 25
    extra_fields:
      names_and_prefixes: ["idepth_", "mask_"]
  stats:
    atmosphere_dir: /pscratch/sd/e/elynnwu/fme-dataset/2026-05-26-E3SMv3-piControl-atmosphere-100yr-6H-stats
    ocean_dir: /pscratch/sd/e/elynnwu/fme-dataset/2026-05-26-E3SMv3-piControl-ocean-100yr-5D-average-stats
