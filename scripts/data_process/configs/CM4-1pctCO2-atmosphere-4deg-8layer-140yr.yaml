runs:
  2025-06-18-CM4-1pctCO2-atmosphere-land-4deg-8layer-140yr: gs://vcm-ml-raw-flexible-retention/2025-04-04-CM4/regridded-zarrs/gaussian_grid_45_by_90/1pctCO2
data_output_directory: gs://vcm-ml-intermediate
stats:
  output_directory: gs://vcm-ml-intermediate/2025-06-18-CM4-1pctCO2-atmosphere-land-4deg-8layer-140yr-stats
  start_date: "0211-01-01T06:00:00"
  end_date: "0351-01-01T00:00:00"
  data_type: CM4
  beaker_dataset: 2025-06-18-CM4-1pctCO2-atmosphere-land-4deg-8layer-140yr
dataset_computation:
  sharding:
    time_dim: 3600
  n_split: 50
  reference_vertical_coordinate_file: gs://vcm-ml-raw-flexible-retention/2024-08-10-pre-industrial-CM4-simulation/vertical-coordinate-file/fv_core.res.nc
  reference_vertical_coordinate_file_land: gs://vcm-ml-raw-flexible-retention/2024-11-01-CM4-piControl/land-vertical-coordinate-file/land-vertical-coordinate.nc
  vertical_coarsening_indices:
    # computed here: https://github.com/ai2cm/explore/blob/master/jamesd/2024-08-13-pre-industiral-CM4-eda/2024-08-28-AM4-vertical-indices.ipynb
    - [0, 7]
    - [7, 10]
    - [10, 13]
    - [13, 16]
    - [16, 18]
    - [18, 22]
    - [22, 25]
    - [25, 33]
  vertical_coarsening_indices_land:
    # computed here: https://github.com/ai2cm/explore2/blob/main/troya/2025-02-28-LS-evaluation/soil-levels-lm4.ipynb
    - [0, 2]
    - [2, 6]
    - [6, 10]
    - [10, 15]
  validate_vertical_coarsening_indices_land: false  # land vertical coarsening indices intentionally do not span full depth
  mask_soil_moisture: true
  renaming:
    specific_humidity_at_two_meters: Q2m
    air_temperature_at_two_meters: TMP2m
    eastward_wind_at_ten_meters: UGRD10m
    northward_wind_at_ten_meters: VGRD10m
  variable_sources:
    fluxes_2d.zarr:
      - PRATEsfc
      - SHTFLsfc
      - DLWRFsfc
      - DSWRFsfc
      - DSWRFtoa
      - ULWRFsfc
      - ULWRFtoa
      - USWRFsfc
      - USWRFtoa
      - eastward_surface_wind_stress
      - northward_surface_wind_stress
      - surface_evaporation_rate
      - total_energy
      - total_frozen_precipitation_rate
    full_state.zarr:
      # 2D vars
      - HGTsfc # static
      - PRESsfc
      - PRMSL
      - surface_temperature
      - air_temperature_at_two_meters
      - specific_humidity_at_two_meters
      - eastward_wind_at_ten_meters
      - northward_wind_at_ten_meters
      - h500
      - TMP850
      # 3D vars:
      - air_temperature
      - specific_humidity # water species
      - cloud_water_mixing_ratio # water species
      - cloud_ice_mixing_ratio # water species
      - eastward_wind
      - northward_wind
    full_state_land.zarr:
      - column_soil_moisture
      - GHTFLsfc
      - surface_snow_amount
      - surface_snow_area_fraction
      - total_land_column_energy_without_rivers
      - total_precipitation_heat_flux
      - total_vapor_sensible_heat_flux
      - downward_longwave_radiative_flux
      - net_surface_longwave_radiative_flux
      # below are vertically resolved soil layer variables -- need to be coarsened
      - total_moisture_content_of_soil_layer
      - temperature_of_soil_layer
    land_static.zarr:
      - land_fraction
    ice_6hourly.zarr:
      - sea_ice_fraction
    scalar.zarr:
      - carbon_dioxide
    land_surface_type_fractions.zarr:
      - glac_fraction
      - soil_fraction
      - lake_fraction
  standard_names:
    longitude_dim: lon
    latitude_dim: lat
    graupel_mixing_ratio: None
    rain_mixing_ratio: None
    snow_mixing_ratio: None
    precipitable_water_path: None
    surface_snow_rate: None
    surface_ice_rate: None
    surface_graupel_rate: None
    land_names_to_vertically_coarsen_by_height_weighting:
      - temperature_of_soil_layer
    land_names_to_vertically_coarsen_by_sum:
      - total_moisture_content_of_soil_layer
time_coarsen:
  factor: 4
  data_output_directory: gs://vcm-ml-intermediate/2025-06-18-CM4-1pctCO2-atmosphere-land-4deg-8layer-140yr-daily
  stats_output_directory: gs://vcm-ml-intermediate/2025-06-18-CM4-1pctCO2-atmosphere-land-4deg-8layer-140yr-daily-stats
  snapshot_names:
    - PRESsfc
    - PRMSL
    - Q2m
    - TMP2m
    - TMP850
    - UGRD10m
    - VGRD10m
    - air_temperature_0
    - air_temperature_1
    - air_temperature_2
    - air_temperature_3
    - air_temperature_4
    - air_temperature_5
    - air_temperature_6
    - air_temperature_7
    - carbon_dioxide
    - column_soil_moisture
    - eastward_wind_0
    - eastward_wind_1
    - eastward_wind_2
    - eastward_wind_3
    - eastward_wind_4
    - eastward_wind_5
    - eastward_wind_6
    - eastward_wind_7
    - h500
    - northward_wind_0
    - northward_wind_1
    - northward_wind_2
    - northward_wind_3
    - northward_wind_4
    - northward_wind_5
    - northward_wind_6
    - northward_wind_7
    - sea_ice_fraction
    - specific_humidity_0
    - specific_humidity_1
    - specific_humidity_2
    - specific_humidity_3
    - specific_humidity_4
    - specific_humidity_5
    - specific_humidity_6
    - specific_humidity_7
    - specific_total_water_0
    - specific_total_water_1
    - specific_total_water_2
    - specific_total_water_3
    - specific_total_water_4
    - specific_total_water_5
    - specific_total_water_6
    - specific_total_water_7
    - surface_snow_amount
    - surface_snow_area_fraction
    - surface_temperature
    - temperature_of_soil_layer_0
    - temperature_of_soil_layer_1
    - temperature_of_soil_layer_2
    - temperature_of_soil_layer_3
    - total_land_column_energy_without_rivers
    - total_moisture_content_of_soil_layer_0
    - total_moisture_content_of_soil_layer_1
    - total_moisture_content_of_soil_layer_2
    - total_moisture_content_of_soil_layer_3
    - total_water_path
  window_names:
    - DLWRFsfc
    - DSWRFsfc
    - DSWRFtoa
    - GHTFLsfc
    - LHTFLsfc
    - PRATEsfc
    - SHTFLsfc
    - ULWRFsfc
    - ULWRFtoa
    - USWRFsfc
    - USWRFtoa
    - downward_longwave_radiative_flux
    - eastward_surface_wind_stress
    - net_surface_longwave_radiative_flux
    - northward_surface_wind_stress
    - tendency_of_total_water_path
    - tendency_of_total_water_path_due_to_advection
    - total_energy
    - total_frozen_precipitation_rate
    - total_precipitation_heat_flux
    - total_vapor_sensible_heat_flux
  constant_prefixes:
    - HGTsfc
    - ak_
    - bk_
    - glac_fraction
    - lake_fraction
    - land_fraction
    - lat
    - lon
    - soil_fraction
