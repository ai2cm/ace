    - UGRD200
    - UGRD500
    - UGRD850
    - VGRD1000
    - VGRD10m
    - VGRD200
    - VGRD500
    - VGRD850
    - air_temperature_0
    - air_temperature_1
    - air_temperature_2
    - air_temperature_3
    - air_temperature_4
    - air_temperature_5
    - air_temperature_6
    - air_temperature_7
    - eastward_wind_0
    - eastward_wind_1
    - eastward_wind_2
    - eastward_wind_3
    - eastward_wind_4
    - eastward_wind_5
