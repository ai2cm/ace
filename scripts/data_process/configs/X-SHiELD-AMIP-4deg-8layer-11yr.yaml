    - specific_total_water_3
    - specific_total_water_4
    - specific_total_water_5
    - specific_total_water_6
    - specific_total_water_7
    - surface_temperature
    - total_water_path
  window_names:
    - DLWRFsfc
    - DSWRFsfc
    - DSWRFtoa
    - LHTFLsfc
    - PRATEsfc
    - SHTFLsfc
    - ULWRFsfc
    - ULWRFtoa
    - USWRFsfc
    - USWRFtoa
    - global_mean_co2
    - tendency_of_total_water_path
    - tendency_of_total_water_path_due_to_advection
    - total_frozen_precipitation_rate
  constant_prefixes:
    - ak_
    - bk_
    - HGTsfc
    - grid_xt
    - grid_yt
  input_time_slice:  # ensures coarsened data starts on 2013-01-02T00:00:00
    start: "2013-01-01T06:00:00"
