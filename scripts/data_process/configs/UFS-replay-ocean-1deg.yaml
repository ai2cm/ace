# Configuration for preprocessing the UFS GEFSv13 replay ocean dataset
# for SamudrACE-type uncoupled ocean training.
#
# Data source: https://registry.opendata.aws/noaa-ufs-gefsv13replay-pds/
# GCP zarr: gs://noaa-ufs-gefsv13replay/ufs-hr1/
#
# Uses the 0.25-degree stores which cover the full ~30-year record (1994-2023):
#   - MOM6 ocean: 43826 timesteps, 768×1536 grid, 75 vertical levels
#   - FV3 atmosphere: 87020 timesteps, 768×1536 grid
#
# Horizontal regridding from 0.25° to 1° Gaussian (F90 = 180×360) is done
# via xESMF conservative regridding, matching the ERA5 pipeline in
# scripts/era5/pipeline/xr-beam-pipeline.py.
#
# Usage:
#   python compute_ocean_dataset_ufs_replay.py \
#       --config configs/UFS-replay-ocean-1deg.yaml \
#       --output-store <output-path>.zarr

ocean_zarr: gs://noaa-ufs-gefsv13replay/ufs-hr1/0.25-degree/06h-freq/zarr/mom6.zarr
atmo_zarr: gs://noaa-ufs-gefsv13replay/ufs-hr1/0.25-degree/03h-freq/zarr/fv3.zarr
output_directory: .  # override via --output-store

# Horizontal regridding: 0.25° → 1° Gaussian grid (F90 = 180×360)
# Uses xESMF conservative regridding, same approach as ERA5 pipeline.
# Set output_grid to "" to skip regridding (e.g. if using pre-regridded data).
regrid:
  output_grid: F90
  method: conservative

# Vertical level sub-selection: pick 19 of 75 native MOM6 levels.
# Indices chosen to best-match the 19 CM4 target depths (for fine-tuning
# a CM4-trained SamudrACE checkpoint). Max depth error ~77 m, mean ~13 m.
# Depths (m): 0.5, 5.2, 14.1, 31.0, 47.4, 77.8, 133.4, 200.3, 301.7,
#             458.9, 629.7, 858.5, 1153.9, 1654.3, 2102.4, 2777.0,
#             3514.0, 4488.5, 5494.7
vertical_coarsen:
  target_indices:
  - 0
  - 4
  - 9
  - 14
  - 17
  - 21
  - 26
  - 30
  - 34
  - 38
  - 41
  - 44
  - 47
  - 51
  - 54
  - 58
  - 62
  - 67
  - 72

# Temporal coarsening: get daily data
time_coarsen_factor: 4

# Renaming: MOM6 zarr names → SamudrACE standard names
ocean_rename:
  temp: thetao
  SSH: zos

# Wind stress from MOM6 ocean store (already ocean-received)
stress_rename:
  taux: eastward_surface_wind_stress
  tauy: northward_surface_wind_stress

# Surface atmospheric forcing from FV3 (averaged fluxes)
atmo_forcing_vars:
  dlwrf_ave: DLWRFsfc
  dswrf_ave: DSWRFsfc
  ulwrf_ave: ULWRFsfc
  uswrf_ave: USWRFsfc
  lhtfl_ave: LHTFLsfc
  shtfl_ave: SHTFLsfc
  prate_ave: PRATEsfc

# Sea-ice variables from FV3
ice_vars:
  icec: ocean_sea_ice_fraction
  icetk: HI

# Chunking for intermediate computation
chunking:
  time_dim: 1
  latitude_dim: 180
  longitude_dim: 360

# Outer shard size for final zarr
sharding:
  time_dim: 360

n_split: 100

dask:
  n_workers: 32
  use_gateway: false
