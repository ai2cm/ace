# Beaker/gantry config for mirroring the v2 production zarr output to
# Weka as netCDF. v2 is the cohort sitting at schema 0.9.0 across all
# 243 datasets, including:
#   - the ESGF CFday-cadence augment (TOA + clear-sky radiation,
#     wap500, clivi, clwvi, surface pressure, ...)
#   - derived ``total_water_path`` (via 0.8.1 → 0.9.0 migration)
#   - cohort + per-source normalization stats that include trivial
#     mean=0/std=1 entries for masks, ``land_fraction`` (sftlf), and
#     ``luh2_forest``
# The per-dataset netCDF writes use zlib1+shuffle so the on-Weka size
# is ~4.5 TB rather than the ~11 TB uncompressed prior pass produced.
#
# Submit with:
#   ./zarr_to_netcdf_beaker.sh --config configs/zarr-to-netcdf-prod-v2.yaml \
#     [--force]   # pass when overwriting a stale Weka mirror

gcs_source: gs://vcm-ml-intermediate/2026-05-22-cmip6-multimodel-daily-4deg-8plev-1940-2100/v2
weka_destination: /climate-default/2026-05-22-cmip6-multimodel-daily-4deg-8plev-1940-2100/v2
# Per-decade-load peak RSS is ~2-3 GB per worker; phobos default pod
# memory leaves room for ~8 concurrent workers without OOM headroom
# concerns. The original 16-worker run wedged the process pool when
# every worker tried to materialise its full zarr at once (the pre-
# decade-load version of convert_one did a full ds.load()).
workers: 8
# 10-year files (``data.YYYY-YYYY.nc``) trade a 10× reduction in
# file count for slightly bigger per-file sizes (~5 GB at this
# variable count). Intra-file chunking is unchanged (1 day per
# HDF5 chunk) so per-day random access stays just as fast.
years_per_file: 10
