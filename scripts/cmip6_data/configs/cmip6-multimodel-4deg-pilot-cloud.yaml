# Cloud-side smoke-test for the production run.
#
# Same Pangeo data source, same model selection and override set as
# the production config ``cmip6-multimodel-4deg-1940-2100-cloud.yaml``,
# but only 1 year per scenario (2010 historical, 2015 SSPs).
# Output lands in the same bucket as the production run under a
# ``v0-pilot/`` prefix so the smoke test doesn't stomp on the
# production ``v0/`` data while staying close enough to share
# bucket-level config (lifecycle, access).
#
# Inventory is shared with production (one build is enough): both
# configs point at the same ``inventory.csv``.

inventory_path: gs://vcm-ml-intermediate/2026-05-22-cmip6-multimodel-daily-4deg-8plev-1940-2100/inventory.csv
output_directory: gs://vcm-ml-intermediate/2026-05-22-cmip6-multimodel-daily-4deg-8plev-1940-2100/v0-pilot

defaults:
  time_subset:
    historical: {start: "2010-01-01", end: "2010-12-31"}
    ssp126: {start: "2015-01-01", end: "2015-12-31"}
    ssp245: {start: "2015-01-01", end: "2015-12-31"}
    ssp370: {start: "2015-01-01", end: "2015-12-31"}
    ssp585: {start: "2015-01-01", end: "2015-12-31"}

selection:
  exclude_source_ids:
    - INM-CM4-8
    - AWI-CM-1-1-MR
    - KACE-1-0-G
  experiments: [historical, ssp126, ssp245, ssp370, ssp585]

overrides:
  - match:
      source_id: CESM2-WACCM
      experiment: historical
      variant_label: r2i1p1f1
    allow_dedupe: true
  - match:
      source_id: AWI-ESM-1-1-LR
    skip_surface_and_ocean_variables:
      - simon_siconc
      - simon_sitemptop
      - siday_siconc
      - siday_sitemptop
      - siday_sithick
      - oday_tos
      - oday_tossq
      - oday_omldamax
      - oday_sos
      - omon_zos
