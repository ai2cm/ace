# CMIP6 multi-model daily dataset — Pangeo source, cloud bucket.
#
# Production config (not pilot). Used by ``process.py`` to ingest the
# Pangeo CMIP6 mirror into the cloud bucket. The matching ESGF-side
# config is ``cmip6-multimodel-4deg-1940-2100-esgf-cloud.yaml`` and the
# inventory builder is
# ``cmip6-multimodel-4deg-1940-2100-inventory.yaml``.
#
# Scope: 5 experiments × historical 1940-2014 + 4 SSPs 2015-2100,
# ~415 (model, experiment, member) datasets, ~11.5 TB on disk.

inventory_path: gs://vcm-ml-intermediate/2026-05-22-cmip6-multimodel-daily-4deg-8plev-1940-2100/inventory.csv
output_directory: gs://vcm-ml-intermediate/2026-05-22-cmip6-multimodel-daily-4deg-8plev-1940-2100/v2
# Externals (CO2/SO2/BC/LUH2) live under a version-independent
# subdirectory so subsequent v0/v1/... runs all reuse the same
# staged copy. Bump only when external_forcings.py changes.
external_forcings_directory: gs://vcm-ml-intermediate/2026-05-22-cmip6-multimodel-daily-4deg-8plev-1940-2100/external_forcings

defaults:
  time_subset:
    historical: {start: "1940-01-01", end: "2014-12-31"}
    ssp126: {start: "2015-01-01", end: "2100-12-31"}
    ssp245: {start: "2015-01-01", end: "2100-12-31"}
    ssp370: {start: "2015-01-01", end: "2100-12-31"}
    ssp585: {start: "2015-01-01", end: "2100-12-31"}
  chunking:
    # Inner zarr v3 chunk: 360 days (matches 360_day calendars cleanly,
    # ~1 year of data for noleap/standard too). The dataclass default
    # of 1 produces millions of sub-shard tasks under the synchronous
    # dask scheduler — see v5 pilot vs. b4nvt profiling. We will be
    # converting to netCDF downstream, so read-amplification at
    # training time isn't a concern here.
    chunk_time: 360
    # Outer shard: 7200 days ≈ 20 years. With 86-yr ssp datasets
    # that's ~5 shards per variable instead of ~86 with shard_time=365.
    # Larger shards = fewer GCS object writes.
    shard_time: 7200
    variable_batch_size: 8

selection:
  exclude_source_ids:
    # INM-CM4-8 publishes anomalously low ``zg`` at 10 hPa for a
    # subset of grid cells, which collapses the derived layer-6 T
    # to ~60 K (unphysical). See README's "Known model-side data
    # quirks" and figures/inm_cm4_8_zg_top.png.
    - INM-CM4-8
    # AWI-CM-1-1-MR publishes 3D variables on a non-standard plev
    # grid (not plev8), so derived layer variable names don't match
    # the pipeline's plev8 convention.
    - AWI-CM-1-1-MR
    # KACE-1-0-G has sparse NaN values at 10 hPa (ua10, va10,
    # hus10, zg10) — typically 1 grid cell per timestep — which
    # propagate through the network and produce all-NaN model output.
    - KACE-1-0-G
    # AWI-ESM-1-1-LR and AWI-ESM-1-REcoM ship corrupted Jan 1 data
    # every year — ~5900 Pa psl drop, 1.5 K TMP2m spike, smaller
    # anomalies in sfcWind/DSWRFsfc — consistent with the year's
    # first day being an instantaneous snapshot rather than a daily
    # mean (CMIP6 publishing bug). Other variables (PRATEsfc, Q2m)
    # unaffected. See report/v5/README.md.
    - AWI-ESM-1-1-LR
    - AWI-ESM-1-REcoM
  exclude_variants:
    # Specific realizations whose 3D state slabs ship as ~10⁶ NaN
    # cells from the publisher. Sibling variants of these same
    # models are clean. See report/README.md §6c.
    - {source_id: HadGEM3-GC31-MM, experiment: historical, variant_label: r2i1p1f3}
    - {source_id: EC-Earth3, experiment: historical, variant_label: r4i1p1f1}
    # CESM2-WACCM ssp585 r1i1p1f1 has 41 consecutive days of
    # all-NaN data starting 2016-02-15 (publisher missing chunk).
    # Sibling variants of CESM2-WACCM ssp585 are fine.
    - {source_id: CESM2-WACCM, experiment: ssp585, variant_label: r1i1p1f1}
    # Pangeo mirror has corrupted zarr chunks for this variant: the
    # on-disk chunk payload contains 600 timesteps but the chunk-shape
    # metadata declares 187, so even a single-element
    # ``isel(time=0).load()`` raises ``ValueError: cannot reshape array
    # of size 133632000 into shape (187,8,145,192)`` from zarr v2's
    # codec. ESGF still has this variant (all 18 day vars), so the
    # ESGF backfill picks it up — only Pangeo is excluded here.
    - {source_id: HadGEM3-GC31-LL, experiment: ssp245, variant_label: r4i1p1f3}
  experiments: [historical, ssp126, ssp245, ssp370, ssp585]

overrides:
  # CESM2-WACCM historical r2i1p1f1 has its psl variable concatenated
  # twice end-to-end on Pangeo (mirror-side ingest error; see README's
  # "Known Pangeo data-quality issues"). The two halves are
  # bit-identical, so dedupe is safe — but we want this to be opt-in,
  # not silent.
  - match:
      source_id: CESM2-WACCM
      experiment: historical
      variant_label: r2i1p1f1
    allow_dedupe: true
