# Cloud-side smoke-test for the ESGF pipeline.
#
# Same ESGF data source and override set as the production config
# ``cmip6-multimodel-4deg-1940-2100-esgf-cloud.yaml``, but only 1
# year per scenario (2010 historical, 2015 SSPs). Output lands in
# the same ``v0-pilot/`` prefix as ``cmip6-multimodel-4deg-pilot-cloud.yaml``
# so the two pipelines' outputs sit alongside each other.
#
# ESGF inventory path is passed via ``--inventory`` on the command
# line; the pilot can reuse the production-bucket inventory.

output_directory: gs://vcm-ml-intermediate/2026-05-22-cmip6-multimodel-daily-4deg-8plev-1940-2100/v0-pilot

esgf:
  search_node: https://esgf-data.dkrz.de/esg-search/search
  scratch_dir: /scratch

defaults:
  time_subset:
    historical: {start: "2010-01-01", end: "2010-12-31"}
    ssp126: {start: "2015-01-01", end: "2015-12-31"}
    ssp245: {start: "2015-01-01", end: "2015-12-31"}
    ssp370: {start: "2015-01-01", end: "2015-12-31"}
    ssp585: {start: "2015-01-01", end: "2015-12-31"}

selection:
  exclude_source_ids:
    - INM-CM4-8
  experiments: [historical, ssp126, ssp245, ssp370, ssp585]

overrides:
  - match:
      source_id: CESM2-WACCM-FV2
    allow_dedupe: true
